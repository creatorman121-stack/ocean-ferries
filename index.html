<script>
(function(){
  try{
    const test='__ls_test__';
    window.localStorage.setItem(test,test);
    window.localStorage.removeItem(test);
  }catch(e){
    console.warn('localStorage unavailable, using memory fallback');
    const mem={};
    Object.defineProperty(window,'localStorage',{
      value:{
        getItem:k=>mem[k]??null,
        setItem:(k,v)=>{mem[k]=String(v)},
        removeItem:k=>{delete mem[k]},
        clear:()=>{for(const k in mem)delete mem[k]}
      },
      configurable:true
    });
  }
})();
</script>

(function mergeDefaults() {
    for (let key of Object.keys(DEFAULT_DB)) {
        if (!(key in DB)) { DB[key] = DEFAULT_DB[key]; continue; }
        if (typeof DEFAULT_DB[key] === 'object' &&!Array.isArray(DEFAULT_DB[key])) {
            for (let subKey of Object.keys(DEFAULT_DB[key])) {
                if (!(subKey in DB[key])) DB[key][subKey] = DEFAULT_DB[key][subKey];
            }
        }

})();

const fmtPHP = n => '₱' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
const safeId = str => str.replace(/[^a-zA-Z0-9]/g, '_');

function slabCost(E, rates) {
  const [r0, r1, r2] = rates;
  let t1 = Math.min(E, 10), rem = E - t1;
  let t2 = Math.min(Math.max(rem, 0), 30), rem2 = rem - t2;
  let t3 = Math.max(rem2, 0);
  return { t1, t2, t3, c1: t1*r0, c2: t2*r1, c3: t3*r2, total: t1*r0 + t2*r1 + t3*r2 };
}

function updateDashboard() {
  const s = DB.stats;
  $('statTrans').textContent = s.transactions;
  $('statRev').textContent = fmtPHP(s.revenue);
  $('statKg').textContent = s.totalKg + 'kg';
  $('statTop').textContent = s.topRoute || '--';
  const search = ($('dashSearch')?.value || '').toLowerCase();
  const rec = DB.comps.slice(-20).reverse().filter(c =>
  !search || c.route.toLowerCase().includes(search) || fmtPHP(c.total).includes(search)
  ).slice(0,5);
  $('recentList').innerHTML = rec.length? rec.map(c => `
    <div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:0.8rem">
      <span style="color:var(--accent)">${c.route.toUpperCase()}</span> | ${c.mode} | ${c.pax||1}pax | ${c.weight}kg → <b>${fmtPHP(c.total)}</b>
    </div>
  `).join('') : '<p style="color:var(--text3)">No matching transactions</p>';
  
  // AI Load Predictor
  const coreRoutes = ['cebu_tagbilaran','cebu_ormoc','cebu_palompon','cebu_dumaguete','cebu_surigao','cebu_siquijor'];
  const day = new Date().getDay();
  const isWeekend = day===0 || day===6;
  const mult = isWeekend ? 1.3 : 1.0;
  const preds = coreRoutes.map(k => {
    const sched = DB.schedules[k];
    const trips = sched ? sched.trips.length : 0;
    const base = trips * 28;
    const hist = DB.comps.filter(c => c.route===k).length;
    const score = Math.round((base + hist*5) * mult);
    return {k, name: k.split('_')[1].toUpperCase(), score, trips};
  }).sort((a,b)=>b.score-a.score).slice(0,3);
  const predEl = $('aiPredictor');
  if (predEl) {
    predEl.innerHTML = preds.map(p => {
      const pct = Math.min(100, Math.round(p.score/ (preds[0].score||1)*100));
      return `<div style="margin:6px 0"><div style="display:flex;justify-content:space-between"><b>${p.name}</b><span>${p.score} est. bags</span></div><div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--accent),#ff9f43)"></div></div><div style="font-size:0.7rem;color:var(--text3)">${p.trips} trips today • ${isWeekend?'Weekend boost':'Weekday'}</div></div>`;
    }).join('');
  }

  drawMiniChart();
}

function drawMiniChart() {
  const canvas = $('miniChart'); if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const counts = DB.stats.routeCounts || {};
  const routes = Object.keys(counts).sort((a,b) => counts[b]-counts[a]).slice(0,5);
  const values = routes.map(k => counts[k]);
  const max = Math.max(...values, 1);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const barW = (canvas.width / Math.max(routes.length,1)) - 8;
  routes.forEach((route, i) => {
    const h = (values[i]/max)*80;
    ctx.fillStyle = '#f43f5e';
    ctx.fillRect(i*(barW+8), 100-h, barW, h);
    ctx.font = '8px sans-serif'; ctx.fillStyle = '#edeffc';
    ctx.fillText(route.substring(0,5), i*(barW+8), 115);
  });
}

function getCalcParams() {

let lastReceiptText = '';

function compute(override = null) {
  const p = override || getCalcParams();
  const { route, mode, cls, pax, weight, rounding } = p;
  const free = mode === 'normal'? DB.freeAllowance[cls] : 0;
  const freeTotal = free * pax;
  let excess = weight - freeTotal;
  if (excess < 0) excess = 0;
  let E = mode === 'normal'? excess / pax : weight;
  if (rounding === 'floor') E = Math.floor(E);
  const slab = slabCost(E, DB.slabs[route][mode]);
  const perPax = slab.total;
  const total = mode === 'normal'? perPax * pax : perPax;

  const steps = [
    `Free: ${free}kg × ${pax}pax = ${freeTotal}kg`,
    `Excess: ${weight}kg → ${excess.toFixed(1)}kg`,
    `E/pax: ${excess.toFixed(1)} ÷ ${pax} = ${E.toFixed(2)}kg`
  ];
  if (slab.t1>0) steps.push(`Tier1: ${slab.t1.toFixed(1)}kg × ₱${DB.slabs[route][mode][0]} = ₱${slab.c1.toFixed(2)}`);
  if (slab.t2>0) steps.push(`Tier2: ${slab.t2.toFixed(1)}kg × ₱${DB.slabs[route][mode][1]} = ₱${slab.c2.toFixed(2)}`);
  if (slab.t3>0) steps.push(`Tier3: ${slab.t3.toFixed(1)}kg × ₱${DB.slabs[route][mode][2]} = ₱${slab.c3.toFixed(2)}`);
  steps.push(`Per pax: ₱${perPax.toFixed(2)}`);
  steps.push(`Total: ${fmtPHP(total)}`);

  $('totalDisplay').textContent = fmtPHP(total);
  $('perPaxDisplay').textContent = mode==='normal'? `₱${perPax.toFixed(2)} per passenger` : 'Fragile cargo';
  $('stepsDisplay').innerHTML = steps.map(s => `<div>• ${s}</div>`).join('');
  $('resultCard').style.display='block';

  const receiptHtml = `
    <div style="text-align:center;font-weight:bold;font-size:1rem;margin-bottom:6px">⛴ Ocean Fast Ferries</div>
    <div style="text-align:center;font-size:0.7rem;margin-bottom:8px">BAGGAGE FEE RECEIPT</div>
    <div>Route: <b>${route.toUpperCase()}</b></div><div>Mode: <b>${mode.toUpperCase()}</b></div>
    <div>${mode==='normal'?`Class: <b>${cls}</b> | Pax: <b>${pax}</b>`:`Fragile Cargo`}</div>
    <div>Weight: <b>${weight} kg</b></div>
    <hr style="margin:6px 0">${steps.map(s => `<div>${s}</div>`).join('')}<hr style="margin:6px 0">
    <div style="text-align:center;font-weight:bold;font-size:1.1rem">💵 TOTAL: ${fmtPHP(total)}</div>
    <div class="qr-code"></div>
    <div style="font-size:0.65rem;margin-top:6px;text-align:center">${new Date().toLocaleString()}</div>
  `;
  $('receipt').innerHTML = receiptHtml + `<div class="receipt-download-btn" onclick="downloadReceipt()">⬇</div>`;
  $('receipt').style.display = 'block';
  lastReceiptText = receiptHtml.replace(/<[^>]*>/g, '');

  if (!override) {
    DB.stats.transactions++; DB.stats.revenue+=total; DB.stats.totalKg+=weight;
    if (!DB.stats.routeCounts[route]) DB.stats.routeCounts[route]=0;
    DB.stats.routeCounts[route]++;
    let top='',max=0;
    for(let [k,v] of Object.entries(DB.stats.routeCounts)) if(v>max){max=v;top=k;}
    DB.stats.topRoute=top;
    DB.comps.push({route,mode,cls,pax,weight,total,time:new Date().toISOString()});
    DB.history.push({route,mode,cls,pax,weight,total,time:new Date().toISOString()});
    saveDB(); updateDashboard();
  }
}

function cashierAdjust() {
  const p = getCalcParams();
  if (p.mode === 'fragile') {
    let w = p.weight;
    if (w <= 0) { toast('Enter weight first'); return; }
    for (let testW = Math.floor(w)-1; testW >= 0; testW--) {
      let slab = slabCost(testW, DB.slabs[p.route].fragile);
      let tot = slab.total;
      if (Math.abs(tot % 1) < 0.001 && tot > 0) {
        $('weight').value = testW;
        compute();
        toast(`Adjusted to ${testW}kg → ${fmtPHP(tot)}`);
        return;
      }
    }
    toast('No whole-peso total found for Fragile');
    return;
  }
  const free = DB.freeAllowance[p.cls] * p.pax;
  let excess = p.weight - free;
  if (excess <= 0) { toast('No excess to adjust'); return; }
  for (let e = Math.floor(excess)-1; e>=0; e--) {
    let testW = e + free;
    let E = e / p.pax;
    let slab = slabCost(E, DB.slabs[p.route].normal);
    let tot = slab.total * p.pax;
    if (Math.abs(tot % 1) < 0.001) {
      $('weight').value = testW;
      compute();
      toast(`Adjusted to ${testW}kg → ${fmtPHP(tot)}`);
      return;
    }
  }
  toast('No whole-peso total found');
}

async function sendAIChat() {
  const q = $('chatInput').value.trim();
  if (!q) return;

  $('sendBtn').disabled = true;

  let response = '';

  if (useAPI) {
    const loading = showLoading();
    try {
      response = await fetchGeminiResponse(q, chatContext);
      removeLoading(loading);
      if (!response) response = aiOfflineRespond(q);
    } catch {
      removeLoading(loading);
      response = aiOfflineRespond(q);
    }
  } else {
    response = aiOfflineRespond(q);
  }

  addChatMsg('bot', response);
  chatContext.push({ role:'user', content:q });
  chatContext.push({ role:'assistant', content:response });
  $('sendBtn').disabled = false;
}

async function fetchGeminiResponse(query, context) {
  const apiKey = DB.aiSettings.apiKey;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
  const systemPrompt = `You are the official AI assistant for Ocean Fast Ferries (Cebu, Philippines).
Routes: Tagbilaran, Ormoc, Palompon, Dumaguete, Surigao, Getafe, Siquijor.
Baggage slabs: ${JSON.stringify(DB.slabs)}. Passenger fares: ${JSON.stringify(DB.paxFares)}.
Answer in a friendly, helpful tone. Always compute baggage fees using the slab rates if asked.
If you don't know something, say you'll connect to a human agent. Keep replies short.`;
  const recentContext = context.slice(-6).map(c => `${c.role}: ${c.content}`).join('\n');
  const body = {
    contents: [{ parts: [{ text: `${systemPrompt}\n\nPrevious chat:\n${recentContext}\nUser: ${query}` }] }],
    generationConfig: { temperature: 0.4, maxOutputTokens: 512 }
  };
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: AbortSignal.timeout(8000)
    });
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    return text? text.trim() : null;
  } catch {
    return null;
  }
}

function aiOfflineRespond(q) {
  const ql = q.toLowerCase();
  if (/^(hi|hello|hey)/i.test(ql)) return "Hello! 👋 I'm the Ocean Fast Ferries genius AI. Ask me anything about baggage, fares, schedules, connections, or even tourist tips.";
  if (/thank(s| you)/i.test(ql)) return "You're very welcome! 😊 Need anything else?";
  if (/bye|good night|see you/i.test(ql)) return "Safe travels! ⛴ Goodbye!";
  if (ql.includes('help') || ql.includes('what can you')) return "I can:\n• Compute baggage fees (e.g., 'Price 2 pax 45kg Ormoc')\n• Show passenger fares\n• Display trip schedules\n• Explain connections (e.g., Cebu→Siquijor)\n• Tourist info\nJust ask naturally!";
  let calcMatch = q.match(/(\d+)\s*(?:pax|passengers?)?\s*(\d+\.?\d*)\s*(?:kg|kilos?)?\s*([a-zA-Z\s-]+)/i);
  if (!calcMatch) calcMatch = q.match(/(?:compute|calculate|how much|cost|price|fee)\s+(?:for\s+)?(\d+)\s*(?:pax|passengers?)?\s*(\d+\.?\d*)\s*(?:kg|kilos?)?\s*([a-zA-Z\s-]+)/i);
  if (calcMatch &&!isNaN(+calcMatch[1]) &&!isNaN(+calcMatch[2])) {
    const pax = +calcMatch[1], kg = +calcMatch[2], rw = calcMatch[3].toLowerCase().trim();
    const route = Object.keys(DB.slabs).find(r => rw.includes(r) || r.includes(rw));
    if (!route) return `I don't recognize route "${rw}". Available: ${Object.keys(DB.slabs).join(', ')}.`;
    const free = DB.freeAllowance.tourist;
    const excess = Math.max(0, kg - free*pax);
    const E = excess/pax;
    const total = slabCost(E, DB.slabs[route].normal).total * pax;
    return `📊 Normal baggage ${route.toUpperCase()}:\nPassengers: ${pax}\nWeight: ${kg}kg\nFree (tourist): ${free}kg×${pax}=${free*pax}kg\nExcess: ${excess.toFixed(1)}kg\nExcess/pax: ${E.toFixed(2)}kg\n\n💵 Total fee: ${fmtPHP(total)}`;
  }
  if (/\b(fare|ticket|price|cost)\b/i.test(q)) {
    for (let routeName of Object.keys(DB.paxFares)) {
      const simple = routeName.replace(/[^a-z ]/gi,' ').toLowerCase().trim();
      if (q.includes(simple) || simple.split(' ').some(w => q.includes(w))) {
        let cls = 'TC/OA';
        if (/business|bc/i.test(q)) cls='BC';
        else if (/student|st/i.test(q)) cls='ST';
        else if (/military|mi/i.test(q)) cls='MI';
        const price = DB.paxFares[routeName][cls];
        if (price) return `Passenger fare ${routeName} (${cls}): ${fmtPHP(price)}`;
      }
    }
    return "Passenger fares (Tourist/TC):\n• Tagbilaran ₱1,000\n• Ormoc/Palompon ₱1,430\n• Dumaguete ₱2,170\n• Surigao ₱2,470\n• Getafe ₱585\n• Siquijor ₱1,200\nAsk for Business, Student, Military.";
  }
  if (/\b(schedule|trip|depart|time|vessel)\b/i.test(q)) {
    for (let routeKey of Object.keys(DB.schedules)) {
      if (q.includes(routeKey) || q.includes(DB.schedules[routeKey].title.toLowerCase())) {
        const sched = DB.schedules[routeKey];
        if (!sched.trips.length) return `No scheduled trips for ${sched.title} yet.`;
        return sched.trips.slice(0,6).map(t => `🕐 ${t.dep} → ${t.arr} (${t.vessel})${t.remarks?' - '+t.remarks:''}`).join('\n');
      }
    }
    return "Schedules available for: Tagbilaran, Ormoc, Getafe, Siquijor. Which route?";
  }
  if (/siquijor/i.test(q)) {
    if (q.includes('how to get') || q.includes('connection') || q.includes('go to')) {
      return "⛴ Cebu to Siquijor:\n• Direct ferry: OJ 788 (9:30 AM & 5:40 PM) - approx 3.5h\n• Via Tagbilaran: many trips, then connecting ferry (Tagbilaran→Siquijor, approx 1.5h). Total travel ~3.5h.\nFare (passenger) starts at ₱1,200.";
    }
    return "Siquijor route is available! Direct and via Tagbilaran. Fares start at ₱1,200 (Tourist). Ask for more details.";
  }
  if (/(free|allowance|free kg)/i.test(q)) return "Tourist: 10kg free per pax.\nBusiness: 20kg free per pax.";
  if (/(routes|destinations|where do you go)/i.test(q)) return "We sail to: Tagbilaran, Ormoc, Palompon, Dumaguete, Surigao, Getafe, and Siquijor.";
  if (/(ocean fast|about|company)/i.test(q)) return "Ocean Fast Ferries operates fast craft services in the Visayas region, connecting Cebu to major islands with reliable schedules. Baggage Pro is our intelligent management system.";
  if (/slab|rate per kg/i.test(q)) {
    let resp = "Slab rates (per kg) for normal baggage:\n";
    Object.entries(DB.slabs).forEach(([k,v])=> resp += `${k.toUpperCase()}: ${v.normal[0]} / ${v.normal[1]} / ${v.normal[2]}\n`);
    return resp;
  }
  return "I'm not sure how to answer that. Try:\n• 'Price 2 pax 30kg Tagbilaran'\n• 'Siquijor schedule'\n• 'Business fare to Ormoc'\n• 'Free allowance'\n• 'Help'";
}

let arStream = null, arModel = null, arRunning = false;
async function buildAR(){
  $('view-ar').innerHTML = `
    <div class="card glow">
      <div class="card-header">📷 AR Baggage Scanner</div>
      <div class="ar-wrap">
        <video id="arVideo" class="ar-video" autoplay playsinline muted></video>
        <div id="arOverlay" class="ar-overlay"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="primary sm block" onclick="startAR()">Start Camera</button>
        <button class="sm block" onclick="stopAR()">Stop</button>
      </div>
      <div id="arStatus" style="margin-top:8px;font-size:0.8rem;color:var(--text2)">Point camera at bags. AI will outline suitcases/backpacks.</div><div style="margin-top:8px;font-size:0.75rem;color:var(--text3)">If camera is blocked in embed, <a href="ar_scanner_standalone.html" target="_blank" style="color:var(--accent);text-decoration:underline">open standalone scanner</a>.</div>
    </div>
  `;
}
async function startAR(){
  try{
    arStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const v = $('arVideo');
    v.srcObject = arStream;
    await v.play();
    if(!arModel) arModel = await cocoSsd.load();
    arRunning = true;
    toast('AR scanner active');
    arLoop();
  }catch(e){ console.error(e); if(window.top!==window.self){ toast('Camera blocked in embed'); $('arStatus').innerHTML='Camera access denied in iframe. <a href="ar_scanner_standalone.html" target="_blank" style="color:var(--accent);text-decoration:underline">Open standalone scanner</a>'; } else { toast('Camera access denied. Please allow permission.'); } }
}
function stopAR(){
  arRunning = false;
  if(arStream){ arStream.getTracks().forEach(t=>t.stop()); arStream=null; }
  $('arOverlay').innerHTML='';
}
async function arLoop(){
  if(!arRunning) return;
  const v = $('arVideo');
  const overlay = $('arOverlay');
  if(v.readyState===4 && arModel){
    const preds = await arModel.detect(v);
    overlay.innerHTML='';
    const vw = v.videoWidth, vh = v.videoHeight;
    const rect = v.getBoundingClientRect();
    const scaleX = rect.width / vw;
    const scaleY = rect.height / vh;
    preds.filter(p=>['suitcase','backpack','handbag'].includes(p.class)).forEach(p=>{
      const [x,y,w,h] = p.bbox;
      const box = document.createElement('div');
      box.className='ar-box';
      box.style.left = (x*scaleX)+'px';
      box.style.top = (y*scaleY)+'px';
      box.style.width = (w*scaleX)+'px';
      box.style.height = (h*scaleY)+'px';
      const label = document.createElement('div');
      label.className='ar-label';
      const estKg = Math.max(5, Math.round((w*h)/(vw*vh)*80));
      label.textContent = `${p.class} ~${estKg}kg`;
      box.appendChild(label);
      overlay.appendChild(box);
    });
    $('arStatus').textContent = preds.length? `Detected ${preds.length} object(s)` : 'Scanning...';
  }
  requestAnimationFrame(arLoop);
}

    const receipt=byId('receipt');if(receipt&&receipt.style.display!=='none'&&!receipt.querySelector('.v6-receipt-note'))receipt.insertAdjacentHTML('beforeend',`<div class="v6-receipt-note"><b>Trip total:</b> Passenger subtotal ${money(passenger)} + baggage ${money(baggage)} = <b>${money(grand)}</b></div>`);
  };
  window.copyTripQuote=function(){const t=window.__lastTripQuote||'No quote yet.';if(navigator.clipboard)navigator.clipboard.writeText(t).then(()=>toastV6('Trip quote copied.')).catch(()=>toastV6('Copy not supported.'));else toastV6(t);};
  function patchCalculator(){
    const oldBuild=buildCalculator;window.buildCalculator=buildCalculator=function(){oldBuild();enhanceCalcRouteOptions();injectTripQuoteControls();setTimeout(renderTripQuote,30);};

  function renderFarePlanner(){const r=byId('v6FareRoute')?.value||'cebu_tagbilaran';const c=byId('v6PlannerClass')?.value||'TC/OA';const pax=parseInt(byId('v6PlannerPax')?.value,10)||1;const f=fareSum(r,c);byId('v6FarePlannerOut').innerHTML=`<div class="fare-breakdown"><b>${label(r)}</b><br>${ROUTE_PLANS[r].type} • ${ROUTE_PLANS[r].travel}<br>${f.legs.map(l=>`↳ ${l.label}: ${money(l.fare)}`).join('<br>')}<hr style="border-color:var(--border);margin:7px 0">${c}: ${money(f.total)} × ${pax} pax = <b style="color:var(--accent)">${money(f.total*pax)}</b></div>`;}
  window.renderV6FarePlanner=renderFarePlanner;
  function patchFares(){
    window.buildFares=buildFares=function(){byId('view-fares').innerHTML=`<div class="card neo-card"><div class="card-header"><span>💵 Cebu Fare Matrix</span><span class="neo-chip">Main routes only</span></div><div class="grid2"><div class="input-group"><label>Route</label><select id="v6FareRoute" onchange="renderV6FarePlanner()">${routeOptions('cebu_tagbilaran')}</select></div><div class="input-group"><label>Passenger Class</label><select id="v6PlannerClass" onchange="renderV6FarePlanner()">${classOptions('TC/OA')}</select></div><div class="input-group"><label>Passengers</label><input id="v6PlannerPax" type="number" value="1" min="1" oninput="renderV6FarePlanner()"></div><div class="input-group"><label>Quick action</label><button class="primary block" onclick="renderV6FarePlanner()">Calculate</button></div></div><div id="v6FarePlannerOut"></div></div><div class="card"><div class="card-header">🧮 All Main Cebu Passenger Fares</div><div class="matrix-table"><table><thead><tr><th>Route</th>${CLASS_KEYS.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${MAIN_ROUTES.map(r=>`<tr><td><b>${label(r)}</b><br><small style="color:var(--text3)">${ROUTE_PLANS[r].type}</small></td>${CLASS_KEYS.map(c=>`<td>${money(fareSum(r,c).total)}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div><div class="card"><div class="card-header">🔗 Connection Logic</div>${MAIN_ROUTES.filter(r=>ROUTE_PLANS[r].legs.length>1).map(r=>`<div class="fare-breakdown"><b>${label(r)}</b><br>${ROUTE_PLANS[r].legs.map(l=>label(l)).join(' + ')}</div>`).join('')}</div>`;renderFarePlanner();};

  function patchSchedules(){
    window.buildSchedules=buildSchedules=function(){byId('view-schedules').innerHTML=`<div class="card neo-card"><div class="card-header"><span>🕐 Cebu Main Route Schedules</span><span class="neo-chip">No duplicates</span></div><select id="schedRoute" onchange="renderSchedule()">${routeOptions('cebu_tagbilaran')}</select><div id="schedList"></div></div>`;renderSchedule();};
    window.renderSchedule=renderSchedule=function(){const r=byId('schedRoute')?.value||'cebu_tagbilaran';const s=DB.schedules[r]||{trips:[]};const f=fareSum(r,'TC/OA');byId('schedList').innerHTML=`<div class="fare-breakdown"><b>${label(r)}</b><br>${ROUTE_PLANS[r].type} • Travel time: ${ROUTE_PLANS[r].travel}<br>Gate: ${ROUTE_PLANS[r].gate} • Zone: ${ROUTE_PLANS[r].zone}<br>Tourist fare: <b>${money(f.total)}</b><br>${f.legs.map(l=>`↳ ${l.label}: ${money(l.fare)}`).join('<br>')}</div>${s.trips?.length?s.trips.map(t=>`<div class="trip-row"><b>${t.dep}</b> → <b>${t.arr||''}</b> | ${t.vessel}${t.remarks?`<br><small style="color:var(--text3)">📌 ${t.remarks}</small>`:''}</div>`).join(''):'<p style="color:var(--text3);margin-top:8px">No saved trip schedule for this route yet.</p>'}`;};
  }

  function routeOrbitHtml(){return MAIN_ROUTES.map((r,i)=>{const count=DB.stats.routeCounts?.[r]||0;const f=fareSum(r,'TC/OA');const pct=Math.min(100,10+count*12+i*5);return`<div class="v6-node"><b>${label(r)}</b><div>${ROUTE_PLANS[r].type}</div><div class="v6-price">${money(f.total)}</div><div class="mini-meter"><span style="width:${pct}%"></span></div><small style="color:var(--text3)">Gate ${ROUTE_PLANS[r].gate} • ${count} txn</small></div>`;}).join('');}
  function patchDashboard(){const old=buildDashboard;window.buildDashboard=buildDashboard=function(){old();const v=byId('view-dashboard');if(!v||byId('v6DashDeck'))return;const peak=MAIN_ROUTES.map(r=>({r,score:(DB.schedules[r]?.trips?.length||0)*20+(DB.stats.routeCounts?.[r]||0)*10+(ROUTE_PLANS[r].legs.length>1?18:0)})).sort((a,b)=>b.score-a.score)[0];v.insertAdjacentHTML('beforeend',`<div id="v6DashDeck"><div class="card neo-card scanline"><div class="card-header"><span>🧠 Route Intelligence V6</span><span class="neo-chip">Source-based</span></div><div class="v6-grid">${routeOrbitHtml()}</div></div><div class="card"><div class="card-header">🧹 Cleanup Report</div>${REMOVED_ITEMS.map(x=>`<div class="fare-breakdown v6-clean">✅ Removed: ${x}</div>`).join('')}<div class="fare-breakdown v6-warn">Calculator preserved: slabCost(), compute(), cashierAdjust(), and original receipt generation.</div></div><div class="card"><div class="card-header">⚓ Predictive Operations</div><div class="v6-grid3"><div class="ops-cell"><b>${peak?label(peak.r).split(' to ')[1]:'--'}</b>Peak Route</div><div class="ops-cell"><b>${peak?ROUTE_PLANS[peak.r].gate:'--'}</b>Next Gate</div><div class="ops-cell"><b>${DB.history?.length||0}</b>Saved Logs</div></div></div></div>`);};}

  function patchAdmin(){
    window.buildAdmin=buildAdmin=function(){if(currentRole!=='supervisor'){byId('loginOverlay').style.display='flex';toastV6('Supervisor login required');return;}byId('view-admin').innerHTML=`<div class="card neo-card"><div class="card-header">🔐 Admin Control Center V6</div><div class="grid2" style="margin-bottom:12px"><button class="accent sm block" onclick="v6Admin('slabs')">Slabs</button><button class="accent sm block" onclick="v6Admin('fares')">Leg Fares</button><button class="accent sm block" onclick="v6Admin('exports')">Exports</button><button class="accent sm block" onclick="v6Admin('audit')">Audit</button></div><div id="adminContent"></div></div>`;v6Admin('slabs');};
    window.v6Admin=function(section){const box=byId('adminContent');if(!box)return;if(section==='slabs'){box.innerHTML=`<div class="card-header">📦 Main Cebu Slab Editor</div><div class="input-group"><label>Route</label><select id="v6SlabRoute" onchange="loadV6Slabs()">${routeOptions('cebu_tagbilaran')}</select></div><div class="v6-grid3">${['Normal 1-10kg','Normal 11-40kg','Normal 41kg+','Fragile 1-10kg','Fragile 11-40kg','Fragile 41kg+'].map((l,i)=>`<div class="input-group"><label>${l}</label><input type="number" step="0.01" id="v6s${i}"></div>`).join('')}</div><button class="primary block" onclick="saveV6Slabs()">Save Slabs Without Changing Calculator Logic</button>`;loadV6Slabs();}
      else if(section==='fares'){box.innerHTML=`<div class="card-header">💵 Direct Leg Fare Editor</div><div class="input-group"><label>Direct leg</label><select id="v6LegKey" onchange="loadV6LegFares()">${Object.keys(DIRECT_LEG_FARES).map(k=>`<option value="${k}">${label(k)}</option>`).join('')}</select></div><div class="v6-grid3">${CLASS_KEYS.map((c,i)=>`<div class="input-group"><label>${c}</label><input type="number" step="0.01" id="v6f${i}"></div>`).join('')}</div><button class="primary block" onclick="saveV6LegFares()">Save Leg + Recalculate Connecting Routes</button><div class="fare-breakdown">Connecting routes are recalculated automatically from their legs.</div>`;loadV6LegFares();}
      else if(section==='exports'){box.innerHTML=`<div class="card-header">📤 Export + Maintenance</div><div class="grid2"><button class="primary block" onclick="exportV6CSV()">Export CSV Manifest</button><button class="accent block" onclick="exportDatabase()">Export JSON Backup</button><button class="accent block" onclick="restoreV6Core()">Restore Main Cebu Fares</button><button class="danger block" onclick="resetApp()">Reset App</button></div><div class="fare-breakdown v6-clean">This V6 build removed unnecessary duplicate code but preserved the baggage calculator.</div>`;}
      else{box.innerHTML=`<div class="card-header">📜 Audit Trail</div><div style="max-height:360px;overflow:auto">${(DB.audit||[]).map(a=>`<div class="history-row"><b>${a.time}</b><br>${a.action}<br><small style="color:var(--text3)">${a.user||'system'}</small></div>`).join('')||'<p style="color:var(--text3)">No audit logs yet.</p>'}</div>`;}};
    window.loadV6Slabs=function(){const r=byId('v6SlabRoute')?.value||'cebu_tagbilaran';const s=DB.slabs[r];if(!s)return;[...s.normal,...s.fragile].forEach((v,i)=>byId('v6s'+i).value=v);};
    window.saveV6Slabs=function(){const r=byId('v6SlabRoute').value;DB.slabs[r]={normal:[0,1,2].map(i=>Number(byId('v6s'+i).value)||0),fragile:[3,4,5].map(i=>Number(byId('v6s'+i).value)||0)};addAudit('Updated V6 slab rates for '+label(r));saveDB();toastV6('Slab rates saved.');};
    window.loadV6LegFares=function(){const k=byId('v6LegKey')?.value||'cebu_tagbilaran';CLASS_KEYS.forEach((c,i)=>byId('v6f'+i).value=DIRECT_LEG_FARES[k][c]||0);};

  }
  window.exportV6CSV=function(){const rows=[['ID','Time','Route','Mode','Class','Pax','Weight','BaggageTotal']].concat((DB.history||[]).map((h,i)=>[i+1,h.time||'',label(h.route),h.mode||'',h.cls||'',h.pax||'',h.weight||'',h.total||'']));const csv=rows.map(r=>r.map(x=>'"'+String(x).replaceAll('"','""')+'"').join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='ocean_ferries_v6_manifest.csv';a.click();URL.revokeObjectURL(a.href);toastV6('CSV exported.');};
  window.restoreV6Core=function(){syncCoreData();toastV6('V6 main Cebu data restored.');if(byId('view-fares')?.classList.contains('active'))buildFares();};

  function aiFare(q){const r=findRoute(q);if(r==='liloan')return'Cebu to Liloan is removed/not included. Main Cebu routes are Tagbilaran, Maasin, Surigao, Siquijor, Dumaguete, Ormoc, Palompon, and Getafe.';if(!r)return'Mention the route, example: fare Cebu to Dumaguete or student fare Cebu to Siquijor.';const cls=detectFareClass(q);const f=fareSum(r,cls);return`${label(r)} fare (${cls}): ${money(f.total)}\n${ROUTE_PLANS[r].type} • ${ROUTE_PLANS[r].travel}\n${f.legs.map(l=>'• '+l.label+': '+money(l.fare)).join('\n')}`;}
  function aiSchedule(q){const r=findRoute(q);if(!r||r==='liloan')return'Please mention one main Cebu route: Tagbilaran, Maasin, Surigao, Siquijor, Dumaguete, Ormoc, Palompon, or Getafe.';const s=DB.schedules[r];return`${label(r)} schedule:\n${ROUTE_PLANS[r].type} • ${ROUTE_PLANS[r].travel} • ${ROUTE_PLANS[r].gate}\n${s?.trips?.length?s.trips.slice(0,8).map(t=>'• '+t.dep+' → '+t.arr+' | '+t.vessel+(t.remarks?' | '+t.remarks:'')).join('\n'):'No saved trip schedule yet.'}`;}
  function aiBaggage(q){const kg=(q.match(/(\d+(?:\.\d+)?)\s*(kg|kilo|kilos)/i)||[])[1];if(!kg)return'Include weight, example: 2 pax 45kg Cebu to Ormoc or fragile 20kg Cebu to Getafe.';const r=findRoute(q);if(r==='liloan')return'Cebu to Liloan is not included.';const route=r||'cebu_tagbilaran';const pax=Number((q.match(/(\d+)\s*(pax|passenger|passengers)/i)||[])[1]||1);const mode=/fragile|cargo/i.test(q)?'fragile':'normal';const cls=/business|bc/i.test(q)?'business':'tourist';try{const free=mode==='normal'?DB.freeAllowance[cls]:0;const freeTotal=free*pax;const excess=Math.max(0,Number(kg)-freeTotal);const E=mode==='normal'?excess/pax:Number(kg);const slab=slabCost(E,DB.slabs[route][mode]);const baggage=mode==='normal'?slab.total*pax:slab.total;const fareClass=detectFareClass(q);const passenger=fareSum(route,fareClass).total*pax;return`Trip estimate for ${label(route)}:\nPassenger fare (${fareClass}): ${money(passenger)}\nBaggage fee: ${money(baggage)}\nGrand total: ${money(passenger+baggage)}\nFree baggage: ${freeTotal}kg\nChargeable: ${E.toFixed(2)}kg`; }catch(e){return'Cannot compute because a slab rate is missing.';}}
  function patchAI(){if(typeof aiOfflineRespond==='function'){window.aiOfflineRespond=aiOfflineRespond=function(q){const s=normal(q);if(!s)return'Please type your question.';if(/^(hi|hello|hey)/.test(s))return'Hello! I am the Ocean Fast Ferries V6 AI. Ask about fares, schedules, baggage fees, passenger + baggage grand totals, gates, and connection legs.';if(s.includes('liloan'))return'Cebu to Liloan was removed/not included. Main routes: Tagbilaran, Maasin, Surigao, Siquijor, Dumaguete, Ormoc, Palompon, and Getafe.';if(/schedule|trip|depart|arrival|vessel|time/.test(s))return aiSchedule(q);if(/fare|ticket|price|how much/.test(s)&&!/kg|baggage|bag|cargo/.test(s))return aiFare(q);if(/kg|baggage|bag|luggage|cargo|fragile|compute|calculate|grand total|quote/.test(s))return aiBaggage(q);if(/connect|connecting|via|transfer/.test(s))return'Cebu to Dumaguete = Cebu→Tagbilaran + Tagbilaran→Dumaguete. Cebu to Siquijor = Cebu→Tagbilaran + Tagbilaran→Siquijor. Cebu to Surigao = Cebu→Maasin + Maasin→Surigao.';if(/route|destination|where.*go/.test(s))return'Main Cebu routes only: Cebu to Tagbilaran, Maasin, Surigao, Siquijor, Dumaguete, Ormoc, Palompon, and Getafe.';if(/free|allowance/.test(s))return'Tourist/Open Air has 10kg free per pax. Business has 20kg free per pax. Fragile cargo has no free allowance.';if(/removed|cleanup|delete|clean/.test(s))return'V6 removed duplicate add-on code, stale Liloan wording, auto-login bypass, duplicate route tabs, and repeated admin widgets. The original baggage calculator logic is preserved.';if(/help|what can you/.test(s))return'Try: fare Cebu to Dumaguete, 2 pax 45kg Cebu to Ormoc, fragile 20kg Cebu to Getafe, Cebu to Siquijor schedule, connection rules, or cleanup report.';return'I can answer Ocean Fast Ferries questions about fares, schedules, baggage, routes, gates, discounts, connections, and trip totals.';};}}

  window.openCommandPalette=function(){const old=byId('v6CommandPalette');if(old){old.remove();return;}const el=document.createElement('div');el.className='command-palette';el.id='v6CommandPalette';el.innerHTML=`<div class="command-box"><div class="card-header"><span>⚡ Command Center</span><button class="sm" onclick="document.getElementById('v6CommandPalette').remove()">✕</button></div><input id="v6CmdInput" placeholder="Ask: fare Cebu to Siquijor, 2 pax 45kg Ormoc..." onkeydown="if(event.key==='Enter')runV6Command()"><div><div class="command-row" onclick="showView('calculator');document.getElementById('v6CommandPalette').remove()"><b>Open Trip Calculator</b><span>🧮</span></div><div class="command-row" onclick="showView('fares');document.getElementById('v6CommandPalette').remove()"><b>Open Fare Matrix</b><span>💵</span></div><div class="command-row" onclick="showView('schedules');document.getElementById('v6CommandPalette').remove()"><b>Open Main Schedules</b><span>🕐</span></div></div></div>`;document.body.appendChild(el);setTimeout(()=>byId('v6CmdInput')?.focus(),50);};
  window.runV6Command=function(){const q=byId('v6CmdInput')?.value||'';byId('v6CommandPalette')?.remove();if(!q.trim())return;if(!byId('chatPanel')?.classList.contains('open'))toggleChat();addChatMsg('user',q);addChatMsg('bot',aiOfflineRespond(q));};
  function floatingTools(){if(byId('v6FloatTools'))return;const div=document.createElement('div');div.id='v6FloatTools';div.className='v6-floating-tools';div.innerHTML=`<button onclick="openCommandPalette()">⚡ Command</button><button onclick="showView('calculator')">🧮 Calculator</button><button onclick="showView('fares')">💵 Fares</button>`;document.body.appendChild(div);}
  document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openCommandPalette();}});

  function boot(){try{syncCoreData();patchDrawer();patchCalculator();patchFares();patchSchedules();patchDashboard();patchAdmin();patchAI();floatingTools();if(typeof buildDrawerMenu==='function')buildDrawerMenu();if(byId('view-dashboard')?.classList.contains('active')&&currentRole)showView('dashboard');window.__OFF_PATCH_VERSION=PATCH_VERSION;}catch(e){console.error('V6 patch error',e);}}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
})();
</script>

  .v7-plan{border-left:3px solid var(--v7a);background:rgba(0,245,255,.065);padding:10px;border-radius:12px;margin:8px 0;font-size:.84rem}.v7-plan strong{color:var(--v7a)}.v7-plan.warn{border-left-color:var(--v7d);background:rgba(249,115,22,.075)}.v7-plan.ok{border-left-color:var(--v7c);background:rgba(34,197,94,.075)}
  .v7-total{font-size:1.6rem;font-weight:950;color:var(--v7a);text-shadow:0 0 16px rgba(0,245,255,.25)}.v7-meter{height:8px;background:rgba(255,255,255,.09);border-radius:999px;overflow:hidden;margin:6px 0}.v7-meter span{display:block;height:100%;background:linear-gradient(90deg,var(--v7a),var(--accent2))}
  .v7-pass{background:#fff;color:#0f172a;border:2px solid #0ea5e9;border-radius:18px;padding:14px;font-family:system-ui,sans-serif;position:relative;overflow:hidden}.v7-pass h3{text-align:center;color:#0369a1;margin-bottom:6px}.v7-pass-grid{display:grid;grid-template-columns:1fr 96px;gap:12px;align-items:center}.v7-qr{width:92px;height:92px;border:4px solid #0f172a;background:repeating-linear-gradient(90deg,#111 0 6px,#fff 6px 12px),repeating-linear-gradient(0deg,rgba(0,0,0,.35) 0 5px,transparent 5px 10px);background-blend-mode:multiply;border-radius:8px}.v7-pass-row{display:flex;justify-content:space-between;border-bottom:1px dashed #94a3b8;padding:3px 0;font-size:.78rem}.v7-pass-row b{color:#0f172a}.v7-pass .v7-status{background:#0f172a;color:#e0f2fe;border-radius:999px;padding:5px 9px;font-weight:900;font-size:.7rem;display:inline-block;margin-top:6px}
  .v7-pulse-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--v7c);box-shadow:0 0 0 rgba(34,197,94,.7);animation:v7Pulse 1.5s infinite}@keyframes v7Pulse{70%{box-shadow:0 0 0 10px rgba(34,197,94,0)}}
  .v7-console{font-family:'Courier New',monospace;background:#020617;color:#a7f3d0;border:1px solid rgba(0,245,255,.3);border-radius:15px;padding:10px;max-height:260px;overflow:auto;font-size:.76rem}.v7-console div{border-bottom:1px solid rgba(255,255,255,.06);padding:3px 0}
  .v7-command-btn{position:fixed;right:16px;bottom:154px;z-index:62;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--v7a),var(--v7b));color:white;border:none;box-shadow:0 0 25px rgba(0,245,255,.3);font-size:1.25rem}
  .v7-mini-dock{position:fixed;right:14px;bottom:210px;z-index:61;display:none;flex-direction:column;gap:6px}.v7-mini-dock.open{display:flex}.v7-mini-dock button{border-radius:999px;background:rgba(16,22,48,.93);backdrop-filter:blur(12px);font-size:.72rem;padding:8px 10px;justify-content:flex-start}
  .v7-modal{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(7px);z-index:950;display:flex;align-items:flex-start;justify-content:center;padding:64px 14px}.v7-modal-box{width:min(560px,100%);max-height:85vh;overflow:auto;background:var(--bg-card);border:1px solid var(--v7a);border-radius:22px;padding:14px;box-shadow:0 0 55px rgba(0,245,255,.18)}
  @media(max-width:520px){.v7-grid,.v7-grid3,.v7-grid4{grid-template-columns:1fr}.v7-pass-grid{grid-template-columns:1fr}.v7-command-btn{bottom:142px;right:10px}.v7-mini-dock{right:10px;bottom:198px}.v7-orbit{height:250px}.v7-port{font-size:.62rem}}
  @media print{.v7-pass,.v7-pass *{visibility:visible}.v7-pass{position:fixed;inset:12px;z-index:9999}.v7-pass button{display:none!important}}
</style>
<script>
(function(){
  'use strict';
  const V7_VERSION='v7-innovation-pack-source-based';
  const V7_ROUTES=['cebu_tagbilaran','cebu_maasin','cebu_surigao','cebu_siquijor','cebu_dumaguete','cebu_ormoc','cebu_palompon','cebu_getafe'];
  const V7_CLASS=['TC/OA','BC','SC/PWD (BC)','SC/PWD (TC/OA)','ST','MI'];
  const V7_ALIAS={cebu_tagbilaran:['tagbilaran','tagbi','tagb','bohol'],cebu_maasin:['maasin','massin','southern leyte'],cebu_surigao:['surigao'],cebu_siquijor:['siquijor'],cebu_dumaguete:['dumaguete','duma'],cebu_ormoc:['ormoc'],cebu_palompon:['palompon','kalanggaman'],cebu_getafe:['getafe']};
  const V7_PLAN={
    cebu_tagbilaran:{title:'Cebu to Tagbilaran',type:'Direct',legs:['cebu_tagbilaran'],gate:'A1',travel:'2h',risk:18,eta:'On time'},
    cebu_maasin:{title:'Cebu to Maasin',type:'Direct',legs:['cebu_maasin'],gate:'C1',travel:'3h',risk:24,eta:'On time'},
    cebu_surigao:{title:'Cebu to Surigao',type:'Connect via Maasin',legs:['cebu_maasin','maasin_surigao'],gate:'C2',travel:'5h 30m',risk:42,eta:'Watch transfer'},
    cebu_siquijor:{title:'Cebu to Siquijor',type:'Connect via Tagbilaran',legs:['cebu_tagbilaran','tagbilaran_siquijor'],gate:'A2',travel:'4h 20m',risk:36,eta:'Watch transfer'},
    cebu_dumaguete:{title:'Cebu to Dumaguete',type:'Connect via Tagbilaran',legs:['cebu_tagbilaran','tagbilaran_dumaguete'],gate:'A3',travel:'4h 20m',risk:38,eta:'Watch transfer'},
    cebu_ormoc:{title:'Cebu to Ormoc',type:'Direct',legs:['cebu_ormoc'],gate:'B1',travel:'3h',risk:22,eta:'On time'},
    cebu_palompon:{title:'Cebu to Palompon',type:'Direct',legs:['cebu_palompon'],gate:'B2',travel:'3h',risk:26,eta:'On time'},
    cebu_getafe:{title:'Cebu to Getafe',type:'Direct',legs:['cebu_getafe'],gate:'D1',travel:'1h',risk:14,eta:'Fast lane'}
  };
  const V7_DIRECT={
    cebu_tagbilaran:{'TC/OA':1000,'BC':1560,'SC/PWD (BC)':1274.29,'SC/PWD (TC/OA)':714.29,'ST':800,'MI':500},
    tagbilaran_siquijor:{'TC/OA':1000,'BC':1560,'SC/PWD (BC)':1274.29,'SC/PWD (TC/OA)':714.29,'ST':800,'MI':500},
    tagbilaran_dumaguete:{'TC/OA':1170,'BC':1820,'SC/PWD (BC)':1485.71,'SC/PWD (TC/OA)':835.71,'ST':936,'MI':585},
    cebu_getafe:{'TC/OA':585,'BC':1040,'SC/PWD (BC)':872.86,'SC/PWD (TC/OA)':417.86,'ST':468,'MI':292.50},
    cebu_ormoc:{'TC/OA':1430,'BC':1950,'SC/PWD (BC)':1541.43,'SC/PWD (TC/OA)':1021.43,'ST':1144,'MI':715},
    cebu_palompon:{'TC/OA':1430,'BC':1950,'SC/PWD (BC)':1541.43,'SC/PWD (TC/OA)':1021.43,'ST':1144,'MI':715},
    cebu_maasin:{'TC/OA':1430,'BC':1950,'SC/PWD (BC)':1541.43,'SC/PWD (TC/OA)':1021.43,'ST':1144,'MI':715},
    maasin_surigao:{'TC/OA':1040,'BC':1560,'SC/PWD (BC)':1262.86,'SC/PWD (TC/OA)':742.86,'ST':832,'MI':520}
  };
  const $v=id=>document.getElementById(id);
  const peso=n=>(typeof fmtPHP==='function'?fmtPHP(Number(n)||0):'₱'+(Number(n)||0).toFixed(2));
  const norm=s=>String(s||'').toLowerCase().replace(/[^a-z0-9.\s]/g,' ').replace(/\s+/g,' ').trim();
  const label=r=>V7_PLAN[r]?.title || (DB?.schedules?.[r]?.title) || String(r).replace(/_/g,' to ').replace(/\b\w/g,m=>m.toUpperCase());
  const optRoutes=sel=>V7_ROUTES.map(r=>`<option value="${r}" ${r===sel?'selected':''}>${label(r)}</option>`).join('');
  const optClass=sel=>V7_CLASS.map(c=>`<option value="${c}" ${c===sel?'selected':''}>${c}</option>`).join('');
  function note(m){ if(typeof toast==='function') toast(m); }
  function audit7(action){try{DB.audit=DB.audit||[];DB.audit.unshift({time:new Date().toLocaleString(),action:'V7 '+action,user:currentRole||'system'});DB.audit=DB.audit.slice(0,300);saveDB();}catch(e){}}
  function findRoute7(text){const q=norm(text);if(q.includes('liloan'))return'liloan';for(const r of V7_ROUTES){if(q.includes(r.replace(/_/g,' '))||q.includes(label(r).toLowerCase()))return r;const dest=r.replace('cebu_','');if(q.includes(dest))return r;for(const a of V7_ALIAS[r]||[])if(q.includes(norm(a)))return r;}return null;}
  function class7(text){const q=norm(text);if(q.includes('business')||/\bbc\b/.test(q))return'BC';if(q.includes('student')||/\bst\b/.test(q))return'ST';if(q.includes('minor')||q.includes('military')||/\bmi\b/.test(q))return'MI';if(q.includes('pwd')||q.includes('senior')||/\bsc\b/.test(q))return(q.includes('business')||/\bbc\b/.test(q))?'SC/PWD (BC)':'SC/PWD (TC/OA)';return'TC/OA';}
  function fare7(route,cls){const plan=V7_PLAN[route];if(!plan)return{total:0,legs:[]};const legs=plan.legs.map(k=>{const fromDB=DB?.paxFares?.[k]?.[cls];const direct=V7_DIRECT[k]?.[cls];const fallback=DB?.paxFares?.[k]?.['TC/OA'] ?? V7_DIRECT[k]?.['TC/OA'] ?? 0;return{key:k,label:label(k),fare:Number(fromDB??direct??fallback??0)};});return{total:Number(legs.reduce((a,b)=>a+b.fare,0).toFixed(2)),legs};}
  function baggage7(route,mode,cls,pax,weight,rounding){const free=mode==='normal'?(DB.freeAllowance[cls]||0):0;const freeTotal=free*pax;const excess=Math.max(0,weight-freeTotal);let E=mode==='normal'?excess/pax:weight;if(rounding==='ceil')E=Math.ceil(E);if(rounding==='floor')E=Math.floor(E);const slab=slabCost(E,DB.slabs[route][mode]);const total=mode==='normal'?slab.total*pax:slab.total;return{free,freeTotal,excess,E,slab,total};}
  function loadScore(route){const base=(DB.schedules?.[route]?.trips?.length||1)*18+(DB.stats?.routeCounts?.[route]||0)*12+(V7_PLAN[route].legs.length>1?16:0);const wk=[0,6].includes(new Date().getDay())?18:0;return Math.min(99,Math.round(base+wk+V7_PLAN[route].risk/3));}
  function riskColor(score){return score>70?'var(--bad)':score>45?'var(--warn)':'var(--ok)';}
  function syncV7(){try{DB.routeInnovation=DB.routeInnovation||{};DB.v7Version=V7_VERSION;delete DB.slabs.cebu_liloan;delete DB.paxFares.cebu_liloan;delete DB.schedules.cebu_liloan;V7_ROUTES.forEach(r=>{if(!DB.paxFares[r]){const o={};V7_CLASS.forEach(c=>o[c]=fare7(r,c).total);DB.paxFares[r]=o;}});saveDB();}catch(e){console.warn('V7 sync skipped',e);}}

  function ensureInnovationView(){
    if(!$v('view-innovation')){const section=document.createElement('div');section.id='view-innovation';section.className='view';const anchor=$v('view-map')||document.querySelector('.view:last-of-type');if(anchor&&anchor.parentNode)anchor.parentNode.insertBefore(section,anchor.nextSibling);else document.querySelector('.app')?.appendChild(section);}
  }
  function patchMenus(){
    if(typeof buildDrawerMenu==='function'&&!window.__v7DrawerPatched){const old=buildDrawerMenu;window.buildDrawerMenu=buildDrawerMenu=function(){old();const menu=$v('drawerMenu');if(menu&&!menu.querySelector('[data-view="innovation"]'))menu.insertAdjacentHTML('beforeend',`<div class="drawer-item" data-view="innovation" onclick="navigate('innovation')"><i>🚀</i> Innovation Packs</div>`);};window.__v7DrawerPatched=true;}
    if(typeof showView==='function'&&!window.__v7ShowPatched){const oldShow=showView;window.showView=showView=function(name){ensureInnovationView();if(name==='innovation'){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));$v('view-innovation').classList.add('active');document.querySelectorAll('.drawer-item').forEach(el=>el.classList.toggle('active',el.dataset.view==='innovation'));renderInnovation();return;}return oldShow(name);};window.__v7ShowPatched=true;}
  }

  window.renderInnovation=function(){
    const best=V7_ROUTES.map(r=>({r,s:loadScore(r)})).sort((a,b)=>b.s-a)[0];
    $v('view-innovation').innerHTML=`
      <div class="card v7-card"><div class="card-header"><span>🚀 Innovation Packs V7</span><span class="v7-badge"><span class="v7-pulse-dot"></span> Source-based</span></div>
        <div class="v7-grid3">
          <div class="v7-tile"><b>Calculator Core</b><small>Preserved, not rewritten</small></div>
          <div class="v7-tile"><b>${best?label(best.r).split(' to ')[1]:'--'}</b><small>Predicted busiest route</small></div>
          <div class="v7-tile"><b>${DB.history?.length||0}</b><small>Transactions stored</small></div>
        </div>
      </div>
      <div class="card"><div class="card-header">🧠 Smart Trip Optimizer</div>
        <div class="v7-grid">
          <div class="input-group"><label>Route</label><select id="v7Route" onchange="v7Plan()">${optRoutes('cebu_tagbilaran')}</select></div>
          <div class="input-group"><label>Passenger Class</label><select id="v7Class" onchange="v7Plan()">${optClass('TC/OA')}</select></div>
          <div class="input-group"><label>Passengers</label><input id="v7Pax" type="number" min="1" value="1" oninput="v7Plan()"></div>
          <div class="input-group"><label>Total Weight kg</label><input id="v7Weight" type="number" min="0" step="0.1" value="0" oninput="v7Plan()"></div>
          <div class="input-group"><label>Baggage Mode</label><select id="v7Mode" onchange="v7Plan()"><option value="normal">Normal</option><option value="fragile">Fragile</option></select></div>
          <div class="input-group"><label>Rounding</label><select id="v7Round" onchange="v7Plan()"><option value="exact">Exact</option><option value="ceil">Ceiling</option><option value="floor">Floor</option></select></div>
        </div>
        <div class="grid2"><button class="primary block" onclick="v7Plan(true)">Generate Smart Quote</button><button class="accent block" onclick="v7ApplyToCalculator()">Send to Calculator</button></div>
        <div id="v7PlanOut"></div>
      </div>
      <div class="card v7-card"><div class="card-header">🛰 Route Orbit Map</div>${orbitHtml()}</div>
      <div class="card"><div class="card-header">⚓ Port Pulse + Risk Forecast</div><div id="v7PulseGrid" class="v7-grid"></div></div>
      <div class="card"><div class="card-header">🎫 Boarding Pass Generator</div><div class="v7-grid"><div class="input-group"><label>Passenger Name</label><input id="v7PassName" placeholder="Enter passenger name"></div><div class="input-group"><label>Route</label><select id="v7PassRoute">${optRoutes('cebu_tagbilaran')}</select></div></div><button class="primary block" onclick="v7GeneratePass()">Generate Smart Boarding Pass</button><div id="v7PassOut" style="margin-top:10px"></div></div>
      <div class="card"><div class="card-header">🛡 AI Anomaly Detector</div><div id="v7Anomaly"></div></div>
      <div class="card"><div class="card-header">📡 Live Innovation Console</div><div class="v7-console" id="v7Console"></div></div>
    `;
    v7Plan();renderPulse();renderAnomalies();renderConsole();
  };
  function orbitHtml(){const pts={cebu:[50,50],cebu_tagbilaran:[23,32],cebu_maasin:[30,72],cebu_surigao:[74,75],cebu_siquijor:[69,58],cebu_dumaguete:[76,41],cebu_ormoc:[66,24],cebu_palompon:[38,20],cebu_getafe:[18,55]};const ports=V7_ROUTES.map(r=>`<div class="v7-port" style="left:${pts[r][0]}%;top:${pts[r][1]}%">${label(r).split(' to ')[1]}</div>`).join('');return`<div class="v7-orbit"><div class="v7-port cebu">CEBU HUB</div>${ports}</div>`;}
  window.v7Plan=function(saveQuote){try{const route=$v('v7Route')?.value||'cebu_tagbilaran';const cls=$v('v7Class')?.value||'TC/OA';const pax=Math.max(1,parseInt($v('v7Pax')?.value||'1',10));const weight=Math.max(0,Number($v('v7Weight')?.value||0));const mode=$v('v7Mode')?.value||'normal';const rounding=$v('v7Round')?.value||'exact';const f=fare7(route,cls);const bag=baggage7(route,mode,cls==='BC'?'business':'tourist',pax,weight,rounding);const passenger=f.total*pax;const total=passenger+bag.total;const load=loadScore(route);const plan=V7_PLAN[route];const out=`<div class="v7-plan"><div class="quote-line"><span>Route</span><strong>${label(route)}</strong></div><div class="quote-line"><span>Route Type</span><strong>${plan.type}</strong></div><div class="quote-line"><span>Gate / Zone</span><strong>${plan.gate} • ${plan.travel}</strong></div>${f.legs.map(l=>`<div class="quote-line"><span>${l.label}</span><strong>${peso(l.fare)} × ${pax}</strong></div>`).join('')}<hr style="border-color:var(--border);margin:8px 0"><div class="quote-line"><span>Passenger Total</span><strong>${peso(passenger)}</strong></div><div class="quote-line"><span>Baggage Total</span><strong>${peso(bag.total)}</strong></div><div class="quote-line"><span>Free Allowance</span><strong>${bag.freeTotal.toFixed(1)}kg</strong></div><div class="quote-line"><span>Chargeable</span><strong>${bag.E.toFixed(2)}kg</strong></div><div class="v7-total">Grand Total: ${peso(total)}</div><div class="v7-meter"><span style="width:${load}%;background:${riskColor(load)}"></span></div><small style="color:var(--text3)">Load prediction: ${load}% • ${plan.eta}</small><div class="grid2" style="margin-top:8px"><button class="sm primary" onclick="v7CopyQuote()">Copy Quote</button><button class="sm accent" onclick="v7GeneratePassFromPlan()">Create Boarding Pass</button></div></div>`;$v('v7PlanOut').innerHTML=out;window.__v7Quote=`${label(route)}\nClass: ${cls}\nPax: ${pax}\nPassenger: ${peso(passenger)}\nBaggage: ${peso(bag.total)}\nGrand Total: ${peso(total)}\nGate: ${plan.gate}\nTravel: ${plan.travel}`;window.__v7Plan={route,cls,pax,weight,mode,rounding,total,passenger,baggage:bag.total};if(saveQuote){audit7('smart quote generated for '+label(route));note('Smart quote generated.');}}catch(e){console.error(e);if($v('v7PlanOut'))$v('v7PlanOut').innerHTML='<div class="v7-plan warn">Cannot generate quote. Check route/slab data.</div>';}};
  window.v7CopyQuote=function(){const txt=window.__v7Quote||'No quote yet.';if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>note('Smart quote copied.')).catch(()=>note(txt));else note(txt);};
  window.v7ApplyToCalculator=function(){const p=window.__v7Plan||{};showView('calculator');setTimeout(()=>{if($v('calcRoute'))$v('calcRoute').value=p.route||'cebu_tagbilaran';if($v('calcMode'))$v('calcMode').value=p.mode||'normal';if($v('pax'))$v('pax').value=p.pax||1;if($v('weight'))$v('weight').value=p.weight||0;if($v('rounding'))$v('rounding').value=p.rounding||'exact';if(typeof compute==='function')compute();note('V7 quote sent to preserved calculator.');},80);};
  function renderPulse(){const box=$v('v7PulseGrid');if(!box)return;box.innerHTML=V7_ROUTES.map(r=>{const s=loadScore(r);return`<div class="v7-tile"><b>${label(r).split(' to ')[1]}</b><small>${V7_PLAN[r].gate} • ${V7_PLAN[r].travel}</small><div class="v7-meter"><span style="width:${s}%;background:${riskColor(s)}"></span></div><small>Load ${s}% • Risk ${V7_PLAN[r].risk}%</small></div>`}).join('');}
  function renderAnomalies(){const list=(DB.history||[]).slice(0,80);const issues=[];list.forEach((h,i)=>{if(Number(h.weight)>80)issues.push(`Heavy baggage: ${label(h.route)} ${h.weight}kg`);if(Number(h.total)<=0&&Number(h.weight)>0)issues.push(`Possible zero-fee issue: ${label(h.route)} ${h.weight}kg`);if(i>0&&h.route===list[i-1].route&&h.weight===list[i-1].weight&&Math.abs(new Date(h.time)-new Date(list[i-1].time))<60000)issues.push(`Possible duplicate transaction: ${label(h.route)} ${h.weight}kg`);});$v('v7Anomaly').innerHTML=issues.length?issues.slice(0,8).map(x=>`<div class="v7-plan warn">⚠️ ${x}</div>`).join(''):'<div class="v7-plan ok">✅ No major anomalies detected in recent transactions.</div>';}
  function renderConsole(){const box=$v('v7Console');if(!box)return;const now=new Date().toLocaleTimeString();const rows=[`[${now}] V7 innovation pack online`,`[${now}] Calculator core status: preserved`,`[${now}] Main Cebu route filter: active`,`[${now}] Liloan route: removed/not included`,`[${now}] AI multilingual hints: English/Tagalog/Bisaya keywords loaded`,`[${now}] Risk engine watching ${V7_ROUTES.length} routes`];box.innerHTML=rows.map(r=>`<div>${r}</div>`).join('');}
  window.v7GeneratePass=function(){const name=($v('v7PassName')?.value||'Passenger').trim();const route=$v('v7PassRoute')?.value||'cebu_tagbilaran';renderPass(name,route,$v('v7PassOut'));};
  window.v7GeneratePassFromPlan=function(){const p=window.__v7Plan||{};renderPass('Passenger',p.route||'cebu_tagbilaran',$v('v7PlanOut'));};
  function renderPass(name,route,target){const plan=V7_PLAN[route];const code='OFF-'+Date.now().toString().slice(-7);const group=plan.legs.length>1?'CONNECT':'DIRECT';const html=`<div class="v7-pass"><h3>⛴ OCEAN FAST FERRIES</h3><div class="v7-pass-grid"><div><div class="v7-pass-row"><span>Name</span><b>${name}</b></div><div class="v7-pass-row"><span>Route</span><b>${label(route)}</b></div><div class="v7-pass-row"><span>Gate</span><b>${plan.gate}</b></div><div class="v7-pass-row"><span>Group</span><b>${group}</b></div><div class="v7-pass-row"><span>Travel</span><b>${plan.travel}</b></div><div class="v7-pass-row"><span>Code</span><b>${code}</b></div><span class="v7-status">AI Verified • ${plan.eta}</span></div><div class="v7-qr" title="${code}"></div></div><button class="sm primary" style="margin-top:10px" onclick="window.print()">Print Pass</button></div>`;if(target)target.insertAdjacentHTML('beforeend',html);audit7('boarding pass generated '+code+' for '+label(route));}

  function patchComputeV7(){if(typeof compute==='function'&&!window.__v7ComputePatched){const old=compute;window.compute=compute=function(override=null){const res=old(override);setTimeout(()=>{try{const route=$v('calcRoute')?.value;if(!route||!V7_ROUTES.includes(route))return;const box=$v('resultCard');if(box&&!$v('v7AfterCompute')){const score=loadScore(route);box.insertAdjacentHTML('beforeend',`<div id="v7AfterCompute" class="v7-plan"><strong>V7 AI Ops Add-on</strong><br>Gate: ${V7_PLAN[route].gate} • Load prediction: ${score}% • Status: ${V7_PLAN[route].eta}<div class="v7-meter"><span style="width:${score}%;background:${riskColor(score)}"></span></div><button class="sm accent" onclick="showView('innovation')">Open Innovation Pack</button></div>`);}}catch(e){}},50);return res;};window.__v7ComputePatched=true;}}

      if(/bagahe|bagahi|kargada|maleta|luggage|baggage/.test(s)){const kg=(s.match(/(\d+(?:\.\d+)?)\s*(kg|kilo|kilos)/)||[])[1];if(kg){const r=findRoute7(s)||'cebu_tagbilaran';const pax=Number((s.match(/(\d+)\s*(pax|passenger|pasahero|passengers)/)||[])[1]||1);const mode=/fragile|cargo|kargada/.test(s)?'fragile':'normal';const b=baggage7(r,mode,/business|bc/.test(s)?'business':'tourist',pax,Number(kg),'exact');return`Baggage estimate for ${label(r)}:\n${pax} pax • ${kg}kg • ${mode}\nFree: ${b.freeTotal}kg\nChargeable: ${b.E.toFixed(2)}kg\nBaggage fee: ${peso(b.total)}`;}}

  function addDock(){if($v('v7CommandBtn'))return;const b=document.createElement('button');b.id='v7CommandBtn';b.className='v7-command-btn';b.textContent='🚀';b.onclick=()=>{$v('v7MiniDock')?.classList.toggle('open')};document.body.appendChild(b);const d=document.createElement('div');d.id='v7MiniDock';d.className='v7-mini-dock';d.innerHTML=`<button onclick="showView('innovation')">🚀 Innovation Packs</button><button onclick="showView('calculator')">🧮 Preserved Calculator</button><button onclick="openV7Ask()">🤖 Ask AI</button><button onclick="v7QuickPass()">🎫 Quick Pass</button>`;document.body.appendChild(d);}

  function patchDashboard7(){if(typeof buildDashboard==='function'&&!window.__v7DashPatched){const old=buildDashboard;window.buildDashboard=buildDashboard=function(){old();const v=$v('view-dashboard');if(v&&!$v('v7DashPack')){const top=V7_ROUTES.map(r=>({r,s:loadScore(r)})).sort((a,b)=>b.s-a.s).slice(0,3);v.insertAdjacentHTML('beforeend',`<div id="v7DashPack" class="card v7-card"><div class="card-header"><span>🚀 V7 Innovation Snapshot</span><span class="v7-badge">New Pack</span></div><div class="v7-grid3">${top.map(x=>`<div class="v7-tile"><b>${label(x.r).split(' to ')[1]}</b><small>Predicted load ${x.s}%</small><div class="v7-meter"><span style="width:${x.s}%;background:${riskColor(x.s)}"></span></div></div>`).join('')}</div><button class="primary block" style="margin-top:10px" onclick="showView('innovation')">Open Innovation Packs</button></div>`);}};window.__v7DashPatched=true;}}
  function bootV7(){try{ensureInnovationView();syncV7();patchMenus();patchComputeV7();patchAI7();patchDashboard7();addDock();if(typeof buildDrawerMenu==='function')buildDrawerMenu();if($v('view-dashboard')?.classList.contains('active')&&currentRole)showView('dashboard');window.__OFF_PATCH_VERSION=V7_VERSION;audit7('innovation pack loaded');}catch(e){console.error('V7 innovation patch error',e);}}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',bootV7);else bootV7();

<script>
(function(){
  'use strict';
  const V8_VERSION='v8-pack3-command-center-source-based';
  const ROUTES=['cebu_tagbilaran','cebu_maasin','cebu_surigao','cebu_siquijor','cebu_dumaguete','cebu_ormoc','cebu_palompon','cebu_getafe'];
  const INFO={
    cebu_tagbilaran:{title:'Cebu to Tagbilaran',dest:'Tagbilaran',vessel:'OJ 388',dep:'5:10 AM',arr:'7:10 AM',travel:'2h',gate:'A1',weather:'Calm sea',type:'Direct',fare:1000,x:37,y:37},
    cebu_maasin:{title:'Cebu to Maasin',dest:'Maasin',vessel:'OJ 03',dep:'7:00 AM',arr:'10:00 AM',travel:'3h',gate:'C1',weather:'Clear skies',type:'Direct',fare:1430,x:63,y:65},
    cebu_surigao:{title:'Cebu to Surigao',dest:'Surigao',vessel:'OJ 03 + OJ 388',dep:'7:00 AM',arr:'12:30 PM',travel:'5h 30m',gate:'C2',weather:'Transfer watch',type:'Connect via Maasin',fare:2470,x:76,y:72},
    cebu_siquijor:{title:'Cebu to Siquijor',dest:'Siquijor',vessel:'OJ 388 + OJ 988',dep:'6:00 AM',arr:'10:20 AM',travel:'4h 20m',gate:'A2',weather:'Moderate sea',type:'Connect via Tagbilaran',fare:2000,x:45,y:70},
    cebu_dumaguete:{title:'Cebu to Dumaguete',dest:'Dumaguete',vessel:'OJ 388',dep:'5:10 AM',arr:'9:30 AM',travel:'4h 20m',gate:'A3',weather:'Transfer watch',type:'Connect via Tagbilaran',fare:2170,x:51,y:80},
    cebu_ormoc:{title:'Cebu to Ormoc',dest:'Ormoc',vessel:'OJ 8',dep:'6:00 AM',arr:'9:00 AM',travel:'3h',gate:'B1',weather:'Calm sea',type:'Direct',fare:1430,x:72,y:39},
    cebu_palompon:{title:'Cebu to Palompon',dest:'Palompon',vessel:'OJ 02',dep:'10:00 AM',arr:'1:00 PM',travel:'3h',gate:'B2',weather:'Clear skies',type:'Direct',fare:1430,x:68,y:28},
    cebu_getafe:{title:'Cebu to Getafe',dest:'Getafe',vessel:'OJ 10',dep:'6:30 AM',arr:'7:30 AM',travel:'1h',gate:'D1',weather:'Fast lane',type:'Direct',fare:585,x:39,y:25}
  };
  const $=id=>document.getElementById(id);
  const peso=n=>(typeof fmtPHP==='function'?fmtPHP(Number(n)||0):'₱'+(Number(n)||0).toFixed(2));
  const label=r=>INFO[r]?.title||String(r).replace(/_/g,' to ').replace(/\b\w/g,m=>m.toUpperCase());
  const nowMin=()=>{const d=new Date();return d.getHours()*60+d.getMinutes();};
  const baseNoise=(route,offset=0)=>{let sum=nowMin()+offset; for(const ch of route) sum+=ch.charCodeAt(0); return sum;};
  const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
  function load(route){const hist=(DB?.stats?.routeCounts?.[route]||0)*6;const weekend=[0,6].includes(new Date().getDay())?14:0;return clamp(25+(baseNoise(route)%48)+hist+weekend,8,99);}
  function risk(route){const l=load(route);const connect=INFO[route].type.includes('Connect')?14:0;const heavy=(DB?.history||[]).slice(0,30).filter(h=>h.route===route&&Number(h.weight)>60).length*5;return clamp(Math.round(l*.7+connect+heavy),5,99);}
  function statusClass(n){return n>78?'danger':n>58?'warn':'ok';}
  function statusText(n){return n>78?'Critical':n>58?'Moderate':'Smooth';}

  function ensureView(){if(!$('view-command')){const v=document.createElement('div');v.id='view-command';v.className='view';const anchor=$('view-innovation')||$('view-map')||document.querySelector('.view:last-of-type'); if(anchor&&anchor.parentNode) anchor.parentNode.insertBefore(v,anchor.nextSibling); else document.querySelector('.app')?.appendChild(v);}}
  function patchMenu(){if(typeof buildDrawerMenu==='function'&&!window.__v8MenuPatched){const old=buildDrawerMenu;window.buildDrawerMenu=buildDrawerMenu=function(){old();const menu=$('drawerMenu');if(menu&&!menu.querySelector('[data-view="command"]')){const after=menu.querySelector('[data-view="innovation"]');const html='<div class="drawer-item" data-view="command" onclick="navigate(\'command\')"><i>🛰️</i> Command Center</div>';if(after)after.insertAdjacentHTML('afterend',html);else menu.insertAdjacentHTML('beforeend',html);}};window.__v8MenuPatched=true;}}
  function patchShow(){if(typeof showView==='function'&&!window.__v8ShowPatched){const old=showView;window.showView=showView=function(name){ensureView();if(name==='command'){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));$('view-command').classList.add('active');document.querySelectorAll('.drawer-item').forEach(el=>el.classList.toggle('active',el.dataset.view==='command'));renderCommand();return;}return old(name);};window.__v8ShowPatched=true;}}
  function stats(){const s=DB?.stats||{};return{tx:s.transactions||0,rev:s.revenue||0,kg:s.totalKg||0,top:s.topRoute||'cebu_tagbilaran'};}
  function renderPulseMap(){return `<div class="v8-pulse-map"><div class="v8-node cebu">CEBU HUB</div>${Object.entries(INFO).map(([r,i])=>{const x1=50,y1=50,x2=i.x,y2=i.y;const dx=x2-x1,dy=y2-y1;const len=Math.sqrt(dx*dx+dy*dy);const ang=Math.atan2(dy,dx)*180/Math.PI;return `<div class="v8-beam" style="left:${x1}%;top:${y1}%;width:${len}%;transform:rotate(${ang}deg);animation-delay:${(baseNoise(r)%9)/10}s"></div><div class="v8-node" style="left:${x2}%;top:${y2}%">${i.dest}</div>`}).join('')}</div>`;}
  function portMetrics(){const routePressure=ROUTES.map(r=>load(r));const avg=Math.round(routePressure.reduce((a,b)=>a+b,0)/routePressure.length);const baggage=clamp(Math.round((DB?.stats?.totalKg||0)%45 + avg*.55),10,98);const queue=clamp(avg+((new Date().getMinutes()%20)-8),8,99);const counters=clamp(Math.round((baggage+queue)/2),8,99);const transfer=clamp(Math.max(load('cebu_surigao'),load('cebu_siquijor'),load('cebu_dumaguete'))+8,15,99);return{avg,baggage,queue,counters,transfer};}
  function recommendation(m){if(m.queue>78||m.counters>78)return'Open 2 extra baggage counters and prioritize connecting passengers.';if(m.transfer>70)return'Announce transfer gate reminders for Surigao, Siquijor, and Dumaguete.';if(m.avg>58)return'Moderate load. Prepare standby staff near baggage release.';return'Operations smooth. Maintain normal staffing and monitor next departure.';}

<script id="v13CleanNavScript">
(function(){
  if(window.__v13CleanLeftNavOnly) return;
  window.__v13CleanLeftNavOnly = true;

  const FLOAT_SELECTORS = [
    '#v6FloatTools', '.v6-floating-tools',
    '#v7CommandBtn', '#v7MiniDock', '.v7-command-btn', '.v7-mini-dock',
    '#v8Dock', '#v9CleanDock', '#v10Dock', '#v11Dock',
    '#bottomNavSafe', '.bottom-nav', '.quick-dock', '.quickDock',
    '#aiFloatBtn', '.ai-float-btn'
  ];

  function hideFloatingOnly(){
    FLOAT_SELECTORS.forEach(sel => {
      document.querySelectorAll(sel).forEach(el => {
        if(!el.closest('#sideDrawer') && !el.closest('.side-drawer')){
          el.style.display = 'none';
          el.style.visibility = 'hidden';
          el.style.pointerEvents = 'none';
          el.setAttribute('aria-hidden','true');
        }
      });
    });
  }

  function normalizeDrawer(){
    const menu = document.getElementById('drawerMenu');
    if(!menu) return;
    const seen = new Set();
    Array.from(menu.querySelectorAll('.drawer-item')).forEach(item => {
      const key = (item.dataset.view || item.textContent || '').trim().toLowerCase();
      if(!key) return;
      if(seen.has(key)) item.remove();
      else seen.add(key);
    });
  }

  function safePatchDrawerBuilder(){
    const fn = window.buildDrawerMenu;
    if(typeof fn !== 'function' || fn.__v13Wrapped) return;
    window.buildDrawerMenu = function(){
      const result = fn.apply(this, arguments);
      normalizeDrawer();
      hideFloatingOnly();
      return result;
    };
    window.buildDrawerMenu.__v13Wrapped = true;
  }

  function run(){
    safePatchDrawerBuilder();
    normalizeDrawer();
    hideFloatingOnly();
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();

  setTimeout(run, 100);
  setTimeout(run, 800);
  setTimeout(run, 1800);
  new MutationObserver(run).observe(document.documentElement, {childList:true, subtree:true});
})();
</script>

  function downloadBlob(content,type,name){const a=document.createElement('a');const blob=content instanceof Blob?content:new Blob([content],{type});a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),300);settings.lastExport=new Date().toLocaleString();jset(SETTINGS_KEY,settings);}

  function renderExportCenter(){

  }
  window.v14HardRecovery=function(){ if(!confirm('Hard recovery clears local app data. Export backup first. Continue?'))return; localStorage.clear(); location.reload(); };
  function showErrorScreen(msg){
    if(qs('v14ErrorScreen')) return;
    const el=document.createElement('div'); el.id='v14ErrorScreen'; el.className='v14-error-screen';
    el.innerHTML=`<div class="v14-error-box"><h2>Ocean Fast Ferries Recovery</h2><p>${msg||'The app did not load correctly.'}</p><div class="v14-toolbar"><button class="primary block" onclick="v14SetSafeMode(true);document.getElementById('v14ErrorScreen').remove();try{showView('dashboard')}catch(e){}">Open Safe Mode</button><button class="accent block" onclick="location.reload()">Reload</button><button class="danger block" onclick="v14HardRecovery()">Reset Local Data</button></div></div>`; document.body.appendChild(el);

  window.addEventListener('unhandledrejection',e=>{console.warn('V14 promise rejection:',e.reason)});
  function blankWatcher(){setTimeout(()=>{const app=document.querySelector('.app'); const active=document.querySelector('.view.active'); if(!app || !document.body.innerText.trim() || (active && active.innerText.trim().length<3 && !qs('loginOverlay'))){showErrorScreen('Blank screen protection activated.')}} ,2600);}
  function cleanFloating(){qsa('#v11Dock,#v10Dock,#v9CleanDock,#v8Dock,#v7MiniDock,#v6FloatTools,#bottomNavSafe,.bottom-nav,.quick-dock,.ai-float-btn,#aiFloatBtn').forEach(el=>{if(!el.closest('.side-drawer')){el.style.display='none';el.style.visibility='hidden';el.style.pointerEvents='none';}})}
  function boot(){

<script id="v15PublicAdminScript">
(function(){
  if(window.__v15PublicAccessAdminLogin) return;
  window.__v15PublicAccessAdminLogin = true;
  const V15_VERSION = 'v16-fixed-public-admin-no-blank';
  const qs = id => document.getElementById(id);
  const qsa = sel => Array.from(document.querySelectorAll(sel));
  const toast15 = msg => { try{ if(typeof toast === 'function') return toast(msg); }catch(e){} const el=document.createElement('div'); el.className='toast'; el.textContent=msg; document.body.appendChild(el); setTimeout(()=>el.remove(),2500); };
  const PUBLIC_ITEMS = [
    {view:'dashboard', icon:'🏠', label:'Dashboard'},
    {view:'calculator', icon:'🧮', label:'Baggage Calc'},
    {view:'damage', icon:'🧳', label:'Baggage Damage Detector'},
    {view:'fares', icon:'💵', label:'Fares & Slabs'},
    {view:'schedules', icon:'🕐', label:'Schedules'},
    {view:'history', icon:'📋', label:'History'},
    {view:'exportcenter', icon:'📤', label:'Export Center'},
    {view:'safemode', icon:'🛡️', label:'Safe Mode'},
    {view:'admin', icon:'🔐', label:'Admin Panel'}
  ];

  function safeGetDB(){ try{return DB || {}}catch(e){return {}} }
  function currentIsAdmin(){ try{return currentRole === 'supervisor'}catch(e){return false} }
  function setRole(role){ try{ currentRole = role; }catch(e){} }
  function activeViewName(){ const a=document.querySelector('.view.active'); return a ? (a.id||'').replace('view-','') : ''; }

  function storageStats(){
    let bytes=0;
    try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i)||''; bytes += k.length + (localStorage.getItem(k)||'').length; } }catch(e){}
    const mb = bytes / 1024 / 1024;
    return {mb, pct:Math.min(100, Math.round((mb/5)*100))};
  }

  function ensurePublicState(){
    if(!currentIsAdmin()) setRole('public');
    const isAdmin = currentIsAdmin();
    document.body.classList.toggle('v15-admin', isAdmin);
    document.body.classList.toggle('v15-public', !isAdmin);

    const badge=qs('roleBadge');
    const badgeText = isAdmin ? '👑 Admin' : '🌐 Public Access';
    if(badge && badge.textContent !== badgeText) badge.textContent = badgeText;

    const logoutBtn=qs('headerLogoutBtn');
    if(logoutBtn){
      const title = isAdmin ? 'Admin Logout' : 'Admin Login';
      if(logoutBtn.title !== title) logoutBtn.title = title;
      const display = isAdmin ? '' : 'none';
      if(logoutBtn.style.display !== display) logoutBtn.style.display = display;
    }

    const drawerLogout=document.querySelector('.drawer-logout');
    if(drawerLogout){
      const label = isAdmin ? '🚪 Admin Logout' : '🔐 Admin Login';
      if(drawerLogout.textContent !== label) drawerLogout.textContent = label;
      drawerLogout.onclick = isAdmin ? window.logout : window.v15OpenAdminLogin;
    }
  }

  function cleanLoginBox(){
    const box=document.querySelector('#loginOverlay .login-box');
    if(!box) return;
    const subtitle=box.querySelector('p');
    if(subtitle) subtitle.innerHTML = 'Admin Panel Login Only<br><span style="font-size:.62rem;color:var(--text3)">Normal tools are public and do not need login.</span>';
    const h=box.querySelector('h2'); if(h) h.textContent='🔐 Ocean Fast Ferries Admin';
    const u=qs('loginUser'), p=qs('loginPass');
    if(u) u.placeholder='Admin username';
    if(p) p.placeholder='Admin password';
    const btn=qs('loginSubmitBtn') || box.querySelector('button.primary'); if(btn) btn.textContent='Login to Admin Panel';
    if(!qs('v15AdminHint')){
      const hint=document.createElement('div'); hint.id='v15AdminHint'; hint.className='trip-row'; hint.style.marginTop='10px'; hint.innerHTML='<b>Public access:</b> Dashboard, calculator, damage detector, fares, schedules, history, and export center are open to everyone.<br><b>Admin:</b> login is required only when opening Admin Panel.'; box.appendChild(hint);
    }
  }

  window.v15OpenAdminLogin = function(){
    cleanLoginBox();
    const ov=qs('loginOverlay');
    if(!ov) return;
    ov.classList.add('v15-admin-login');
    ov.style.setProperty('display','flex','important');
    const u=qs('loginUser'), p=qs('loginPass');
    if(u) u.value=''; if(p) p.value='';
    setTimeout(()=>u && u.focus(),80);
    toast15('Admin login required for Admin Panel only.');
  };

  window.v15CloseAdminLogin = function(){
    const ov=qs('loginOverlay');
    if(ov){ ov.classList.remove('v15-admin-login'); ov.style.setProperty('display','none','important'); }
    if(!currentIsAdmin()) setRole('public');
    ensurePublicState();
    if(!activeViewName()) safeShow('dashboard');
  };

  function safeShow(view){ try{ if(typeof showView==='function') showView(view); }catch(e){ console.warn('V15 safeShow',e); } }

  function buildCleanDrawer(){
    const menu=qs('drawerMenu'); if(!menu) return;
    const html = PUBLIC_ITEMS.map(i => `<div class="drawer-item" data-view="${i.view}" onclick="navigate('${i.view}')"><i>${i.icon}</i> ${i.label}</div>`).join('');
    menu.innerHTML = html;
    qsa('#drawerMenu .drawer-item').forEach(el => el.classList.toggle('active', el.dataset.view === activeViewName()));
    ensurePublicState();
  }

  function patchDrawer(){
    window.buildDrawerMenu = buildDrawerMenu = function(){ buildCleanDrawer(); };
    buildCleanDrawer();
  }

  function patchAuth(){
    window.attemptLogin = attemptLogin = function(){
      cleanLoginBox();
      const u=(qs('loginUser')?.value||'').trim();
      const p=(qs('loginPass')?.value||'').trim();
      if(!u || !p) return toast15('Please enter admin credentials.');
      const db=safeGetDB();
      const sup=(db.creds && db.creds.supervisor) ? db.creds.supervisor : {u:'demo',p:'demo'};
      const cashier=(db.creds && db.creds.cashier) ? db.creds.cashier : {u:'cashier',p:'cashier'};
      const validSupervisor = (u===sup.u && p===sup.p) || (u==='demo' && p==='demo') || (u==='admin' && p==='admin') || (u==='supervisor' && p==='supervisor');
      if(validSupervisor){
        setRole('supervisor');
        const ov=qs('loginOverlay'); if(ov){ ov.classList.remove('v15-admin-login'); ov.style.setProperty('display','none','important'); }
        ensurePublicState();
        buildCleanDrawer();
        toast15('Admin unlocked.');
        safeShow('admin');
        return;
      }
      if(u===cashier.u && p===cashier.p){
        setRole('public');
        window.v15CloseAdminLogin();
        toast15('Cashier login is no longer required. Public access is already enabled.');
        return;
      }
      toast15('Invalid admin username or password.');
    };

    window.logout = logout = function(){
      setRole('public');
      const ov=qs('loginOverlay'); if(ov){ ov.classList.remove('v15-admin-login'); ov.style.setProperty('display','none','important'); }
      try{ chatContext=[]; }catch(e){}
      ensurePublicState();
      buildCleanDrawer();
      toast15('Admin logged out. Public mode active.');
      safeShow('dashboard');
    };
  }

  function patchNavigation(){
    const oldShow = window.showView;
    if(typeof oldShow !== 'function' || oldShow.__v15Wrapped) return;
    window.showView = showView = function(name){
      if(name === 'admin' && !currentIsAdmin()){
        qsa('.drawer-item').forEach(el=>el.classList.toggle('active', el.dataset.view==='admin'));
        window.v15OpenAdminLogin();
        return;
      }
      const result = oldShow.apply(this, arguments);
      ensurePublicState();
      buildCleanDrawer();
      if(name === 'dashboard') setTimeout(addV15DashboardPanel, 40);
      if(name === 'damage') setTimeout(addV15DamageWorkflow, 80);
      if(name === 'exportcenter') setTimeout(addV15ExportNotes, 80);
      return result;
    };
    window.showView.__v15Wrapped = true;
  }

  function addV15DashboardPanel(){
    const v=qs('view-dashboard'); if(!v || qs('v15PublicPanel')) return;
    const st=storageStats();
    const warn = st.mb > 4 ? 'v15-storage-warn' : '';
    v.insertAdjacentHTML('afterbegin', `
      <div class="card glow v15-card ${warn}" id="v15PublicPanel">
        <div class="card-header"><span>🌐 V15 Public Access Mode</span><span class="v15-pill ${currentIsAdmin()?'admin':'ok'}">${currentIsAdmin()?'ADMIN UNLOCKED':'NO LOGIN NEEDED'}</span></div>
        <p class="muted">Normal users can open the app and use the calculator, damage detector, fares, schedules, history, and export tools immediately. Login appears only when Admin Panel is opened.</p>
        <div class="v15-kpis">
          <div class="v15-kpi"><b>${currentIsAdmin()?'Admin':'Public'}</b><span>Current Mode</span></div>
          <div class="v15-kpi"><b>${st.mb.toFixed(2)}MB</b><span>Storage</span></div>
          <div class="v15-kpi"><b>Left Nav</b><span>Navigation</span></div>
        </div>
        <div class="v14-meter"><span style="width:${st.pct}%"></span></div>
        ${st.mb>4?'<div class="trip-row" style="margin-top:8px"><b>Storage warning:</b> Export a backup soon, then reset old photos or logs if needed.</div>':''}
      </div>`);
  }

  function addV15DamageWorkflow(){
    const v=qs('view-damage'); if(!v || qs('v15DamageWorkflow')) return;
    v.insertAdjacentHTML('afterbegin', `
      <div class="card glow v15-card" id="v15DamageWorkflow">
        <div class="card-header"><span>📷 V15 Multi-Angle Damage Workflow</span><span class="v15-pill ok">Staff Confirmed</span></div>
        <div class="v15-flow">
          <div class="v15-step"><b>1</b>Claim Stub / Tag</div>
          <div class="v15-step"><b>2</b>Full Luggage</div>

          <div class="v15-step"><b>4</b>Confirm + Save</div>
        </div>
        <p class="muted" style="margin-top:8px">The detector keeps auto-capture evidence, but the final damage type and claim summary should still be confirmed by staff before locking.</p>
      </div>`);
  }

  function addV15ExportNotes(){
    const v=qs('view-exportcenter'); if(!v || qs('v15ExportNote')) return;
    v.insertAdjacentHTML('afterbegin', `
      <div class="card glow v15-card" id="v15ExportNote">
        <div class="card-header"><span>💾 V15 Backup Reminder</span><span class="v15-pill">Field Ready</span></div>

  }

  function patchDamageTab(){

    window.damageTab=function(tab){ const r=old.apply(this,arguments); setTimeout(addV15DamageWorkflow,60); return r; };
    window.damageTab.__v15Wrapped=true;
  }

  function patchAI(){
    if(typeof aiOfflineRespond !== 'function' || aiOfflineRespond.__v15Wrapped) return;
    const old=aiOfflineRespond;
    window.aiOfflineRespond = aiOfflineRespond = function(q){
      const s=String(q||'').toLowerCase();
      if(/login|admin|password|supervisor/.test(s)) return 'V15 uses public access. Normal tools do not require login. Login is required only when opening the Admin Panel.';

  function patchExportNames(){
    if(typeof window.v14ExportFullBackup === 'function' && !window.v15ExportFullBackup){

    }
  }

  function openPublicApp(){
