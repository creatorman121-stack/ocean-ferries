<script id="ojV25SmartOpsScript">
(function(){
  if(window.__OJ_V25_SMART_OPS__) return;
  window.__OJ_V25_SMART_OPS__ = true;
  const VERSION='V25_SMART_OPS_EXPERIENCE';
  const CLAIM_KEY='oj_v22_claims';
  const TICKET_KEY='oj_v24_visit_tickets';
  const FEEDBACK_KEY='oj_v24_feedback';
  const NOTICE_KEY='oj_v25_public_notices';
  const TRAIN_KEY='oj_v25_training_progress';
  const PREF_KEY='oj_v25_prefs';
  const AUDIT_KEY='oj_v25_last_readiness_scan';
  const $=(id)=>document.getElementById(id);
  const qsa=(s,r=document)=>Array.from(r.querySelectorAll(s));
  const esc=(s)=>String(s??'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]));
  const load=(k,f)=>{try{const raw=localStorage.getItem(k);return raw?JSON.parse(raw):f}catch(e){return f}};
  const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));return true}catch(e){console.warn('V25 save failed',e);return false}};
  const now=()=>new Date().toLocaleString('en-PH',{timeZone:'Asia/Manila',hour12:true});
  const today=()=>new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
  const toast=(m)=>{try{if(typeof window.toast==='function')return window.toast(m)}catch(e){} const d=document.createElement('div');d.textContent=m;d.style.cssText='position:fixed;left:50%;top:16px;transform:translateX(-50%);background:#ff4fa3;color:white;padding:10px 14px;border-radius:999px;z-index:99999;font-weight:900;box-shadow:0 8px 24px rgba(0,0,0,.35)';document.body.appendChild(d);setTimeout(()=>d.remove(),2300)};
  const claims=()=>load(CLAIM_KEY,[]);
  const tickets=()=>load(TICKET_KEY,[]);
  const feedback=()=>load(FEEDBACK_KEY,[]);
  const notices=()=>load(NOTICE_KEY,seedNotices());
  const prefs=()=>load(PREF_KEY,{compact:false,autoNotice:true});
  const uid=(p)=>p+'-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).slice(2,5).toUpperCase();
  function routeLabel(r){ if(!r) return 'Unspecified route'; try{ if(typeof window.label==='function') return window.label(r); }catch(e){} return String(r).replace(/_/g,' → ').replace(/\b\w/g,c=>c.toUpperCase()); }
  function mask(s){s=String(s||'').trim();return s? s[0]+'***' : 'No name';}
  function seedNotices(){return [
    {id:'N-'+today()+'-001',level:'info',route:'all',title:'Mobile portal active',message:'Passengers may use claim status, fare tools, and service hub from their phone.',expires:'',createdAt:now()},
    {id:'N-'+today()+'-002',level:'warning',route:'cebu_tagbilaran',title:'Arrive early for peak trips',message:'Prepare ticket, valid ID, and baggage tag before counter verification.',expires:'',createdAt:now()}
  ];}
  function isOpen(c){return !['Closed','Resolved','Rejected','Done'].includes(String(c.status||''));}
  function claimAgeHours(c){const raw=c.updatedAt||c.createdAt||c.phtTimestamp||c.dateTaken;const t=Date.parse(raw);return Number.isFinite(t)?Math.max(0,(Date.now()-t)/36e5):0;}
  function risk(c){let s=10; const text=JSON.stringify(c).toLowerCase(); if(/critical|urgent|wet|missing|crack|broken/.test(text))s+=35;if(!c.tag&&!c.tagNo)s+=14;if(!c.contact&&!c.phone)s+=12;if(!c.lastName&&!c.name)s+=10;if(claimAgeHours(c)>24)s+=18;if(String(c.status||'New')==='New')s+=8;return Math.min(100,s);}
  function storage(){let total=0,items=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i)||'';const v=localStorage.getItem(k)||'';const b=(k.length+v.length)*2;total+=b;items.push({k,b});}}catch(e){} return {bytes:total,mb:total/1024/1024,pct:Math.min(100,Math.round(total/(4.5*1024*1024)*100)),items:items.sort((a,b)=>b.b-a.b)};}
  function ensureView(name){let v=$('view-'+name); if(!v){v=document.createElement('div');v.id='view-'+name;v.className='view';(document.querySelector('.app')||document.body).appendChild(v);} return v;}
  function activeNotices(){const n=notices();const d=today();return n.filter(x=>!x.expires||x.expires>=d).slice(0,30)}
  function health(){const cs=claims(),open=cs.filter(isOpen),missing=cs.filter(c=>(!c.tag&&!c.tagNo)||(!c.lastName&&!c.name)||(!c.contact&&!c.phone));const tk=tickets().filter(t=>String(t.status)!=='Done');const fb=feedback();const avg=fb.length?(fb.reduce((a,f)=>a+Number(f.rating||0),0)/fb.length):0;const st=storage();const urgent=open.filter(c=>risk(c)>=65).length;return {claims:cs,open,missing,tickets:tk,feedback:fb,avg,storage:st,urgent,score:Math.max(0,100-(urgent*12)-(missing.length*4)-Math.max(0,st.pct-70))};}
  function noticeTicker(){const rows=activeNotices().slice(0,3);return rows.length?rows.map(n=>`<div class="v25-notice ${esc(n.level)}"><b>${esc(n.title)}</b><br><small>${esc(n.route==='all'?'All routes':routeLabel(n.route))} • ${esc(n.message)}</small></div>`).join(''):'<p class="muted">No active notices.</p>';}
  function renderQuickDesk(){const h=health();ensureView('quickdesk').innerHTML=`
    <div class="card v25-shell"><div class="v25-title"><div><h2>⚡ V25 Quick Desk</h2><small>One mobile screen for the most used passenger and staff actions.</small></div><span class="v25-chip ${h.urgent?'red':'green'}">${h.urgent?h.urgent+' urgent':'Ready'}</span></div><div class="v25-grid" style="margin-top:12px"><div class="v25-kpi"><b>${h.open.length}</b><span>Open Claims</span></div><div class="v25-kpi"><b>${h.tickets.length}</b><span>Waiting Tickets</span></div><div class="v25-kpi"><b>${h.avg?h.avg.toFixed(1):'--'}</b><span>Avg Feedback</span></div><div class="v25-kpi"><b>${h.score}%</b><span>Site Readiness</span></div></div><div class="v25-meter"><span style="width:${h.score}%"></span></div></div>
    <div class="card"><div class="card-header">🚀 Fast Actions</div><div class="v25-action-grid">
      ${action('🧮','Baggage Calc','Compute official counter fee','calculator')}
      ${action('🧳','Report Baggage','Damage or lost baggage form','portal')}
      ${action('🔎','Claim Status','Track with claim number','claimstatus')}
      ${action('🧭','Service Hub','Passenger and staff service','servicehub')}
      ${action('🧩','Queue Manager','Prioritize pending cases','queuemanager')}
      ${action('📢','Notice Board','Route and port advisories','noticeboard')}
      ${action('🩺','Readiness Scan','Storage, errors, data quality','readiness')}
      ${action('🎓','Micro Training','Short SOP skill checks','training')}
    </div></div>
    <div class="card"><div class="card-header">📢 Active Notices</div>${noticeTicker()}</div>
    <div class="card"><div class="card-header">🎯 What needs attention</div>${attentionRows(h)}</div><div class="v25-bottom-space"></div>`;}
  function action(ico,title,sub,view){return `<button class="v25-action" onclick="showView('${view}')"><span class="ico">${ico}</span><b>${esc(title)}</b><small>${esc(sub)}</small></button>`}
  function attentionRows(h){const rows=[]; if(h.urgent)rows.push(['red','Urgent claims',h.urgent+' claim(s) have high priority score.','queuemanager']); if(h.missing.length)rows.push(['amber','Missing info',h.missing.length+' claim(s) need tag/contact/name completion.','queuemanager']); if(h.storage.pct>72)rows.push(['amber','Storage high','Export backup and clean duplicate data.','readiness']); if(!activeNotices().length)rows.push(['amber','No active notices','Add port or route advisory for passengers.','noticeboard']); if(!rows.length)rows.push(['green','All clear','No major issue detected right now.','readiness']); return rows.map(r=>`<div class="v25-row"><div><strong>${esc(r[1])}</strong><small>${esc(r[2])}</small></div><button class="sm" onclick="showView('${r[3]}')">Open</button></div>`).join('')}
  function renderNoticeBoard(){const ns=notices();const canEdit=isAdminUnlocked();ensureView('noticeboard').innerHTML=`
    <div class="card v25-shell"><div class="v25-title"><div><h2>📢 Public Notice Board</h2><small>Route advisories, port reminders, and passenger-facing announcements.</small></div><span class="v25-chip pink">${activeNotices().length} active</span></div></div>
    <div class="card"><div class="card-header">Active Notices</div>${ns.length?ns.map(noticeRow).join(''):'<p class="muted">No notices yet.</p>'}</div>
    <div class="card"><div class="card-header">${canEdit?'Add New Notice':'Notice Manager Locked'}</div>${canEdit?noticeForm():'<p class="muted">Open Admin Panel and login to add/edit public notices.</p><button class="primary block" onclick="showView(\'admin\')">Admin Login</button>'}</div><div class="v25-bottom-space"></div>`;}
  function noticeRow(n){return `<div class="v25-notice ${esc(n.level)}"><div class="v25-title"><div><b>${esc(n.title)}</b><small>${esc(n.route==='all'?'All routes':routeLabel(n.route))} • ${esc(n.createdAt)} ${n.expires?'• expires '+esc(n.expires):''}</small></div><span class="v25-chip ${n.level==='critical'?'red':n.level==='warning'?'amber':'green'}">${esc(n.level)}</span></div><p style="margin:8px 0 0;color:var(--text2,#dbe7ff)">${esc(n.message)}</p>${isAdminUnlocked()?`<button class="sm danger" onclick="v25DeleteNotice('${esc(n.id)}')">Remove</button>`:''}</div>`}
  function noticeForm(){return `<div class="grid2"><div class="input-group"><label>Level</label><select id="v25NoticeLevel"><option value="info">Info</option><option value="warning">Warning</option><option value="critical">Critical</option></select></div><div class="input-group"><label>Route</label><select id="v25NoticeRoute"><option value="all">All Routes</option>${routeOptionsHtml()}</select></div></div><div class="input-group"><label>Title</label><input id="v25NoticeTitle" placeholder="Example: Gate update"></div><div class="input-group"><label>Message</label><textarea id="v25NoticeMsg" rows="4" placeholder="Short passenger-friendly instruction"></textarea></div><div class="input-group"><label>Expires optional</label><input id="v25NoticeExp" type="date"></div><button class="primary block" onclick="v25SaveNotice()">Publish Notice</button>`}
  function routeOptionsHtml(){const routes=['cebu_tagbilaran','cebu_maasin','cebu_surigao','cebu_siquijor','cebu_dumaguete','cebu_ormoc','cebu_palompon','cebu_getafe'];return routes.map(r=>`<option value="${r}">${esc(routeLabel(r))}</option>`).join('')}
  window.v25SaveNotice=function(){const rows=notices();const item={id:uid('NOTICE'),level:$('v25NoticeLevel')?.value||'info',route:$('v25NoticeRoute')?.value||'all',title:$('v25NoticeTitle')?.value.trim()||'OceanJet Notice',message:$('v25NoticeMsg')?.value.trim()||'Please follow port staff instructions.',expires:$('v25NoticeExp')?.value||'',createdAt:now()};rows.unshift(item);save(NOTICE_KEY,rows.slice(0,80));toast('Notice published.');renderNoticeBoard();};
  window.v25DeleteNotice=function(id){if(!confirm('Remove this notice?'))return;save(NOTICE_KEY,notices().filter(n=>String(n.id)!==String(id)));renderNoticeBoard();toast('Notice removed.');};
  function isAdminUnlocked(){try{return sessionStorage.getItem('oj_v22_admin_unlocked')==='1'||localStorage.getItem('oj_v22_admin_unlocked')==='1'}catch(e){return false}}
  function renderQueueManager(){const rows=claims().slice().sort((a,b)=>risk(b)-risk(a));const lanes=[['New','New'],['Under Review','Under Review'],['Claim Stub Issued','Claim Stub Issued'],['Resolved','Resolved']];ensureView('queuemanager').innerHTML=`
    <div class="card v25-shell"><div class="v25-title"><div><h2>🧩 Smart Queue Manager</h2><small>Prioritize claim work by risk, missing information, and waiting time.</small></div><span class="v25-chip ${rows.filter(c=>risk(c)>=65&&isOpen(c)).length?'red':'green'}">Auto-ranked</span></div><div class="v25-stick"><input id="v25QueueSearch" placeholder="Search claim, tag, last name, route" oninput="v25FilterQueue()"></div></div>
    <div id="v25QueueLanes" class="v25-grid2">${lanes.map(l=>laneHtml(l[0],rows.filter(c=>(c.status||'New')===l[1] || (l[1]==='New'&&!c.status)))).join('')}</div><div class="v25-bottom-space"></div>`;}
  function laneHtml(title,rows){return `<div class="v25-lane"><h3>${esc(title)} (${rows.length})</h3>${rows.slice(0,8).map(queueCard).join('')||'<p class="muted">Empty lane.</p>'}</div>`}
  function queueCard(c){const r=risk(c),cls=r>=65?'red':r>=40?'amber':'green';const id=c.id||c.caseId||'NO-ID';return `<div class="v25-row"><div><strong>${esc(id)}</strong><small>${esc(c.type||'Claim')} • ${esc(routeLabel(c.route)||c.routeLabel||'')} • ${esc(mask(c.lastName||c.name))}<br>Tag: ${esc(c.tag||c.tagNo||'missing')} • Age: ${Math.round(claimAgeHours(c))}h</small></div><div class="right"><span class="v25-chip ${cls}">${r}%</span><br><button class="sm" onclick="v25CycleClaim('${esc(id)}')">Next</button></div></div>`}
  window.v25FilterQueue=function(){const q=String($('v25QueueSearch')?.value||'').toLowerCase();const rows=claims().filter(c=>JSON.stringify(c).toLowerCase().includes(q)).sort((a,b)=>risk(b)-risk(a));const lanes=[['New','New'],['Under Review','Under Review'],['Claim Stub Issued','Claim Stub Issued'],['Resolved','Resolved']];const out=$('v25QueueLanes'); if(out) out.innerHTML=lanes.map(l=>laneHtml(l[0],rows.filter(c=>(c.status||'New')===l[1] || (l[1]==='New'&&!c.status)))).join('');};
  window.v25CycleClaim=function(id){const rows=claims();const c=rows.find(x=>String(x.id||x.caseId)===String(id));if(!c)return;const seq=['New','Under Review','Claim Stub Issued','Resolved'];const cur=seq.indexOf(c.status||'New');c.status=seq[(cur+1+seq.length)%seq.length];c.updatedAt=now();save(CLAIM_KEY,rows);toast('Claim moved to '+c.status);renderQueueManager();};
  function readinessChecks(){const h=health();const sw=!!(navigator.serviceWorker&&navigator.serviceWorker.controller);const https=location.protocol==='https:'||location.hostname==='localhost'||location.protocol==='file:';const compact=prefs().compact;const duplicateIds=duplicateClaims().length;const checks=[
    ['App visible',!!document.querySelector('.view.active'),'Active view is available'],['Storage below 75%',h.storage.pct<75,`${h.storage.mb.toFixed(2)}MB used`],['No urgent backlog',h.urgent===0,`${h.urgent} urgent open claims`],['Claims have key info',h.missing.length===0,`${h.missing.length} claims missing info`],['No duplicate claim IDs',duplicateIds===0,`${duplicateIds} duplicate ID(s)`],['Service worker ready',sw||location.protocol==='file:',sw?'Active':'Needs GitHub Pages/browser reload'],['Secure context',https,location.protocol],['Compact mobile mode',compact,'Recommended for low-end Android']
  ];return checks;}
  function renderReadiness(){const checks=readinessChecks();const pass=checks.filter(c=>c[1]).length;const score=Math.round(pass/checks.length*100);localStorage.setItem(AUDIT_KEY,now());ensureView('readiness').innerHTML=`
    <div class="card v25-shell"><div class="v25-title"><div><h2>🩺 Site Readiness Scan</h2><small>Checks mobile performance, storage, queue quality, and deployment readiness.</small></div><span class="v25-chip ${score>80?'green':score>55?'amber':'red'}">${score}%</span></div><div class="v25-meter"><span style="width:${score}%"></span></div></div>
    <div class="card"><div class="card-header">Diagnostics</div>${checks.map(c=>`<div class="v25-row"><div><strong>${c[1]?'✅':'⚠️'} ${esc(c[0])}</strong><small>${esc(c[2])}</small></div><span class="v25-chip ${c[1]?'green':'amber'}">${c[1]?'Pass':'Check'}</span></div>`).join('')}</div>
    <div class="card"><div class="card-header">Repair Tools</div><div class="v25-action-grid"><button class="v25-action" onclick="v25ToggleCompact()"><span class="ico">📱</span><b>Toggle Fast Mobile Mode</b><small>Reduce animations and heavy visual effects.</small></button><button class="v25-action" onclick="v25DeduplicateClaims()"><span class="ico">🧹</span><b>Clean Duplicate Claims</b><small>Keep the newest record per claim ID.</small></button><button class="v25-action" onclick="v25ExportLeanBackup()"><span class="ico">💾</span><b>Lean Backup</b><small>Small JSON without embedded photos.</small></button><button class="v25-action" onclick="location.reload()"><span class="ico">🔄</span><b>Reload App</b><small>Use after GitHub Pages upload.</small></button></div></div><div class="v25-bottom-space"></div>`;}
  function duplicateClaims(){const seen={},dupes=[];claims().forEach((c,i)=>{const id=c.id||c.caseId;if(!id)return;if(seen[id]!=null)dupes.push({id,i});seen[id]=i});return dupes;}
  window.v25ToggleCompact=function(){const p=prefs();p.compact=!p.compact;save(PREF_KEY,p);document.body.classList.toggle('v25-compact',!!p.compact);toast(p.compact?'Fast Mobile Mode on':'Fast Mobile Mode off');renderReadiness();};
  window.v25DeduplicateClaims=function(){const rows=claims();const map=new Map();rows.slice().reverse().forEach(c=>{const id=c.id||c.caseId||uid('CLAIM');map.set(id,c)});const clean=Array.from(map.values()).reverse();save(CLAIM_KEY,clean);toast('Duplicate cleanup complete: '+(rows.length-clean.length)+' removed');renderReadiness();};
  window.v25ExportLeanBackup=function(){const data={version:VERSION,exportedAt:now(),claims:claims().map(c=>Object.fromEntries(Object.entries(c).filter(([k])=>!['photos','image','dataUrl'].includes(k)))),tickets:tickets(),feedback:feedback(),notices:notices(),readiness:{lastScan:localStorage.getItem(AUDIT_KEY),storage:storage()}};download(JSON.stringify(data,null,2),'application/json','oceanjet_v25_lean_backup_'+today()+'.json');};
  function download(data,type,name){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),800)}
  const trainingModules=[['counter','Counter Opening','Check device time, internet state, camera permission, and backup location.'],['claim','Damage Claim Intake','Verify PSN or ticket, last name, baggage tag, route, and at least two photos.'],['privacy','Privacy Reminder','Collect only necessary data. Mask passenger details when showing public queues.'],['handoff','Shift Handoff','Export daily pack, list urgent claims, and brief next staff.']];
  function renderTraining(){const p=load(TRAIN_KEY,{});ensureView('training').innerHTML=`<div class="card v25-shell"><div class="v25-title"><div><h2>🎓 Micro Training</h2><small>Short, repeatable SOP refreshers for port staff using mobile phones.</small></div><span class="v25-chip green">${Object.keys(p).length}/${trainingModules.length} done</span></div></div><div class="card">${trainingModules.map(m=>`<div class="v25-row"><div><strong>${p[m[0]]?'✅':'▫️'} ${esc(m[1])}</strong><small>${esc(m[2])}${p[m[0]]?' • Completed '+esc(p[m[0]]):''}</small></div><button class="sm ${p[m[0]]?'':'primary'}" onclick="v25CompleteTraining('${m[0]}')">${p[m[0]]?'Redo':'Done'}</button></div>`).join('')}<button class="accent block" onclick="v25ResetTraining()">Reset Training Progress</button></div><div class="v25-bottom-space"></div>`;}
  window.v25CompleteTraining=function(id){const p=load(TRAIN_KEY,{});p[id]=now();save(TRAIN_KEY,p);toast('Training marked complete.');renderTraining();};
  window.v25ResetTraining=function(){save(TRAIN_KEY,{});renderTraining();toast('Training reset.');};
  function patchPortal(){const v=$('view-portal');if(!v||$('v25PortalBoost'))return;v.insertAdjacentHTML('afterbegin',`<div id="v25PortalBoost" class="card v25-shell"><div class="v25-title"><div><h2>⚡ Smart Portal Shortcuts</h2><small>V25 adds quick desk, notices, queue manager, readiness scan, and staff micro-training.</small></div><span class="v25-chip green">V25</span></div><div class="v25-action-grid">${action('⚡','Quick Desk','Open command home','quickdesk')}${action('📢','Notice Board','Read route updates','noticeboard')}${action('🧩','Queue','Staff priorities','queuemanager')}${action('🩺','Readiness','Check app health','readiness')}</div></div>`);}
  function patchDashboard(){const v=$('view-dashboard');if(!v||$('v25DashBoost'))return;const h=health();v.insertAdjacentHTML('afterbegin',`<div id="v25DashBoost" class="card v25-shell"><div class="v25-title"><div><h2>⚡ V25 Smart Ops Snapshot</h2><small>Efficiency layer for passenger service, staff queue control, public notices, and app readiness.</small></div><span class="v25-chip ${h.score>75?'green':'amber'}">${h.score}% ready</span></div><div class="v25-grid" style="margin-top:10px"><div class="v25-kpi"><b>${h.open.length}</b><span>Open Claims</span></div><div class="v25-kpi"><b>${activeNotices().length}</b><span>Notices</span></div><div class="v25-kpi"><b>${h.tickets.length}</b><span>Tickets</span></div><div class="v25-kpi"><b>${h.storage.mb.toFixed(1)}MB</b><span>Storage</span></div></div><div class="v25-action-grid">${action('⚡','Quick Desk','Open fast actions','quickdesk')}${action('🧩','Queue','Manage claims','queuemanager')}${action('📢','Notices','Passenger updates','noticeboard')}${action('🩺','Scan','Readiness check','readiness')}</div></div>`);}
  function patchDrawer(){const menu=$('drawerMenu');if(!menu)return;const items=[['quickdesk','⚡','Quick Desk'],['noticeboard','📢','Notice Board'],['queuemanager','🧩','Queue Manager'],['readiness','🩺','Readiness Scan'],['training','🎓','Micro Training']];items.reverse().forEach(([view,icon,label])=>{if(!menu.querySelector(`.drawer-item[data-view="${view}"]`)){const d=document.createElement('div');d.className='drawer-item';d.dataset.view=view;d.setAttribute('onclick',`navigate('${view}')`);d.innerHTML=`<i>${icon}</i> ${label}`;menu.insertBefore(d,menu.firstChild);}})}
  function showV25(name){qsa('.view').forEach(v=>v.classList.remove('active'));ensureView(name).classList.add('active');if(name==='quickdesk')renderQuickDesk();if(name==='noticeboard')renderNoticeBoard();if(name==='queuemanager')renderQueueManager();if(name==='readiness')renderReadiness();if(name==='training')renderTraining();qsa('#drawerMenu .drawer-item').forEach(el=>el.classList.toggle('active',el.dataset.view===name));try{window.scrollTo({top:0,behavior:'smooth'})}catch(e){window.scrollTo(0,0)}}
  function patchNavigation(){const views=['quickdesk','noticeboard','queuemanager','readiness','training'];const oldShow=window.showView;if(oldShow&&!oldShow.__v25Wrapped){window.showView=showView=function(name){if(views.includes(name)){showV25(name);return;}const r=oldShow.apply(this,arguments);setTimeout(()=>{patchDrawer();if(name==='portal')patchPortal();if(name==='dashboard')patchDashboard();},90);return r;};window.showView.__v25Wrapped=true;}const oldBuild=window.buildDrawerMenu;if(oldBuild&&!oldBuild.__v25Wrapped){window.buildDrawerMenu=buildDrawerMenu=function(){const r=oldBuild.apply(this,arguments);patchDrawer();return r;};window.buildDrawerMenu.__v25Wrapped=true;}}
  function boot(){try{document.body.classList.add('v25-mobile-polish');if(prefs().compact)document.body.classList.add('v25-compact');['quickdesk','noticeboard','queuemanager','readiness','training'].forEach(ensureView);if(!localStorage.getItem(NOTICE_KEY))save(NOTICE_KEY,seedNotices());patchNavigation();if(typeof window.buildDrawerMenu==='function')window.buildDrawerMenu();patchDrawer();setTimeout(()=>{patchPortal();patchDashboard();},700);console.log(VERSION+' loaded');}catch(e){console.error('V25 boot error',e);toast('V25 boot issue: '+e.message)}}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot,{once:true});else boot();
})();
</script>

  .v26-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.v26-grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px}.v26-kpi{border:1px solid var(--v26-line);border-radius:17px;padding:11px;text-align:center;background:rgba(255,255,255,.045)}.v26-kpi b{display:block;font-size:1.18rem;color:#fff}.v26-kpi span{font-size:.64rem;color:#9caacc;text-transform:uppercase;letter-spacing:.7px}
  .v26-action-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.v26-action{border:1px solid rgba(125,249,255,.2);background:rgba(255,255,255,.055);border-radius:17px;padding:12px;text-align:left;color:inherit;min-height:78px}.v26-action .ico{display:block;font-size:1.2rem;margin-bottom:5px}.v26-action b{display:block;color:#fff;font-size:.84rem}.v26-action small{display:block;color:#9faecb;font-size:.69rem;line-height:1.3;margin-top:2px}.v26-action:active{transform:scale(.985)}
  .v26-row{display:flex;justify-content:space-between;gap:10px;align-items:center;border:1px solid rgba(255,255,255,.08);border-radius:15px;padding:10px;margin-bottom:8px;background:rgba(255,255,255,.045)}.v26-row strong{display:block;color:#fff;font-size:.84rem}.v26-row small{display:block;color:#aebbd6;font-size:.69rem;line-height:1.35;margin-top:2px}.v26-meter{height:9px;background:rgba(255,255,255,.13);border-radius:999px;overflow:hidden}.v26-meter span{display:block;height:100%;background:linear-gradient(90deg,var(--v26-cyan),var(--v26-pink));width:0%;transition:width .3s}
  .v26-hero{padding:14px;border-radius:20px;background:linear-gradient(135deg,rgba(125,249,255,.12),rgba(255,79,184,.09));border:1px solid var(--v26-line)}.v26-hero h1{font-size:1.28rem;margin:0 0 7px;color:#fff}.v26-hero p{margin:0;color:#bcc9e4;font-size:.78rem;line-height:1.4}.v26-sticky{position:sticky;top:0;z-index:15;background:rgba(4,8,20,.88);backdrop-filter:blur(12px);padding:8px;border-radius:15px;border:1px solid rgba(125,249,255,.14);margin:-4px -4px 10px}.v26-msg{border-radius:14px;padding:9px;margin:7px 0;max-width:90%;font-size:.78rem;line-height:1.35}.v26-msg.staff{margin-left:auto;background:rgba(125,249,255,.13);border:1px solid rgba(125,249,255,.22)}.v26-msg.passenger{background:rgba(255,79,184,.11);border:1px solid rgba(255,79,184,.22)}.v26-bottom-space{height:70px}.v26-badge-dot{width:8px;height:8px;border-radius:50%;background:var(--v26-green);box-shadow:0 0 12px var(--v26-green)}
  .v26-qr{width:120px;height:120px;border-radius:12px;background:repeating-linear-gradient(45deg,#111 0 7px,#fff 7px 13px);border:8px solid white;margin:auto;box-shadow:0 0 20px rgba(125,249,255,.2)}.v26-qr::after{content:"";display:block;width:52px;height:52px;background:#111;margin:26px;border:7px solid white}.v26-input-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}
  @media(max-width:420px){.v26-grid3{grid-template-columns:1fr}.v26-grid,.v26-action-grid{grid-template-columns:1fr}.v26-title{display:block}.v26-chip{margin-top:8px}.v26-row{align-items:flex-start;flex-direction:column}.v26-row button{width:100%}.card{margin-bottom:12px!important}.v26-input-row{grid-template-columns:1fr}}
</style>
<script id="v26-real-script">
(function(){
  'use strict';
  if(window.__OFF_V26_REAL__) return;
  window.__OFF_V26_REAL__ = true;
  const VERSION='V26_REAL_EXPERIENCE_EFFICIENCY';
  const KEYS={
    claims:'oj_v22_claims', damage:'oj_damage_master_log_v11', tickets:'oj_v24_service_tickets', feedback:'oj_v24_feedback',
    notices:'oj_v25_public_notices', prefs:'oj_v26_prefs', messages:'oj_v26_interaction_messages', journeys:'oj_v26_journeys', sync:'oj_v26_sync_queue', audit:'oj_v26_audit_log'
  };
  const $=id=>document.getElementById(id);
  const qsa=(s,root=document)=>Array.from(root.querySelectorAll(s));
  const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const now=()=>new Date().toLocaleString('en-PH',{timeZone:'Asia/Manila',hour12:true});
  const today=()=>new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
  const uid=p=>p+'-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).slice(2,5).toUpperCase();
  function load(k,f){try{const v=localStorage.getItem(k);return v?JSON.parse(v):f}catch(e){return f}}
  function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch(e){audit('storage_error',e.message);return false}}
  function toast(msg){try{if(typeof window.toast==='function') return window.toast(msg);}catch(e){} const t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:99999;background:#101a33;color:white;border:1px solid #7df9ff;border-radius:999px;padding:10px 14px;font:700 12px system-ui;box-shadow:0 8px 25px #0008';document.body.appendChild(t);setTimeout(()=>t.remove(),2600)}
  function audit(type,msg){const rows=load(KEYS.audit,[]);rows.unshift({id:uid('AUD'),type,msg:String(msg||''),at:now(),online:navigator.onLine});save(KEYS.audit,rows.slice(0,160));}
  function ensureView(name){let v=$('view-'+name);if(!v){v=document.createElement('div');v.id='view-'+name;v.className='view';(document.querySelector('.app')||document.body).appendChild(v);}return v;}
  function openClaims(){const a=load(KEYS.claims,[]),b=load(KEYS.damage,[]);return [...a,...b].filter(c=>!['Closed','Resolved','Rejected','Done'].includes(String(c.status||'New')));}
  function allClaims(){return [...load(KEYS.claims,[]),...load(KEYS.damage,[])];}
  function getPrefs(){return load(KEYS.prefs,{fast:false,autosync:true,coach:true,lastBackup:''})}
  function setPrefs(p){save(KEYS.prefs,p);document.body.classList.toggle('v26-fast-mode',!!p.fast)}
  function adminUnlocked(){try{return sessionStorage.getItem('oj_v22_admin_unlocked')==='1'||localStorage.getItem('oj_v22_admin_unlocked')==='1'}catch(e){return false}}
  function storageInfo(){let total=0;const rows=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i)||'';const v=localStorage.getItem(k)||'';const b=(k.length+v.length)*2;total+=b;rows.push({k,b});}}catch(e){}return{bytes:total,mb:total/1024/1024,pct:Math.min(100,Math.round(total/(4.8*1024*1024)*100)),rows:rows.sort((a,b)=>b.b-a.b)}}
  function claimRisk(c){const text=JSON.stringify(c).toLowerCase();let n=15;if(/critical|urgent|wet|missing|crack|broken|wheel|handle/.test(text))n+=35;if(!(c.tagNo||c.tag))n+=12;if(!(c.lastName||c.name))n+=10;if(!(c.contact||c.phone))n+=10;if(String(c.status||'New')==='New')n+=8;return Math.min(100,n)}
  function routeLabel(r){try{if(typeof window.label==='function')return window.label(r)}catch(e){} return String(r||'All routes').replace(/_/g,' → ').replace(/\b\w/g,c=>c.toUpperCase())}
  function metrics(){const claims=openClaims();const urgent=claims.filter(c=>claimRisk(c)>=65).length;const sync=load(KEYS.sync,[]);const st=storageInfo();const msgs=load(KEYS.messages,[]).filter(m=>!m.done);const score=Math.max(0,100-urgent*9-sync.length*3-Math.max(0,st.pct-72));return{claims,urgent,sync,st,msgs,score}}
  function cardKpis(m){return `<div class="v26-grid" style="margin-top:12px"><div class="v26-kpi"><b>${m.claims.length}</b><span>Open Claims</span></div><div class="v26-kpi"><b>${m.urgent}</b><span>Urgent</span></div><div class="v26-kpi"><b>${m.sync.length}</b><span>Pending Sync</span></div><div class="v26-kpi"><b>${m.score}%</b><span>Readiness</span></div></div>`}
  function renderExperienceHome(){const m=metrics();ensureView('experience').innerHTML=`
    <div class="card v26-shell"><div class="v26-hero"><h1>✨ V26 Experience Command</h1><p>Mobile-first hub for passengers, baggage staff, cashier, and supervisors. Focused on speed, clear next steps, offline safety, and no blank-screen.</p></div>${cardKpis(m)}<div class="v26-meter" style="margin-top:10px"><span style="width:${m.score}%"></span></div></div>
    <div class="card"><div class="card-header">Fast Role Actions</div><div class="v26-action-grid">
      ${action('👤','Passenger Journey','Guided fare, schedule, claim, and help path','journey')}
      ${action('💬','Interaction Hub','Local staff-passenger message board','interaction')}
      ${action('🔁','Sync Queue','Offline pending records and backup flow','sync')}
      ${action('🧪','Site Test','One-tap check for mobile deployment','site-test')}
      ${action('🧳','Claim Center','Track, triage, and update claim status','claimstatus')}
      ${action('🧮','Baggage Calc','Official baggage calculation tab','calculator')}
    </div></div>
    <div class="card"><div class="card-header">Today\'s Smart Suggestions</div>${suggestions(m)}</div><div class="v26-bottom-space"></div>`;}
  function action(ico,title,sub,view){return `<button class="v26-action" onclick="showView('${view}')"><span class="ico">${ico}</span><b>${esc(title)}</b><small>${esc(sub)}</small></button>`}
  function suggestions(m){const rows=[];if(m.urgent)rows.push(['red','Prioritize urgent claims',m.urgent+' open claim(s) need supervisor review.','queuemanager']);if(m.sync.length)rows.push(['amber','Sync pending records',m.sync.length+' local record(s) waiting for export/sync.','sync']);if(m.st.pct>72)rows.push(['amber','Storage getting high','Create a lean backup and clean duplicate data.','readiness']);if(!rows.length)rows.push(['green','Ready for field use','No critical local issues detected.','site-test']);return rows.map(r=>`<div class="v26-row"><div><strong>${esc(r[1])}</strong><small>${esc(r[2])}</small></div><button class="sm" onclick="showView('${r[3]}')">Open</button></div>`).join('')}
  function renderJourney(){const journeys=load(KEYS.journeys,[]);ensureView('journey').innerHTML=`
    <div class="card v26-shell"><div class="v26-title"><div><h2>👤 Passenger Journey Builder</h2><small>Guides a passenger to the correct tool without exposing staff/admin clutter.</small></div><span class="v26-chip pink">Public</span></div></div>
    <div class="card"><div class="card-header">What do you need?</div><div class="v26-action-grid">
      ${action('💵','Check Fare','Open fare matrix and trip info','fares')}
      ${action('🕐','Check Schedule','Open schedule board','schedules')}
      ${action('🧳','Report Baggage Issue','Open damage/lost baggage forms','portal')}
      ${action('🔎','Track Claim','Search claim number/status','claimstatus')}
      ${action('📢','Read Notices','View route and port advisories','noticeboard')}
      ${action('🗺️','Live Map','View vessel/route command map','map')}
    </div></div>
    <div class="card"><div class="card-header">Create Visit Guide</div>${journeyForm()}</div>
    <div class="card"><div class="card-header">Recent Visit Guides</div>${journeys.length?journeys.slice(0,6).map(journeyRow).join(''):'<p class="muted">No visit guides yet.</p>'}</div><div class="v26-bottom-space"></div>`;}
  function journeyForm(){return `<div class="grid2"><div class="input-group"><label>Name optional</label><input id="v26JName" placeholder="Passenger name"></div><div class="input-group"><label>Route</label><select id="v26JRoute">${routesHtml()}</select></div></div><div class="grid2"><div class="input-group"><label>Purpose</label><select id="v26JPurpose"><option>Check baggage fee</option><option>Damage claim</option><option>Lost baggage</option><option>Schedule/fare inquiry</option><option>Port assistance</option></select></div><div class="input-group"><label>Contact optional</label><input id="v26JContact" placeholder="Phone or email"></div></div><button class="primary block" onclick="v26CreateJourney()">Generate Next-Step Guide</button>`}
  function routesHtml(){const r=['cebu_tagbilaran','cebu_maasin','cebu_surigao','cebu_siquijor','cebu_dumaguete','cebu_ormoc','cebu_palompon','cebu_getafe'];return r.map(x=>`<option value="${x}">${esc(routeLabel(x))}</option>`).join('')}
  function journeyRow(j){return `<div class="v26-row"><div><strong>${esc(j.id)} • ${esc(j.purpose)}</strong><small>${esc(routeLabel(j.route))} • ${esc(j.createdAt)}<br>${esc(j.next)}</small></div><button class="sm" onclick="v26Copy('${esc(j.id)}')">Copy ID</button></div>`}
  window.v26CreateJourney=function(){const rows=load(KEYS.journeys,[]);const purpose=$('v26JPurpose')?.value||'Port assistance';const route=$('v26JRoute')?.value||'cebu_tagbilaran';const next=purpose.includes('Damage')?'Open Baggage Damage Detector, capture claim stub, full baggage, and close-up damage.':purpose.includes('Lost')?'Open lost baggage form, record tag number, route, last seen area, and contact number.':purpose.includes('fee')?'Open Baggage Calc and let cashier confirm official weight and route.':'Check schedule/fare tabs, then ask staff if route notice is active.';const item={id:uid('VISIT'),name:$('v26JName')?.value.trim()||'Passenger',contact:$('v26JContact')?.value.trim(),route,purpose,next,createdAt:now()};rows.unshift(item);save(KEYS.journeys,rows.slice(0,100));queueSync('journey',item);toast('Visit guide created.');renderJourney();};
  function renderInteraction(){const rows=load(KEYS.messages,[]);ensureView('interaction').innerHTML=`
    <div class="card v26-shell"><div class="v26-title"><div><h2>💬 Passenger Interaction Hub</h2><small>Offline local message board for port staff notes, passenger questions, and shift handoff.</small></div><span class="v26-chip ${navigator.onLine?'green':'amber'}">${navigator.onLine?'Online':'Offline'}</span></div></div>
    <div class="card"><div class="card-header">New Message / Handoff Note</div><div class="grid2"><div class="input-group"><label>Sender</label><select id="v26MsgRole"><option>Passenger</option><option>Staff</option><option>Cashier</option><option>Supervisor</option></select></div><div class="input-group"><label>Related Claim optional</label><input id="v26MsgClaim" placeholder="OJ-DMG / ticket number"></div></div><div class="input-group"><label>Message</label><textarea id="v26MsgText" rows="3" placeholder="Type question, note, or instruction..."></textarea></div><button class="primary block" onclick="v26AddMessage()">Save Message</button></div>
    <div class="card"><div class="card-header">Messages</div>${rows.length?rows.slice(0,40).map(msgRow).join(''):'<p class="muted">No messages yet.</p>'}</div><div class="v26-bottom-space"></div>`;}
  function msgRow(m){const cls=String(m.role).toLowerCase()==='passenger'?'passenger':'staff';return `<div class="v26-msg ${cls}"><b>${esc(m.role)}</b> ${m.claim?`<span class="v26-chip">${esc(m.claim)}</span>`:''}<br>${esc(m.text)}<br><small>${esc(m.at)}</small></div>`}
  window.v26AddMessage=function(){const text=$('v26MsgText')?.value.trim();if(!text){toast('Message is required.');return;}const rows=load(KEYS.messages,[]);const item={id:uid('MSG'),role:$('v26MsgRole')?.value||'Passenger',claim:$('v26MsgClaim')?.value.trim(),text,at:now(),done:false};rows.unshift(item);save(KEYS.messages,rows.slice(0,160));queueSync('message',item);toast('Message saved locally.');renderInteraction();};
  function queueSync(type,payload){const q=load(KEYS.sync,[]);q.unshift({id:uid('SYNC'),type,payload,createdAt:now(),status:navigator.onLine?'Ready to export':'Offline pending'});save(KEYS.sync,q.slice(0,220));}
  function renderSync(){const q=load(KEYS.sync,[]);const p=getPrefs();ensureView('sync').innerHTML=`
    <div class="card v26-shell"><div class="v26-title"><div><h2>🔁 Offline Sync Queue</h2><small>Static GitHub Pages cannot auto-send to a central database yet, so this queue protects records for export/import.</small></div><span class="v26-chip ${q.length?'amber':'green'}">${q.length} pending</span></div></div>
    <div class="card"><div class="card-header">Sync Controls</div><div class="v26-action-grid"><button class="v26-action" onclick="v26ExportSync()"><span class="ico">💾</span><b>Export Queue</b><small>Download pending records as JSON.</small></button><button class="v26-action" onclick="v26ClearSync()"><span class="ico">✅</span><b>Mark Clear</b><small>Use after backup/import to server.</small></button><button class="v26-action" onclick="v26ToggleFast()"><span class="ico">📱</span><b>Fast Mode</b><small>${p.fast?'Currently on':'Currently off'}.</small></button><button class="v26-action" onclick="v26FullBackup()"><span class="ico">📦</span><b>Full Local Backup</b><small>Export core app data.</small></button></div></div>
    <div class="card"><div class="card-header">Pending Records</div>${q.length?q.map(syncRow).join(''):'<p class="muted">Sync queue is empty.</p>'}</div><div class="v26-bottom-space"></div>`;}
  function syncRow(x){return `<div class="v26-row"><div><strong>${esc(x.type)} • ${esc(x.id)}</strong><small>${esc(x.status)} • ${esc(x.createdAt)}</small></div><span class="v26-chip amber">Pending</span></div>`}
  window.v26ExportSync=function(){download(JSON.stringify({version:VERSION,exportedAt:now(),queue:load(KEYS.sync,[])},null,2),'application/json','oceanjet_v26_sync_queue_'+today()+'.json');};
  window.v26ClearSync=function(){if(!confirm('Clear local sync queue? Export first.'))return;save(KEYS.sync,[]);toast('Sync queue cleared.');renderSync();};
  window.v26ToggleFast=function(){const p=getPrefs();p.fast=!p.fast;setPrefs(p);toast(p.fast?'Fast Mode on':'Fast Mode off');renderSync();};
  window.v26FullBackup=function(){const data={version:VERSION,exportedAt:now(),claims:load(KEYS.claims,[]),damage:load(KEYS.damage,[]),tickets:load(KEYS.tickets,[]),feedback:load(KEYS.feedback,[]),notices:load(KEYS.notices,[]),messages:load(KEYS.messages,[]),journeys:load(KEYS.journeys,[]),sync:load(KEYS.sync,[]),audit:load(KEYS.audit,[])};download(JSON.stringify(data,null,2),'application/json','oceanjet_v26_full_local_backup_'+today()+'.json');const p=getPrefs();p.lastBackup=now();setPrefs(p);};
  function renderSiteTest(){const m=metrics();const tests=[['HTML loaded',!!document.body,'Document body available'],['Active view exists',!!document.querySelector('.view.active'),'Navigation can show pages'],['Drawer exists',!!$('drawerMenu'),'Left navigation container found'],['Local storage writable',testStorage(),'Records can be saved locally'],['No heavy storage warning',m.st.pct<80,m.st.mb.toFixed(2)+'MB used'],['Admin protected',true,'Admin Panel remains login-only'],['Public tools available',typeof window.showView==='function','Passenger/staff views can open'],['Online status captured',true,navigator.onLine?'Online':'Offline']];const score=Math.round(tests.filter(t=>t[1]).length/tests.length*100);ensureView('site-test').innerHTML=`
    <div class="card v26-shell"><div class="v26-title"><div><h2>🧪 Site Test Center</h2><small>Use after uploading to GitHub Pages or after editing code to confirm the site is not blank.</small></div><span class="v26-chip ${score>85?'green':score>60?'amber':'red'}">${score}% pass</span></div><div class="v26-meter" style="margin-top:10px"><span style="width:${score}%"></span></div></div>
    <div class="card"><div class="card-header">Test Results</div>${tests.map(t=>`<div class="v26-row"><div><strong>${t[1]?'✅':'⚠️'} ${esc(t[0])}</strong><small>${esc(t[2])}</small></div><span class="v26-chip ${t[1]?'green':'amber'}">${t[1]?'Pass':'Check'}</span></div>`).join('')}</div>
    <div class="card"><div class="card-header">Health Actions</div><div class="v26-action-grid"><button class="v26-action" onclick="showView('experience')"><span class="ico">🏠</span><b>Open V26 Home</b><small>Return to known safe view.</small></button><button class="v26-action" onclick="location.reload()"><span class="ico">🔄</span><b>Reload</b><small>Refresh app resources.</small></button><button class="v26-action" onclick="v26FullBackup()"><span class="ico">💾</span><b>Backup Now</b><small>Export before clearing data.</small></button><button class="v26-action" onclick="showView('readiness')"><span class="ico">🩺</span><b>Readiness</b><small>Open existing diagnostics.</small></button></div></div><div class="v26-bottom-space"></div>`;audit('site_test','score '+score);}
  function testStorage(){try{localStorage.setItem('__v26_test','1');localStorage.removeItem('__v26_test');return true}catch(e){return false}}
  function download(data,type,name){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),800)}
  function patchDashboard(){const v=$('view-dashboard');if(!v||$('v26Dash'))return;const m=metrics();v.insertAdjacentHTML('afterbegin',`<div id="v26Dash" class="card v26-shell"><div class="v26-title"><div><h2>✨ V26 Experience + Efficiency</h2><small>Passenger journey, interaction hub, sync queue, and site test layer are active.</small></div><span class="v26-chip ${m.score>75?'green':'amber'}">${m.score}% ready</span></div><div class="v26-action-grid" style="margin-top:12px">${action('✨','Experience Home','Open V26 command home','experience')}${action('👤','Passenger Journey','Guided public flow','journey')}${action('💬','Interaction Hub','Local messages','interaction')}${action('🧪','Site Test','Check deployment','site-test')}</div></div>`)}
  function patchPortal(){const v=$('view-portal');if(!v||$('v26Portal'))return;v.insertAdjacentHTML('afterbegin',`<div id="v26Portal" class="card v26-shell"><div class="v26-title"><div><h2>👤 Passenger-first Portal</h2><small>V26 adds guided journey steps, local interaction notes, and offline sync protection.</small></div><span class="v26-chip pink">V26</span></div><div class="v26-action-grid" style="margin-top:12px">${action('👤','Journey Builder','Guide passenger steps','journey')}${action('💬','Interaction Hub','Add note/message','interaction')}${action('🔁','Sync Queue','View pending records','sync')}${action('🧪','Site Test','Verify app works','site-test')}</div></div>`)}
  function patchDrawer(){const menu=$('drawerMenu');if(!menu)return;const items=[['experience','✨','Experience Home'],['journey','👤','Passenger Journey'],['interaction','💬','Interaction Hub'],['sync','🔁','Sync Queue'],['site-test','🧪','Site Test']];for(let i=items.length-1;i>=0;i--){const [view,icon,label]=items[i];if(!menu.querySelector(`.drawer-item[data-view="${view}"]`)){const d=document.createElement('div');d.className='drawer-item';d.dataset.view=view;d.setAttribute('onclick',`navigate('${view}')`);d.innerHTML=`<i>${icon}</i> ${label}`;menu.insertBefore(d,menu.firstChild);}}}
  function showV26(name){qsa('.view').forEach(v=>v.classList.remove('active'));ensureView(name).classList.add('active');if(name==='experience')renderExperienceHome();if(name==='journey')renderJourney();if(name==='interaction')renderInteraction();if(name==='sync')renderSync();if(name==='site-test')renderSiteTest();qsa('#drawerMenu .drawer-item').forEach(el=>el.classList.toggle('active',el.dataset.view===name));try{window.scrollTo({top:0,behavior:getPrefs().fast?'auto':'smooth'})}catch(e){window.scrollTo(0,0)}}
  function patchNavigation(){const views=['experience','journey','interaction','sync','site-test'];const oldShow=window.showView;if(oldShow&&!oldShow.__v26Wrapped){window.showView=function(name){if(views.includes(name)){showV26(name);return;}const r=oldShow.apply(this,arguments);setTimeout(()=>{patchDrawer();if(name==='dashboard')patchDashboard();if(name==='portal')patchPortal();},120);return r;};try{showView=window.showView}catch(e){}window.showView.__v26Wrapped=true;}const oldBuild=window.buildDrawerMenu;if(oldBuild&&!oldBuild.__v26Wrapped){window.buildDrawerMenu=function(){const r=oldBuild.apply(this,arguments);patchDrawer();return r;};try{buildDrawerMenu=window.buildDrawerMenu}catch(e){}window.buildDrawerMenu.__v26Wrapped=true;}}

<script id="ojV27MajorScript">

  function claimRow(c){const r=risk(c);const cls=r>=70?'red':r>=50?'amber':'green';return `<div class="v27-row"><div><strong>${esc(claimId(c))} <span class="v27-chip ${cls}">${r}%</span></strong><small>${esc(statusOf(c))} • ${esc(routeOf(c))} • Tag: ${esc(tagOf(c)||'missing')}</small></div><div class="right"><button class="sm" onclick="v27SetClaimStatus('${esc(claimId(c))}','Under Review')">Review</button><button class="sm" onclick="v27SetClaimStatus('${esc(claimId(c))}','Resolved')">Resolve</button></div></div>`}
  window.v27SetClaimStatus=function(id,status){let changed=false;for(const k of [KEYS.claims,KEYS.damage]){const arr=load(k,[]);arr.forEach(c=>{if(claimId(c)===id){c.status=status;c.v27UpdatedAt=now();changed=true}});save(k,arr)}toast(changed?'Status updated':'Claim not found');renderSLA()}
  window.v27ExportSLA=function(){const rows=[['id','status','route','tag','risk']].concat(openClaims().map(c=>[claimId(c),statusOf(c),routeOf(c),tagOf(c),risk(c)]));download(rows.map(r=>r.map(csv).join(',')).join('\n'),'text/csv','oceanjet_v27_sla_board_'+today()+'.csv')}

  function renderShift(){const m=metrics();const saved=load(KEYS.shifts,[]);ensureView('v27-shift').innerHTML=`
    <div class="card v27-shell"><div class="v27-title"><div><h2>🧑‍✈️ Shift Planner</h2><div class="v27-sub">Generates realistic staff tasks based on open claims, storage risk, sync queue, and public service needs.</div></div><span class="v27-chip blue">STAFF</span></div></div>
    <div class="card"><div class="card-header">Generate Today’s Plan</div><div class="grid2"><div class="input-group"><label>Shift</label><select id="v27Shift"><option>Morning</option><option>Midday</option><option>Evening</option><option>Night</option></select></div><div class="input-group"><label>Available Staff</label><input id="v27StaffCount" type="number" min="1" max="20" value="3"></div></div><button class="primary block" onclick="v27GenerateShift()">Generate Smart Shift Plan</button></div>
    <div class="card"><div class="card-header">Recommended Workload Now</div>${shiftTasks(m).map(t=>`<div class="v27-row"><div><strong>${esc(t.title)}</strong><small>${esc(t.detail)}</small></div><span class="v27-chip ${t.color}">${esc(t.owner)}</span></div>`).join('')}</div>
    <div class="card"><div class="card-header">Saved Plans</div>${saved.length?saved.slice(0,5).map(s=>`<div class="v27-row"><div><strong>${esc(s.id)} • ${esc(s.shift)}</strong><small>${esc(s.createdAt)} • ${s.tasks.length} task(s)</small></div><button class="sm" onclick="v27ExportShift('${s.id}')">Export</button></div>`).join(''):'<p class="muted">No saved shift plan yet.</p>'}</div><div class="v27-spacer"></div>`}
  function shiftTasks(m){const rows=[];rows.push({title:'Open passenger counter readiness',detail:'Verify calculator, fares, schedules, claim status, and kiosk mode before peak boarding.',owner:'Counter',color:'green'});if(m.urgent.length)rows.push({title:'Triage urgent baggage claims',detail:m.urgent.length+' claim(s) need review, missing data checks, or supervisor escalation.',owner:'Baggage',color:'red'});if(m.sync.length)rows.push({title:'Export pending sync queue',detail:'Download queue backup before changing devices or clearing browser data.',owner:'Supervisor',color:'amber'});if(m.st.pct>70)rows.push({title:'Storage protection task',detail:'Run Data Guardian backup and duplicate cleanup; current storage '+m.st.mb.toFixed(2)+'MB.',owner:'Admin',color:'amber'});rows.push({title:'Passenger notice check',detail:'Update public route/port advisories if schedules or gates changed.',owner:'Info',color:'blue'});return rows}
  window.v27GenerateShift=function(){const m=metrics();const item={id:uid('SHIFT'),shift:$('v27Shift')?.value||'Morning',staff:Number($('v27StaffCount')?.value||3),createdAt:now(),tasks:shiftTasks(m)};const rows=load(KEYS.shifts,[]);rows.unshift(item);save(KEYS.shifts,rows.slice(0,40));toast('Shift plan generated');renderShift()}
  window.v27ExportShift=function(id){const s=load(KEYS.shifts,[]).find(x=>x.id===id);if(!s)return;download(JSON.stringify(s,null,2),'application/json','oceanjet_shift_plan_'+id+'.json')}

  function renderGuardian(){const m=metrics();const p=prefs();ensureView('v27-guardian').innerHTML=`
    <div class="card v27-shell"><div class="v27-title"><div><h2>🛡️ Data Guardian + Site Reliability</h2><div class="v27-sub">Protects local browser data, checks health, exports backups, and helps prevent blank-screen problems.</div></div><span class="v27-chip ${m.st.pct>80?'red':m.st.pct>65?'amber':'green'}">${m.st.pct}% STORAGE</span></div><div class="v27-meter" style="margin-top:12px"><span style="width:${m.st.pct}%"></span></div></div>
    <div class="card"><div class="card-header">Guardian Actions</div><div class="v27-grid">${guardianBtn('💾','Full Snapshot','Export all major local datasets','v27Snapshot()')}${guardianBtn('🧹','Dedupe Claims','Find duplicate claim IDs/tags','v27DedupeClaims()')}${guardianBtn('📦','Compact Logs','Trim oversized audit/message lists','v27CompactData()')}${guardianBtn('🧪','Run Site Test','Open deployment test center','showView(\'site-test\')')}${guardianBtn('⚡','Fast Mode','Toggle low-end Android mode','v27ToggleFastGlobal()')}${guardianBtn('🔐','Admin Notice','Protected notice/content composer','v27AdminNotice()')}</div></div>
    <div class="card"><div class="card-header">Storage Details</div>${m.st.rows.slice(0,8).map(x=>`<div class="v27-row"><div><strong>${esc(x.k)}</strong><small>${(x.b/1024).toFixed(1)} KB</small></div></div>`).join('')||'<p class="muted">No storage details found.</p>'}</div>

  window.v27ToggleFastGlobal=function(){const p=prefs();p.fast=!p.fast;setPrefs(p);toast(p.fast?'Fast Mode on':'Fast Mode off');renderGuardian()}
  window.v27Snapshot=function(){const data={version:VERSION,exportedAt:now(),claims:load(KEYS.claims,[]),damage:load(KEYS.damage,[]),sync:load(KEYS.sync,[]),messages:load(KEYS.messages,[]),journeys:load(KEYS.journeys,[]),notices:load(KEYS.notices,[]),tickets:load(KEYS.tickets,[]),feedback:load(KEYS.feedback,[]),shifts:load(KEYS.shifts,[]),audit:load(KEYS.audit,[]),prefs:prefs()};download(JSON.stringify(data,null,2),'application/json','oceanjet_v27_full_snapshot_'+today()+'.json');const p=prefs();p.lastSnapshot=now();setPrefs(p);audit('snapshot','V27 full snapshot exported');renderGuardian()}
  window.v27DedupeClaims=function(){let removed=0;for(const k of [KEYS.claims,KEYS.damage]){const arr=load(k,[]);const seen=new Set();const out=[];for(const c of arr){const key=(claimId(c)+'|'+tagOf(c)).toLowerCase();if(seen.has(key)){removed++;continue}seen.add(key);out.push(c)}save(k,out)}toast(removed?removed+' duplicate record(s) removed':'No duplicates found');renderGuardian()}
  window.v27CompactData=function(){const cuts=[[KEYS.audit,150],[KEYS.messages,120],[KEYS.sync,180],[KEYS.journeys,120],[KEYS.tickets,160],[KEYS.feedback,160]];cuts.forEach(([k,n])=>{const a=load(k,[]);if(Array.isArray(a)&&a.length>n)save(k,a.slice(0,n))});toast('Local logs compacted safely');renderGuardian()}
  window.v27AdminNotice=function(){if(!isAdmin()){showAdminGate();return}showNoticeComposer()}
  function showAdminGate(){ensureView('v27-guardian').innerHTML=`<div class="card v27-shell"><div class="v27-title"><div><h2>🔐 Admin Required</h2><div class="v27-sub">Public users can use the app, but publishing content remains protected.</div></div><span class="v27-chip red">LOCKED</span></div></div><div class="card"><div class="grid2"><div class="input-group"><label>Username</label><input id="v27AdminU" placeholder="admin"></div><div class="input-group"><label>Password</label><input id="v27AdminP" type="password" placeholder="admin"></div></div><button class="primary block" onclick="v27TryAdmin()">Unlock Admin Content Tools</button><button class="block" onclick="renderGuardian()">Back</button></div>`}
  window.v27TryAdmin=function(){if(unlockAdmin($('v27AdminU')?.value||'', $('v27AdminP')?.value||'')){toast('Admin unlocked');showNoticeComposer()}else toast('Invalid admin login')}

  window.v27SaveContent=function(){const c=load(KEYS.content,{});c.passengerHelp=$('v27Help')?.value||'';c.portNotice=$('v27Notice')?.value||'';save(KEYS.content,c);toast('Content saved locally');renderGuardian()}

  function renderMapIntel(){const v=ensureView('v27-mapintel');const m=metrics();v.innerHTML=`
    <div class="card v27-shell"><div class="v27-title"><div><h2>🗺️ V27 Live Map Intelligence</h2><div class="v27-sub">Mobile-friendly simulated route intelligence overlay. Works offline as a visual operations board.</div></div><span class="v27-chip ${navigator.onLine?'green':'amber'}">${navigator.onLine?'ONLINE':'OFFLINE'}</span></div></div>
    <div class="card"><div class="v27-map">${mapLayer()}</div></div>
    <div class="card"><div class="card-header">Route Intelligence</div>${routes().map((r,i)=>routeIntelRow(r,i,m)).join('')}</div><div class="v27-spacer"></div>`}
  function mapLayer(){const ports=[['CEB',14,48],['TAG',48,67],['ORM',38,35],['DUM',67,76],['SRG',82,26],['GET',31,58],['MSN',69,31],['SIQ',57,82]];const lines=[[16,49,47,66,24],[16,48,39,36,-24],[69,32,81,27,-18],[49,67,66,76,14],[69,76,58,82,-18],[16,48,31,58,18]];return lines.map(l=>`<div class="v27-route-line" style="left:${l[0]}%;top:${l[1]}%;width:${Math.hypot(l[2]-l[0],l[3]-l[1])*3.1}%;transform:rotate(${l[4]}deg)"></div>`).join('')+ports.map(p=>`<div class="v27-port" style="left:${p[1]}%;top:${p[2]}%">${p[0]}</div>`).join('')+routes().slice(0,6).map((r,i)=>`<div class="v27-vessel" style="left:${18+i*11}%;top:${42+(i%3)*12}%">${i+1}</div>`).join('')}
  function routeIntelRow(r,i,m){const load=(42+(i*11+m.oc.length*3))%96;const riskv=(18+(i*9+m.urgent.length*12))%100;const eta=25+i*9+(m.sync.length%5);return `<div class="v27-row"><div><strong>${esc(routeLabel(r))}</strong><small>ETA ${eta} min • Passenger load ${load}% • Risk ${riskv}%</small><div class="v27-meter" style="margin-top:7px"><span style="width:${riskv}%"></span></div></div><span class="v27-chip ${riskv>70?'red':riskv>45?'amber':'green'}">${riskv>70?'WATCH':riskv>45?'BUSY':'OK'}</span></div>`}

  function renderV27View(name){if(name==='v27-nexus')renderNexus();else if(name==='v27-search')renderSearch();else if(name==='v27-kiosk')renderKiosk();else if(name==='v27-sla')renderSLA();else if(name==='v27-shift')renderShift();else if(name==='v27-guardian')renderGuardian();else if(name==='v27-mapintel')renderMapIntel();}
  function patchDrawer(){const menu=$('drawerMenu');if(!menu)return;const items=[['v27-nexus','🚀','V27 Nexus'],['v27-search','🔎','Smart Search'],['v27-kiosk','📱','Passenger Kiosk'],['v27-sla','⏱️','SLA Board'],['v27-shift','🧑‍✈️','Shift Planner'],['v27-guardian','🛡️','Data Guardian']];for(let i=items.length-1;i>=0;i--){const [view,icon,label]=items[i];if(!menu.querySelector(`.drawer-item[data-view="${view}"]`)){const d=document.createElement('div');d.className='drawer-item';d.dataset.view=view;d.setAttribute('onclick',`navigate('${view}')`);d.innerHTML=`<i>${icon}</i> ${label}`;menu.insertBefore(d,menu.firstChild)}}}
  function patchNav(){const views=['v27-nexus','v27-search','v27-kiosk','v27-sla','v27-shift','v27-guardian','v27-mapintel'];const old=window.showView;if(old&&!old.__v27Major){window.showView=function(name){if(views.includes(name)){qsa('.view').forEach(v=>v.classList.remove('active'));ensureView(name).classList.add('active');renderV27View(name);qsa('#drawerMenu .drawer-item').forEach(el=>el.classList.toggle('active',el.dataset.view===name));try{window.scrollTo({top:0,behavior:prefs().fast?'auto':'smooth'})}catch(e){window.scrollTo(0,0)}return}const r=old.apply(this,arguments);setTimeout(()=>{patchDrawer();if(name==='dashboard')patchDashboard();if(name==='map')patchMap();},160);return r};try{showView=window.showView}catch(e){}window.showView.__v27Major=true}
    const oldBuild=window.buildDrawerMenu;if(oldBuild&&!oldBuild.__v27Major){window.buildDrawerMenu=function(){const r=oldBuild.apply(this,arguments);patchDrawer();return r};try{buildDrawerMenu=window.buildDrawerMenu}catch(e){}window.buildDrawerMenu.__v27Major=true}}
  function patchDashboard(){const v=$('view-dashboard');if(!v||$('v27DashCard'))return;const m=metrics();v.insertAdjacentHTML('afterbegin',`<div id="v27DashCard" class="card v27-shell"><div class="v27-title"><div><h2>🚀 V27 Major Command Upgrade</h2><div class="v27-sub">Nexus, smart search, kiosk mode, SLA board, shift planner, data guardian, and map intelligence are active.</div></div><span class="v27-chip ${colorBy(m.ready)}">${m.ready}% READY</span></div><div class="v27-grid" style="margin-top:12px">${action('🚀','Open Nexus','Main V27 command screen','v27-nexus')}${action('🔎','Search','Find tool, claim, route','v27-search')}${action('📱','Kiosk','Passenger simple mode','v27-kiosk')}${action('🛡️','Guardian','Backup and repair','v27-guardian')}</div></div>`)}
  function patchMap(){const v=$('view-map');if(!v||$('v27MapEnhance'))return;v.insertAdjacentHTML('afterbegin',`<div id="v27MapEnhance" class="card v27-shell"><div class="v27-title"><div><h2>🗺️ V27 Map Intelligence Overlay</h2><div class="v27-sub">Open the offline-ready command map with route risk, simulated ETA, and port pressure indicators.</div></div><button class="sm primary" onclick="showView('v27-mapintel')">Open</button></div></div>`)}
  function download(data,type,name){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),900)}
  function csv(v){return '"'+String(v??'').replace(/"/g,'""')+'"'}
  function boot(){try{document.body.classList.add('oj-v27-mobile');setPrefs(prefs());['v27-nexus','v27-search','v27-kiosk','v27-sla','v27-shift','v27-guardian','v27-mapintel'].forEach(ensureView);patchNav();if(typeof window.buildDrawerMenu==='function')window.buildDrawerMenu();patchDrawer();setTimeout(()=>{patchDashboard();patchMap()},700);window.addEventListener('online',()=>audit('network','online'));window.addEventListener('offline',()=>audit('network','offline'));audit('boot',VERSION+' loaded');console.log(VERSION+' loaded')}catch(e){console.error('V27 boot error',e);audit('boot_error',e.message);toast('V27 recovery: '+e.message)}}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot,{once:true});else boot();
})();
</script>
