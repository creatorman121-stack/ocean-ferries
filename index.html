<script id="v19FutureFleetPatch">
(function(){
  if(window.__OJ_V19_FUTURE_FLEET__) return;
  window.__OJ_V19_FUTURE_FLEET__ = true;
  const VERSION='V19 Future Fleet AI';
  const $=id=>document.getElementById(id);
  const qsa=(s,r=document)=>Array.from(r.querySelectorAll(s));
  const store=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}};
  const load=(k,f)=>{try{return JSON.parse(localStorage.getItem(k)||'null')||f}catch(e){return f}};
  const pht=()=>new Date().toLocaleString('en-PH',{timeZone:'Asia/Manila',hour12:true});
  const toast19=(m)=>{try{if(typeof toast==='function')return toast(m);if(typeof toastV6==='function')return toastV6(m)}catch(e){} console.log(m)};
  const ROUTES19=[
    {key:'cebu_tagbilaran',label:'Cebu → Tagbilaran',vessel:'OJ 388',gate:'A2',mins:125,base:52,ports:['Cebu','Tagbilaran']},
    {key:'cebu_ormoc',label:'Cebu → Ormoc',vessel:'OJ 88',gate:'C3',mins:170,base:61,ports:['Cebu','Ormoc']},
    {key:'cebu_palompon',label:'Cebu → Palompon',vessel:'OJ 188',gate:'C4',mins:190,base:44,ports:['Cebu','Palompon']},
    {key:'cebu_getafe',label:'Cebu → Getafe',vessel:'OJ 216',gate:'G1',mins:85,base:38,ports:['Cebu','Getafe']},
    {key:'cebu_maasin',label:'Cebu → Maasin',vessel:'OJ 288',gate:'M2',mins:210,base:66,ports:['Cebu','Maasin']},
    {key:'cebu_surigao',label:'Cebu → Surigao',vessel:'OJ 328',gate:'S1',mins:330,base:73,ports:['Cebu','Maasin','Surigao']},
    {key:'cebu_siquijor',label:'Cebu → Siquijor',vessel:'OJ 788',gate:'Q1',mins:250,base:56,ports:['Cebu','Tagbilaran','Siquijor']},
    {key:'cebu_dumaguete',label:'Cebu → Dumaguete',vessel:'OJ 588',gate:'D2',mins:285,base:59,ports:['Cebu','Tagbilaran','Dumaguete']}
  ];
  function wave(seed,range){return Math.round(Math.sin((Date.now()/100000)+seed)*range)}
  function clamp(n,a,b){return Math.max(a,Math.min(b,n))}
  function risk(load){return load>=78?'bad':load>=60?'warn':'ok'}
  function riskText(r){return r==='bad'?'Critical':r==='warn'?'Watch':'Normal'}
  function telemetry(){
    return ROUTES19.map((r,i)=>{
      const cycle=Math.max(60,r.mins)*60000;
      const raw=((Date.now()+i*211000)%cycle)/cycle;
      const loadPct=clamp(r.base+wave(i+1,15),16,96);
      const weather=clamp(36+wave(i+4,22)+(r.key.includes('surigao')?12:0),10,92);
      const eta=Math.max(3,Math.round((1-raw)*r.mins));
      const delay=clamp(Math.round((loadPct*.23)+(weather*.19)-18),0,45);
      const rr=risk(Math.max(loadPct,weather+8));
      const health=clamp(96-wave(i+8,9)-(delay>22?8:0),72,99);
      const prog=Math.round(raw*100);
      const next=r.ports[Math.min(r.ports.length-1,Math.max(1,Math.ceil(raw*(r.ports.length-1))))];
      return {...r,loadPct,weather,eta,delay,risk:rr,status:riskText(rr),health,prog,next};
    });
  }
  function topWatch(){return [...telemetry()].sort((a,b)=>(b.loadPct+b.weather+b.delay)-(a.loadPct+a.weather+a.delay))[0]}
  function statDamage(){
    const keys=['oj_damage_master_log_v11','oceanjet_damage_cases','damageCases'];
    for(const k of keys){const d=load(k,null); if(Array.isArray(d)) return d.length; if(d&&Array.isArray(d.cases)) return d.cases.length;}
    return 0;
  }
  function statTx(){
    try{ if(window.DB&&Array.isArray(DB.history)) return DB.history.length; }catch(e){}
    const d=load('ocean_fast_ferries_db',{}); return Array.isArray(d.history)?d.history.length:0;
  }
  function routeCards(list){
    return list.map(r=>`<div class="v19-row" onclick="v19OpenMapRoute('${r.key}')"><div><b>${r.vessel} • ${r.label}</b><br><small>Next ${r.next} • ETA ${r.eta}m • delay risk ${r.delay}m • gate ${r.gate}</small><div class="v19-meter"><span style="width:${r.prog}%"></span></div></div><span class="v19-pill ${r.risk}">${r.status}</span></div>`).join('');
  }
  function ensureView(id){
    if($(id)) return $(id);
    const v=document.createElement('div'); v.id=id; v.className='view';
    const anchor=$('view-future')||$('view-map')||document.querySelector('.view:last-of-type');
    if(anchor&&anchor.parentNode) anchor.parentNode.insertBefore(v,anchor.nextSibling); else (document.querySelector('.app')||document.body).appendChild(v);
    return v;
  }
  function renderDashboardCard(){
    const v=$('view-dashboard'); if(!v||$('v19DashCard')) return;
    const t=topWatch(); const list=telemetry(); const avg=Math.round(list.reduce((a,b)=>a+b.loadPct,0)/list.length);
    v.insertAdjacentHTML('afterbegin',`<div id="v19DashCard" class="card v19-shell"><div class="v19-title"><div><h2>🧠 V19 AI Fleet Intelligence</h2><small>Mobile command layer for ETA, risk, port load, and system health.</small></div><span class="v19-chip ${t.risk}">${VERSION}</span></div><div class="v19-grid"><div class="v19-kpi"><b>${t.vessel}</b><span>Priority watch</span></div><div class="v19-kpi"><b>${t.eta}m</b><span>Next ETA</span></div><div class="v19-kpi"><b>${avg}%</b><span>Avg fleet load</span></div><div class="v19-kpi"><b>${statDamage()}</b><span>Damage cases</span></div></div><div class="v19-actionbar"><button class="primary" onclick="showView('ai-fleet')">AI Fleet Assistant</button><button class="accent" onclick="showView('map')">Live Map</button><button onclick="showView('future')">Future Lab</button><button onclick="showView('alive')">System Alive</button></div></div>`);
  }
  function renderAssistant(){
    const v=ensureView('view-ai-fleet'); const list=telemetry(); const t=topWatch();

nResult" class="v19-alert-list" style="margin-top:10px"></div></div><div class="card v19-shell"><div class="v19-title"><h2>🚢 Route Risk Board</h2><span class="v19-pill ${t.risk}">Live simulation</span></div>${routeCards(list)}</div>`;
  }
  function v19DefaultMessages(){
    const t=topWatch();

  window.v19Ask=function(){

  function answer19(q){
    const x=q.toLowerCase(); const list=telemetry(); const next=[...list].sort((a,b)=>a.eta-b.eta)[0]; const high=topWatch();
    if(x.includes('baggage')&&(x.includes('fee')||x.includes('calculate')||x.includes('kg')||x.includes('kilo'))) return 'For official baggage fee computation, please use the Baggage Calculator tab. I will not compute official baggage fees inside the assistant.';

    if(x.includes('risk')||x.includes('delay')||x.includes('priority')) return `Highest watch is <b>${high.vessel}</b> on <b>${high.label}</b>. Load ${high.loadPct}%, sea/weather pressure ${high.weather}%, delay risk ${high.delay} minutes. Recommended action: prepare queue staff and damage-claim desk before arrival.`;

  window.v19SaveAlert=function(){const text=($('v19AlertText')?.value||'').trim(); if(!text) return toast19('Type an alert first.'); const level=$('v19AlertLevel')?.value||'ok'; const arr=load('oj_v19_alerts',[]); arr.unshift({text,level,time:pht()}); store('oj_v19_alerts',arr.slice(0,40)); renderAlerts(); toast19('Alert saved locally.');};
  window.v19ClearAlerts=function(){store('oj_v19_alerts',[]); renderAlerts(); toast19('Local alerts cleared.');};
  function patchDrawer(){
    const old=window.buildDrawerMenu; if(!old||old.__v19Wrapped) return;

  function escapeHtml(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

<script id="ojV22RealScript">
(function(){
  if(window.__OJ_V22_REAL_SMART_PORTAL__) return;
  window.__OJ_V22_REAL_SMART_PORTAL__ = true;

  const VERSION = 'V22_REAL_SMART_PASSENGER_STAFF_PORTAL';
  const CLAIM_KEY = 'oj_v22_claims';
  const CONTENT_KEY = 'oj_v22_content';
  const HEALTH_KEY = 'oj_v22_health';
  const ADMIN_KEY = 'oj_v22_admin_unlocked';
  const BACKUP_KEY = 'oj_v22_last_auto_backup';

  const $ = id => document.getElementById(id);
  const qs = (s,r=document) => r.querySelector(s);
  const qsa = (s,r=document) => Array.from(r.querySelectorAll(s));
  const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const load = (k,f) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : f; } catch(e) { return f; } };
  const save = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); return true; } catch(e) { logHealth('Storage save failed: '+e.message); return false; } };
  const nowPHT = () => new Date().toLocaleString('en-PH',{timeZone:'Asia/Manila',hour12:true});
  const todayPHT = () => new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});

  const DEFAULT_CONTENT = {
    passengerHelp:'Keep your PSN, baggage tag, and photos ready. Report damage before leaving the port counter whenever possible.',
    damagePolicy:'Damage reports should include claim stub/tag, full baggage photo, close-up of damage, route, date, and contact details.',
    lostPolicy:'Lost baggage cases require PSN or ticket reference, passenger last name, route, baggage description, and last seen area.',
    privacy:'Collect only the information needed for verification. Avoid sharing claim photos publicly. Export backups only to authorized staff.',
    portContacts:'Cebu Pier Help Desk • Tagbilaran Counter • Ormoc Counter • Dumaguete Counter • Surigao Counter'
  };

  function claims(){ return load(CLAIM_KEY, []); }
  function setClaims(v){ save(CLAIM_KEY, v); updateHealthBackup(); }

  function setContent(v){ save(CONTENT_KEY, v); }
  function logHealth(msg){ const h = load(HEALTH_KEY, []); h.unshift({time:nowPHT(), msg:String(msg).slice(0,240)}); save(HEALTH_KEY, h.slice(0,60)); }

  window.addEventListener('error', e => logHealth('JS error: '+(e.message||'unknown')));
  window.addEventListener('unhandledrejection', e => logHealth('Promise error: '+((e.reason&&e.reason.message)||e.reason||'unknown')));

  function routeOptions(selected){

  function miniQrCanvas(id, canvas){
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const n = 29, cell = Math.floor(canvas.width/n);
    ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
    let seed = 0; for(let i=0;i<id.length;i++) seed = (seed*31 + id.charCodeAt(i)) >>> 0;
    function rand(){ seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; }
    ctx.fillStyle = '#050816';
    function finder(x,y){ ctx.fillRect(x*cell,y*cell,7*cell,7*cell); ctx.fillStyle='#fff';ctx.fillRect((x+1)*cell,(y+1)*cell,5*cell,5*cell);ctx.fillStyle='#050816';ctx.fillRect((x+2)*cell,(y+2)*cell,3*cell,3*cell); }
    finder(1,1); finder(21,1); finder(1,21);
    for(let y=0;y<n;y++) for(let x=0;x<n;x++){
      const inFinder = (x<9&&y<9)||(x>19&&y<9)||(x<9&&y>19);
      if(!inFinder && rand()>.56) ctx.fillRect(x*cell,y*cell,cell,cell);
    }
  }

        const d=document.createElement('div'); d.className='drawer-item'; d.dataset.view=view; d.setAttribute('onclick',`navigate('${view}')`); d.innerHTML=`<i>${icon}</i> ${label}`; menu.insertBefore(d, menu.firstChild);
      }
    });
  }

  function normalizeMenu(){ const active = qs('.view.active'); const name = active ? active.id.replace('view-','') : 'portal'; qsa('#drawerMenu .drawer-item').forEach(el=>el.classList.toggle('active', el.dataset.view===name)); }

  function showV22(name){
    ensureAllViews();
    qsa('.view').forEach(v=>v.classList.remove('active'));
    const v = ensureView(name); v.classList.add('active');
    normalizeMenu();
    const renders = {portal:renderPortal,claimstatus:renderClaimStatus,lostbaggage:renderLostBaggage,staffcounter:renderStaffCounter,sitehealth:renderSiteHealth,contentmanager:renderContentManager};
    if(renders[name]) renders[name]();
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function patchNavigation(){
    const oldShow = window.showView;
    if(!oldShow || oldShow.__v22Wrapped) return;
    window.showView = function(name){
      if(['portal','claimstatus','lostbaggage','staffcounter','sitehealth','contentmanager'].includes(name)){ showV22(name); return; }
      const r = oldShow.apply(this, arguments); setTimeout(()=>{patchDrawerItems(); normalizeMenu();},40); return r;
    };
    window.showView.__v22Wrapped = true;
    const oldBuild = window.buildDrawerMenu;
    if(oldBuild && !oldBuild.__v22Wrapped){
      window.buildDrawerMenu = buildDrawerMenu = function(){ const r = oldBuild.apply(this, arguments); patchDrawerItems(); normalizeMenu(); return r; };
      window.buildDrawerMenu.__v22Wrapped = true;
    }
  }

  function ensureAllViews(){ ['portal','claimstatus','lostbaggage','staffcounter','sitehealth','contentmanager'].forEach(ensureView); }

  function blankGuard(){
    setTimeout(()=>{
      const app = qs('.app'); const active = qs('.view.active');
      if(!app || !active || active.getBoundingClientRect().height < 12){
        logHealth('Blank screen guard triggered.');
        ensureAllViews(); showV22('portal');
      }
    },1400);
  }

  function injectPwaHelper(){
    try{
      if('serviceWorker' in navigator && !window.__v22SWRegistered){
        window.__v22SWRegistered = true;
        navigator.serviceWorker.register('sw.js').catch(()=>{});
      }
    }catch(e){}
  }

  function boot(){
    try{
      document.body.classList.add('v22-mobile-polish');
      ensureAllViews(); patchNavigation();
      if(typeof window.buildDrawerMenu === 'function') window.buildDrawerMenu(); else patchDrawerItems();
      injectPwaHelper();
      logHealth('V22 booted successfully.');
      setTimeout(()=>{ if(!sessionStorage.getItem('oj_v22_landed')){ sessionStorage.setItem('oj_v22_landed','1'); showV22('portal'); }}, 520);
      blankGuard();
      setInterval(()=>{ try{ updateHealthBackup(); }catch(e){} }, 180000);
      console.log(VERSION+' loaded');
    }catch(e){
      console.error('V22 boot error', e); logHealth('V22 boot error: '+e.message);
      try{ ensureView('portal').innerHTML = `<div class="card glow"><div class="card-header">🛟 Health Mode</div><p>The app detected a startup issue. Use the repair button below.</p><button class="primary block" onclick="v22RepairApp()">Repair App</button></div>`; showV22('portal'); }catch(_){ alert('V22 repair failed: '+e.message); }
    }
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot, {once:true}); else boot();
})();
</script>


<!-- OCEAN FAST FERRIES V23 EFFICIENCY + EFFECTIVENESS ENGINE -->
<script>
(function(){
  'use strict';
  if(window.__OJ_V23_EFFICIENCY_ENGINE__) return;
  window.__OJ_V23_EFFICIENCY_ENGINE__ = true;

  const VERSION = 'V23 Efficiency + Effectiveness Engine';
  const CLAIM_KEY = 'oj_v22_claims';
  const HEALTH_KEY = 'oj_v22_health';
  const BACKUP_KEY = 'oj_v22_last_auto_backup';
  const PERF_KEY = 'oj_v23_perf_settings';
  const INDEX_KEY = 'oj_v23_claim_index';
  const LAST_AUDIT_KEY = 'oj_v23_last_audit';
  const ROUTES = [
    ['cebu_tagbilaran','Cebu → Tagbilaran'],
    ['cebu_maasin','Cebu → Maasin'],
    ['cebu_surigao','Cebu → Surigao'],
    ['cebu_siquijor','Cebu → Siquijor'],
    ['cebu_dumaguete','Cebu → Dumaguete'],
    ['cebu_ormoc','Cebu → Ormoc'],
    ['cebu_palompon','Cebu → Palompon'],
    ['cebu_getafe','Cebu → Getafe']
  ];
  const VIEWS = {
    portal:'Smart Portal',dashboard:'Dashboard',calc:'Baggage Calculator',damage:'Damage Detector',
    claimstatus:'Claim Status',lostbaggage:'Report Baggage',staffcounter:'Staff Counter',
    efficiency:'Efficiency Center',triage:'Smart Triage Queue',quickfind:'Quick Find',
    sitehealth:'Site Health',contentmanager:'Content Manager',admin:'Admin Panel',fares:'Fares',schedules:'Schedules',history:'History',livemap:'Live Map'
  };

  const $ = id => document.getElementById(id);
  const qs = (s,root=document) => root.querySelector(s);
  const qsa = (s,root=document) => Array.from(root.querySelectorAll(s));
  const idle = window.requestIdleCallback || function(fn){ return setTimeout(()=>fn({timeRemaining:()=>15}), 1); };
  const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const load = (k,f) => { try { const raw = localStorage.getItem(k); return raw ? JSON.parse(raw) : f; } catch(e) { return f; } };
  const save = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); return true; } catch(e) { v23Log('Storage save failed: '+e.message); return false; } };
  const now = () => new Date().toLocaleString('en-PH', {timeZone:'Asia/Manila', hour12:true});
  const claims = () => load(CLAIM_KEY, []);
  const setClaims = v => { save(CLAIM_KEY, v); localStorage.setItem(BACKUP_KEY, now()); buildClaimIndex(v); };

  function toast(msg){
    if(typeof window.toast === 'function') return window.toast(msg);
    const el = document.createElement('div');
    el.className = 'v23-toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2600);
  }

  function v23Log(msg){
    try{
      const h = load(HEALTH_KEY, []);
      h.unshift({time:now(), msg:'V23: '+String(msg).slice(0,220)});
      save(HEALTH_KEY, h.slice(0,80));
    }catch(e){}
  }

  window.addEventListener('error', e => v23Log('JS error: '+(e.message || 'unknown')));
  window.addEventListener('unhandledrejection', e => v23Log('Promise error: '+((e.reason && e.reason.message) || e.reason || 'unknown')));

  function injectStyles(){
    if($('ojV23Styles')) return;
    const style = document.createElement('style');
    style.id = 'ojV23Styles';
    style.textContent = `
      :root{--v23-cyan:#00f5ff;--v23-pink:#ff2f8d;--v23-lime:#7CFF8A;--v23-amber:#ffd166;--v23-red:#ff5d73;}
      .v23-mobile-optimized .app{max-width:980px;margin:0 auto;}
      .v23-mobile-optimized .view{padding-bottom:22px;}
      .v23-mobile-optimized input,.v23-mobile-optimized select,.v23-mobile-optimized textarea,.v23-mobile-optimized button{min-height:42px;font-size:15px;}
      .v23-mobile-optimized .card{overflow:hidden;}
      .v23-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;}
      .v23-grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;}
      .v23-kpi{border:1px solid rgba(0,245,255,.22);background:rgba(255,255,255,.055);border-radius:16px;padding:13px;text-align:center;}
      .v23-kpi b{display:block;font-size:1.45rem;color:var(--v23-cyan);text-shadow:0 0 12px rgba(0,245,255,.4);}
      .v23-kpi span{display:block;font-size:.68rem;color:#a8b2d1;text-transform:uppercase;letter-spacing:.75px;}
      .v23-chip{display:inline-flex;align-items:center;gap:5px;border:1px solid rgba(0,245,255,.3);background:rgba(0,245,255,.08);color:#a9ffff;border-radius:999px;padding:4px 9px;font-size:.68rem;font-weight:900;}
      .v23-chip.pink{border-color:rgba(255,47,141,.4);background:rgba(255,47,141,.09);color:#ff9fcd;}
      .v23-chip.green{border-color:rgba(124,255,138,.38);background:rgba(124,255,138,.08);color:#bcffc3;}
      .v23-chip.amber{border-color:rgba(255,209,102,.48);background:rgba(255,209,102,.09);color:#ffe2a1;}
      .v23-chip.red{border-color:rgba(255,93,115,.48);background:rgba(255,93,115,.1);color:#ff9baa;}
      .v23-row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:10px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.045);border-radius:14px;margin:8px 0;}
      .v23-row strong{color:#fff;}
      .v23-row small{display:block;color:#a8b2d1;margin-top:3px;line-height:1.35;}
      .v23-actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-top:10px;}
      .v23-meter{height:9px;border-radius:999px;background:rgba(255,255,255,.13);overflow:hidden;}
      .v23-meter span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--v23-cyan),var(--v23-pink));transition:width .25s;}
      .v23-command{position:sticky;top:8px;z-index:15;border:1px solid rgba(0,245,255,.28);background:rgba(4,9,24,.86);backdrop-filter:blur(14px);border-radius:18px;padding:10px;margin-bottom:10px;box-shadow:0 0 22px rgba(0,245,255,.1);}
      .v23-result{cursor:pointer;transition:.18s;}
      .v23-result:hover{transform:translateY(-2px);border-color:rgba(0,245,255,.45);}
      .v23-alert{border-left:4px solid var(--v23-amber);padding:10px;background:rgba(255,209,102,.08);border-radius:12px;color:#ffe8b3;margin:8px 0;}
      .v23-toast{position:fixed;left:50%;top:14px;transform:translateX(-50%);z-index:99999;background:linear-gradient(135deg,#00f5ff,#ff2f8d);color:#061020;font-weight:900;padding:10px 16px;border-radius:999px;box-shadow:0 10px 35px rgba(0,0,0,.35);}
      .v23-fast *{animation-duration:.001ms!important;transition-duration:.001ms!important;scroll-behavior:auto!important;}
      .v23-fast .glow,.v23-fast .card,.v23-fast .damage-shell{box-shadow:none!important;backdrop-filter:none!important;}
      .v23-fast .damage-hud{background:none!important;}
      .v23-fast img{image-rendering:auto;}
      @media(max-width:640px){.v23-row{align-items:flex-start;flex-direction:column}.v23-actions{grid-template-columns:1fr}.v23-grid,.v23-grid2{grid-template-columns:1fr}.v23-command{top:4px}.v23-mobile-optimized .card{margin:9px 0}.v23-mobile-optimized .drawer{max-width:86vw;}}
      @media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important;scroll-behavior:auto!important;}}
    `;
    document.head.appendChild(style);
  }

  function ensureView(name){
    let el = $('view-'+name);
    if(!el){
      el = document.createElement('div');
      el.id = 'view-'+name;
      el.className = 'view';
      const app = qs('.app') || qs('main') || document.body;
      app.appendChild(el);
    }
    return el;
  }

  function storageStats(){
    let total = 0, items = [];
    try{
      for(let i=0;i<localStorage.length;i++){
        const k = localStorage.key(i) || '';
        const v = localStorage.getItem(k) || '';
        const bytes = (k.length + v.length) * 2;
        total += bytes;
        items.push({key:k, bytes});
      }
    }catch(e){}
    return {bytes:total, mb:total/1024/1024, pct:Math.min(100, Math.round((total/1024/1024)/5*100)), items:items.sort((a,b)=>b.bytes-a.bytes)};
  }

  function healthScore(){
    const st = storageStats();
    const h = load(HEALTH_KEY, []);
    const active = claims().filter(c => !['Closed','Rejected'].includes(String(c.status || ''))).length;
    let score = 100;
    if(st.mb > 4) score -= 25; else if(st.mb > 2.5) score -= 12;
    if(h.length > 50) score -= 8;
    if(active > 25) score -= 10;
    if(!navigator.onLine) score -= 8;
    return Math.max(40, score);
  }

  function claimRisk(c){
    const text = ((c.type||'')+' '+(c.description||'')+' '+(c.priority||'')+' '+(c.status||'')).toLowerCase();
    let score = 0;
    if(String(c.priority).toLowerCase()==='high') score += 35;
    if(/crack|broken|wet|missing|wheel|handle|torn|critical|fragile/.test(text)) score += 28;
    if(['Submitted','Under Review'].includes(c.status)) score += 12;
    if(!c.contact) score += 7;
    if(!c.tag) score += 6;
    const created = Date.parse(c.createdAt || c.updatedAt || '') || 0;
    if(created && Date.now() - created > 86400000) score += 10;
    const label = score >= 55 ? 'Critical' : score >= 34 ? 'High' : score >= 18 ? 'Medium' : 'Normal';
    return {score:Math.min(100, score), label};
  }

  function buildClaimIndex(list=claims()){
    try{
      const index = {};
      list.forEach((c,i)=>{
        if(c.id) index[String(c.id).toUpperCase()] = i;
        if(c.tag) index[String(c.tag).toUpperCase()] = i;
      });
      sessionStorage.setItem(INDEX_KEY, JSON.stringify(index));
      return index;
    }catch(e){ return {}; }
  }

  function injectLazyLoading(){
    idle(()=> qsa('img').forEach(img => { img.loading = 'lazy'; img.decoding = 'async'; }));
  }

  function applyFastMode(){
    const settings = load(PERF_KEY, {fast:false, autoAudit:true});
    document.body.classList.toggle('v23-fast', !!settings.fast);
    document.body.classList.add('v23-mobile-optimized');
  }

  window.v23ToggleFastMode = function(){
    const s = load(PERF_KEY, {fast:false, autoAudit:true});
    s.fast = !s.fast;
    save(PERF_KEY, s);
    applyFastMode();
    toast(s.fast ? 'Fast Mode enabled.' : 'Fast Mode disabled.');
    renderEfficiency();
  };

  window.v23RunAudit = function(){
    const before = claims();
    const seen = new Set();
    const deduped = [];
    before.forEach(c=>{
      const key = String(c.id || c.tag || JSON.stringify(c).slice(0,50)).toUpperCase();
      if(!seen.has(key)){ seen.add(key); deduped.push(c); }
    });
    if(deduped.length !== before.length) setClaims(deduped);
    const h = load(HEALTH_KEY, []);
    if(h.length > 80) save(HEALTH_KEY, h.slice(0,80));
    localStorage.setItem(LAST_AUDIT_KEY, now());
    buildClaimIndex(deduped);
    injectLazyLoading();
    v23Log('Efficiency audit complete. Removed duplicates: '+(before.length-deduped.length));
    toast('Audit complete. Duplicate claims removed: '+(before.length-deduped.length));
    renderEfficiency();
  };

  window.v23CompactLogs = function(){
    const h = load(HEALTH_KEY, []);
    save(HEALTH_KEY, h.slice(0,35));
    v23Log('Logs compacted to latest 35 records.');
    toast('Logs compacted.');
    renderEfficiency();
  };

  window.v23DownloadSlimBackup = function(){
    const data = {
      version:VERSION,
      exportedAt:now(),
      claims:claims(),
      health:load(HEALTH_KEY, []).slice(0,50),
      settings:load(PERF_KEY, {}),
      damageSummary:(()=>{ const d=load('oj_damage_master_v11_backup',{}); return {cases:Array.isArray(d.cases)?d.cases.length:0,lastUpdated:d.lastUpdated||null}; })()
    };
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)], {type:'application/json'}));
    a.download = 'oceanjet_v23_slim_backup.json';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),600);
  };

  function renderEfficiency(){
    const st = storageStats();
    const h = load(HEALTH_KEY, []);
    const all = claims();
    const active = all.filter(c => !['Closed','Rejected'].includes(String(c.status||''))).length;
    const high = all.filter(c => claimRisk(c).score >= 34).length;
    const score = healthScore();
    const settings = load(PERF_KEY, {fast:false});
    const biggest = st.items.slice(0,6).map(x => `<div class="v23-row"><div><strong>${esc(x.key)}</strong><small>${(x.bytes/1024).toFixed(1)} KB</small></div></div>`).join('') || '<p class="muted">No local storage data detected.</p>';
    ensureView('efficiency').innerHTML = `
      <div class="card glow">
        <div class="card-header"><span>⚡ Efficiency Center</span><span class="v23-chip ${score>=80?'green':score>=60?'amber':'red'}">Health ${score}%</span></div>
        <div class="v23-grid">
          <div class="v23-kpi"><b>${st.mb.toFixed(2)}MB</b><span>Storage Used</span></div>
          <div class="v23-kpi"><b>${all.length}</b><span>Total Claims</span></div>
          <div class="v23-kpi"><b>${active}</b><span>Active Queue</span></div>
          <div class="v23-kpi"><b>${high}</b><span>Needs Attention</span></div>
        </div>
        <div class="v23-meter" style="margin:12px 0"><span style="width:${st.pct}%"></span></div>
        <div class="v23-alert"><b>Recommended flow:</b> use Smart Triage Queue during duty, export a slim backup after each shift, and turn on Fast Mode on low-end phones.</div>
        <div class="v23-actions">
          <button class="primary block" onclick="showView('triage')">Open Smart Triage</button>
          <button class="accent block" onclick="v23RunAudit()">Run Efficiency Audit</button>
          <button class="block" onclick="v23ToggleFastMode()">${settings.fast?'Disable':'Enable'} Fast Mode</button>
          <button class="block" onclick="v23DownloadSlimBackup()">Slim Backup</button>
          <button class="block" onclick="v23CompactLogs()">Compact Logs</button>
          <button class="danger block" onclick="showView('sitehealth')">Site Health</button>
        </div>
      </div>
      <div class="card"><div class="card-header">Largest Local Data Blocks</div>${biggest}</div>
      <div class="card"><div class="card-header">Efficiency Notes</div>
        <div class="v23-row"><div><strong>Fast Mode</strong><small>Reduces heavy glow, animation, and blur effects to improve Android performance.</small></div><span class="v23-chip ${settings.fast?'green':'amber'}">${settings.fast?'ON':'OFF'}</span></div>
        <div class="v23-row"><div><strong>Claim Index</strong><small>Creates a fast session lookup table for claim number and baggage tag searches.</small></div><span class="v23-chip green">Ready</span></div>
        <div class="v23-row"><div><strong>Last Audit</strong><small>${esc(localStorage.getItem(LAST_AUDIT_KEY)||'Not yet run')}</small></div></div>
      </div>`;
  }

  function renderTriage(){
    const all = claims().slice();
    const open = all.filter(c=>!['Closed','Rejected'].includes(String(c.status || '')));
    open.sort((a,b)=>claimRisk(b).score-claimRisk(a).score || String(a.status).localeCompare(String(b.status)));
    const rows = open.map(c=>{
      const r = claimRisk(c);
      const cls = r.score >= 55 ? 'red' : r.score >= 34 ? 'amber' : 'green';
      return `<div class="v23-row v23-triage-row" data-search="${esc((c.id+' '+c.lastName+' '+c.tag+' '+c.description+' '+c.type+' '+c.status).toLowerCase())}">
        <div>
          <strong>${esc(c.id || 'No Claim ID')}</strong>
          <small>${esc(c.type || 'Claim')} • ${esc(c.routeLabel || c.route || 'No route')} • ${esc(c.createdAt || '')}</small>
          <small>Passenger: ${esc(mask(c.lastName))} • Tag: ${esc(c.tag || '—')} • Contact: ${esc(c.contact ? 'Provided' : 'Missing')}</small>
          <small>${esc(String(c.description || '').slice(0,160))}</small>
        </div>
        <div style="min-width:150px">
          <span class="v23-chip ${cls}">${r.label} ${r.score}%</span>
          <div style="height:8px"></div>
          <select onchange="v23SetStatus('${esc(c.id)}',this.value)">${['Submitted','Under Review','Approved','Processing','Closed','Rejected'].map(s=>`<option ${c.status===s?'selected':''}>${s}</option>`).join('')}</select>
          <button class="block" style="margin-top:7px" onclick="v23CopySummary('${esc(c.id)}')">Copy Summary</button>
        </div>
      </div>`;
    }).join('') || '<p class="muted">No active claims. Great job.</p>';
    ensureView('triage').innerHTML = `
      <div class="card glow">
        <div class="card-header"><span>🎯 Smart Triage Queue</span><span class="v23-chip pink">Priority Sorted</span></div>
        <div class="v23-command"><input id="v23TriageSearch" placeholder="Search claim, passenger, tag, route, status" oninput="v23FilterTriage()"></div>
        <div class="v23-grid"><div class="v23-kpi"><b>${open.length}</b><span>Open</span></div><div class="v23-kpi"><b>${open.filter(c=>claimRisk(c).score>=55).length}</b><span>Critical</span></div><div class="v23-kpi"><b>${open.filter(c=>!c.contact).length}</b><span>Missing Contact</span></div></div>
        <div class="v23-actions"><button class="primary block" onclick="showView('lostbaggage')">New Claim</button><button class="accent block" onclick="showView('damage')">Damage Detector</button><button class="block" onclick="v23BulkSetUnderReview()">Move Submitted to Review</button><button class="block" onclick="v23ExportTriageCSV()">Export Triage CSV</button></div>
      </div>
      <div class="card"><div class="card-header">Action Queue</div><div id="v23TriageRows">${rows}</div></div>`;
  }

  function mask(n){ n=String(n||''); return n.length<=2 ? (n ? n[0]+'*' : '—') : n[0]+'*'.repeat(Math.max(1,n.length-2))+n[n.length-1]; }

  window.v23FilterTriage = function(){
    const q = ($('v23TriageSearch')?.value || '').toLowerCase();
    qsa('.v23-triage-row').forEach(r => r.style.display = !q || r.dataset.search.includes(q) ? '' : 'none');
  };

  window.v23SetStatus = function(id,status){
    const all = claims();
    const c = all.find(x=>String(x.id)===String(id));
    if(!c) return toast('Claim not found.');
    c.status = status;
    c.updatedAt = now();
    c.history = c.history || [];
    c.history.unshift({time:now(), status, note:'Updated from V23 Smart Triage'});
    c.sync = 'Pending Local Backup';
    setClaims(all);
    toast(id+' → '+status);
    renderTriage();
  };

  window.v23BulkSetUnderReview = function(){
    const all = claims(); let n = 0;
    all.forEach(c=>{ if(c.status === 'Submitted'){ c.status = 'Under Review'; c.updatedAt = now(); c.history = c.history || []; c.history.unshift({time:now(),status:'Under Review',note:'Bulk review from V23'}); n++; } });
    setClaims(all); toast('Moved '+n+' claim(s) to Under Review.'); renderTriage();
  };

  window.v23CopySummary = function(id){
    const c = claims().find(x=>String(x.id)===String(id));
    if(!c) return;
    const r = claimRisk(c);
    const text = `${c.id} | ${c.type || 'Claim'} | ${c.routeLabel || c.route || 'No route'} | Status: ${c.status || 'Submitted'} | Priority: ${r.label} ${r.score}% | Tag: ${c.tag || 'N/A'} | Passenger: ${mask(c.lastName)} | ${String(c.description || '').slice(0,180)}`;
    navigator.clipboard?.writeText(text).then(()=>toast('Summary copied.')).catch(()=>alert(text));
  };

  window.v23ExportTriageCSV = function(){
    const headers = ['id','risk','type','routeLabel','lastName','tag','contact','status','createdAt','updatedAt','description'];
    const rows = claims().map(c=>{
      const data = Object.assign({}, c, {risk:claimRisk(c).label+' '+claimRisk(c).score});
      return headers.map(h=>'"'+String(data[h]??'').replace(/"/g,'""')+'"').join(',');
    });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([[headers.join(','),...rows].join('\n')], {type:'text/csv'}));
    a.download = 'oceanjet_v23_triage.csv';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),600);
  };

  function renderQuickFind(){
    ensureView('quickfind').innerHTML = `
      <div class="card glow">
        <div class="card-header"><span>🔎 Quick Find + Action Search</span><span class="v23-chip green">Fast lookup</span></div>
        <div class="v23-command"><input id="v23QuickInput" placeholder="Type claim no, baggage tag, route, tab, schedule, fare..." oninput="v23QuickSearch(this.value)" autofocus></div>
        <div id="v23QuickResults"><p class="muted">Search claims, routes, or pages. Example: OR123, Tagbilaran, Damage, Staff, Fare.</p></div>
      </div>`;
  }

  window.v23QuickSearch = function(q){
    q = String(q || '').trim().toLowerCase();
    const out = $('v23QuickResults');
    if(!out) return;
    if(!q){ out.innerHTML = '<p class="muted">Search claims, routes, or pages.</p>'; return; }
    const results = [];
    Object.entries(VIEWS).forEach(([view,label])=>{ if(label.toLowerCase().includes(q) || view.includes(q)) results.push({type:'Page',title:label,sub:'Open '+label,action:`showView('${view}')`}); });
    ROUTES.forEach(([route,label])=>{ if(label.toLowerCase().includes(q) || route.includes(q)) results.push({type:'Route',title:label,sub:'Open fare/schedule tools',action:`v23OpenRoute('${route}')`}); });
    claims().forEach(c=>{
      const hay = `${c.id} ${c.tag} ${c.lastName} ${c.routeLabel} ${c.route} ${c.status} ${c.description}`.toLowerCase();
      if(hay.includes(q)) results.push({type:'Claim',title:c.id || 'No Claim ID',sub:`${c.status || 'Submitted'} • ${mask(c.lastName)} • ${c.tag || 'No tag'}`,action:`v23GoClaim('${esc(c.id)}')`});
    });
    out.innerHTML = results.slice(0,18).map(r=>`<div class="v23-row v23-result" onclick="${r.action}"><div><strong>${esc(r.title)}</strong><small>${esc(r.sub)}</small></div><span class="v23-chip ${r.type==='Claim'?'pink':r.type==='Route'?'green':''}">${r.type}</span></div>`).join('') || '<p class="muted">No result found.</p>';
  };

  window.v23OpenRoute = function(route){
    try{ sessionStorage.setItem('oj_v23_focus_route', route); }catch(e){}
    if(typeof window.showView === 'function') window.showView('calc');
    setTimeout(()=>{ const r = $('calcRoute'); if(r){ r.value = route; r.dispatchEvent(new Event('change')); } }, 250);
  };

  window.v23GoClaim = function(id){
    if(typeof window.showView === 'function') window.showView('triage');
    setTimeout(()=>{
      const input = $('v23TriageSearch');
      if(input){ input.value = id; window.v23FilterTriage(); }
    }, 150);
  };

  function decoratePortal(){
    const p = $('view-portal');
    if(!p || $('v23PortalBoost')) return;
    const div = document.createElement('div');
    div.id = 'v23PortalBoost';
    div.className = 'card glow';
    div.innerHTML = `<div class="card-header"><span>⚡ V23 Efficiency Layer</span><span class="v23-chip green">Active</span></div><div class="v23-grid"><div class="v23-kpi"><b>${healthScore()}%</b><span>App Health</span></div><div class="v23-kpi"><b>${claims().filter(c=>!['Closed','Rejected'].includes(String(c.status||''))).length}</b><span>Open Claims</span></div></div><div class="v23-actions"><button class="primary block" onclick="showView('quickfind')">Quick Find</button><button class="accent block" onclick="showView('triage')">Smart Triage</button><button class="block" onclick="showView('efficiency')">Efficiency Center</button></div>`;
    p.insertBefore(div, p.firstChild);
  }

  function patchDrawer(){
    const menu = $('drawerMenu');
    if(!menu) return;
    const items = [
      ['quickfind','🔎','Quick Find'],
      ['triage','🎯','Smart Triage'],
      ['efficiency','⚡','Efficiency Center']
    ];
    items.reverse().forEach(([view,icon,label])=>{
      if(!qs(`.drawer-item[data-view="${view}"]`, menu)){
        const d = document.createElement('div');
        d.className = 'drawer-item';
        d.dataset.view = view;
        d.setAttribute('onclick', `navigate('${view}')`);
        d.innerHTML = `<i>${icon}</i> ${label}`;
        menu.insertBefore(d, menu.firstChild);
      }
    });
  }

  function showV23(name){
    qsa('.view').forEach(v=>v.classList.remove('active'));
    const v = ensureView(name);
    v.classList.add('active');
    if(name === 'efficiency') renderEfficiency();
    if(name === 'triage') renderTriage();
    if(name === 'quickfind') renderQuickFind();
    qsa('#drawerMenu .drawer-item').forEach(el => el.classList.toggle('active', el.dataset.view === name));
    injectLazyLoading();
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function patchNavigation(){
    const oldShow = window.showView;
    if(oldShow && !oldShow.__v23Wrapped){
      window.showView = function(name){
        if(['efficiency','triage','quickfind'].includes(name)){ showV23(name); return; }
        const result = oldShow.apply(this, arguments);
        setTimeout(()=>{ patchDrawer(); injectLazyLoading(); if(name==='portal') decoratePortal(); }, 60);
        return result;
      };
      window.showView.__v23Wrapped = true;
    }
    const oldBuild = window.buildDrawerMenu;
    if(oldBuild && !oldBuild.__v23Wrapped){
      window.buildDrawerMenu = buildDrawerMenu = function(){
        const r = oldBuild.apply(this, arguments);
        patchDrawer();
        return r;
      };
      window.buildDrawerMenu.__v23Wrapped = true;
    }
  }

  function boot(){
    injectStyles();
    applyFastMode();
    ensureView('efficiency'); ensureView('triage'); ensureView('quickfind');
    patchNavigation();
    if(typeof window.buildDrawerMenu === 'function') window.buildDrawerMenu(); else patchDrawer();
    patchDrawer();
    buildClaimIndex();
    injectLazyLoading();
    idle(()=>{ if((load(PERF_KEY,{autoAudit:true}).autoAudit !== false) && !localStorage.getItem(LAST_AUDIT_KEY)) window.v23RunAudit(); });
    setTimeout(()=>{ decoratePortal(); const active = qs('.view.active'); if(!active || active.offsetHeight < 8){ v23Log('Blank guard opened Efficiency Center.'); showV23('efficiency'); } }, 1200);
    v23Log('Efficiency engine booted.');
    console.log(VERSION+' loaded');
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot, {once:true}); else boot();
})();
</script>

<script id="v24ServiceOpsScript">
(function(){
  if(window.__OJ_V24_SERVICE_OPS_PORTAL__) return;
  window.__OJ_V24_SERVICE_OPS_PORTAL__ = true;

  const VERSION = 'V24_SERVICE_OPS_PORTAL';
  const CLAIM_KEY = 'oj_v22_claims';
  const TICKET_KEY = 'oj_v24_visit_tickets';
  const SHIFT_KEY = 'oj_v24_shift_board';
  const FEEDBACK_KEY = 'oj_v24_feedback';
  const SOP_KEY = 'oj_v24_sop_progress';
  const LOG_KEY = 'oj_v24_ops_log';

  const ROUTES = [
    ['cebu_tagbilaran','Cebu → Tagbilaran'],['cebu_maasin','Cebu → Maasin'],['cebu_surigao','Cebu → Surigao'],
    ['cebu_siquijor','Cebu → Siquijor'],['cebu_dumaguete','Cebu → Dumaguete'],['cebu_ormoc','Cebu → Ormoc'],
    ['cebu_palompon','Cebu → Palompon'],['cebu_getafe','Cebu → Getafe']
  ];

  const $ = id => document.getElementById(id);
  const qs = (s,root=document) => root.querySelector(s);
  const qsa = (s,root=document) => Array.from(root.querySelectorAll(s));
  const esc = v => String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const load = (k,f) => { try { return JSON.parse(localStorage.getItem(k) || 'null') ?? f; } catch(e){ return f; } };
  const save = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){ console.warn('V24 storage failed', e); } };
  const claims = () => load(CLAIM_KEY, []);
  const tickets = () => load(TICKET_KEY, []);
  const feedback = () => load(FEEDBACK_KEY, []);
  const sopProgress = () => load(SOP_KEY, {});
  const routeLabel = r => ROUTES.find(x=>x[0]===r)?.[1] || r || 'No route';
  const nowPHT = () => new Date().toLocaleString('en-PH', {timeZone:'Asia/Manila', hour12:true});
  const todayPHT = () => new Date().toLocaleDateString('en-CA', {timeZone:'Asia/Manila'});
  const mask = v => { v = String(v || ''); return v.length <= 2 ? v : v[0] + '*'.repeat(Math.max(1,v.length-2)) + v.slice(-1); };
  const toast = msg => { if(typeof window.toast === 'function') return window.toast(msg); if(typeof window.toast22 === 'function') return window.toast22(msg); alert(msg); };

  function log(msg){ const rows = load(LOG_KEY, []); rows.unshift({time:nowPHT(), msg:String(msg)}); save(LOG_KEY, rows.slice(0,80)); }
  function ensureView(name){
    const id = name.startsWith('view-') ? name : 'view-' + name;
    let v = $(id);
    if(!v){ v = document.createElement('div'); v.id = id; v.className = 'view'; (qs('.app') || document.body).appendChild(v); }
    return v;
  }
  function statusClass(status){ status = String(status || '').toLowerCase(); if(status.includes('critical')||status.includes('escalated')) return 'red'; if(status.includes('review')||status.includes('processing')) return 'amber'; if(status.includes('closed')||status.includes('resolved')) return 'green'; return 'pink'; }
  function riskScore(c){
    let s = 8;
    const text = `${c.type||''} ${c.description||''} ${c.damageType||''} ${c.status||''}`.toLowerCase();
    if(text.includes('lost')) s += 32;
    if(text.includes('critical')||text.includes('wet')||text.includes('missing')||text.includes('crack')||text.includes('broken')) s += 25;
    if(!c.contact) s += 18;
    if(!c.tag) s += 12;
    if(String(c.status||'').toLowerCase().includes('review')) s += 10;
    const ageHours = Math.max(0, (Date.now() - Date.parse(c.createdAt || c.updatedAt || new Date())) / 36e5);
    if(ageHours > 24) s += 20; else if(ageHours > 8) s += 10;
    return Math.min(100, Math.round(s));
  }
  function openClaims(){ return claims().filter(c=>!['Closed','Rejected','Resolved'].includes(String(c.status || ''))); }
  function uid(prefix){ return prefix + '-' + todayPHT().replace(/-/g,'') + '-' + Math.random().toString(36).slice(2,6).toUpperCase(); }

  const SOP = {
    damage:{title:'Damage Claim Intake', icon:'🧳', steps:['Verify PSN or claim stub/tag and passenger last name.','Capture claim stub/tag photo first.','Capture full baggage view and close-up damage evidence.','Confirm route, destination, color, size, baggage type, and damage category.','Save case, issue claim number, and tell passenger how to track status.','Lock evidence only after supervisor review.']},
    lost:{title:'Lost Baggage Report', icon:'🔍', steps:['Ask passenger route, last seen port, baggage tag, and contact number.','Record color, size, type, and identifying marks.','Check today’s active claims and staff counter queue for possible match.','Mark as Under Review and assign next follow-up time.','Export daily lost baggage list at end of shift.']},
    cashier:{title:'Cashier Baggage Fee Flow', icon:'💳', steps:['Use Baggage Calc tab only for official baggage computation.','Confirm route, class, baggage weight, and declared value.','Use cashier adjustment only when authorized.','Save receipt and keep transaction in history.','Never calculate official baggage fee inside chatbot.']},
    backup:{title:'End-of-Shift Backup', icon:'💾', steps:['Open Efficiency Center or Site Health.','Run audit and duplicate cleanup.','Export full backup and claims CSV.','Store backup in approved OceanJet drive or device.','Confirm next shift can access needed records.']},
    passenger:{title:'Passenger Help Desk', icon:'🎫', steps:['Ask the passenger what they need: fare, schedule, claim status, lost baggage, or damage report.','Use Service Hub quick cards instead of searching through admin tools.','Issue visit ticket if the counter is busy.','For claim status, search claim number on the passenger device.','Escalate if passenger has missing contact details or critical damage.']}
  };

  function health(){
    const cls = claims();
    const open = openClaims();
    const urgent = open.filter(c=>riskScore(c)>=55).length;
    const missing = open.filter(c=>!c.contact || !c.tag).length;
    const todayTickets = tickets().filter(t=>String(t.createdAt||'').includes(todayPHT())).length;
    let score = 100 - urgent*8 - missing*4;
    try{ const mb = JSON.stringify(localStorage).length/1024/1024; if(mb > 4) score -= 20; else if(mb > 2) score -= 10; }catch(e){}
    return {claims:cls.length, open:open.length, urgent, missing, todayTickets, score:Math.max(35,Math.min(100,score))};
  }

  function renderServiceHub(){
    const h = health();
    ensureView('servicehub').innerHTML = `
      <div class="card v24-shell">
        <div class="v24-title"><div><h2>🧭 V24 Smart Service Hub</h2><small>One mobile front desk for passengers and staff. Choose a task, not a technical module.</small></div><span class="v24-chip green">Public-ready</span></div>
        <div class="v24-grid" style="margin-top:12px">
          <div class="v24-kpi"><b>${h.open}</b><span>Open Claims</span></div><div class="v24-kpi"><b>${h.urgent}</b><span>Urgent Cases</span></div><div class="v24-kpi"><b>${h.todayTickets}</b><span>Visit Tickets Today</span></div><div class="v24-kpi"><b>${h.score}%</b><span>Site Health</span></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">What do you need?</div>
        <div class="v24-grid2">
          <div class="v24-service-card" onclick="showView('calculator')"><div class="ico">🧮</div><div><b>Check Baggage Fee</b><small>Open the original official baggage calculator.</small></div></div>
          <div class="v24-service-card" onclick="showView('fares')"><div class="ico">💵</div><div><b>Check Passenger Fare</b><small>View Cebu main route passenger fare matrix.</small></div></div>
          <div class="v24-service-card" onclick="showView('schedules')"><div class="ico">🕐</div><div><b>Check Schedule</b><small>Open schedule list for available routes.</small></div></div>
          <div class="v24-service-card" onclick="showView('lostbaggage')"><div class="ico">🧳</div><div><b>Report Lost/Damaged Baggage</b><small>Create a claim number and local receipt.</small></div></div>
          <div class="v24-service-card" onclick="showView('claimstatus')"><div class="ico">🔎</div><div><b>Track Claim Status</b><small>Search by claim number on this device.</small></div></div>
          <div class="v24-service-card" onclick="showView('sopcenter')"><div class="ico">📘</div><div><b>Help / SOP Guide</b><small>Step-by-step guide for common port tasks.</small></div></div>
        </div>
      </div>
      <div class="card v24-shell">
        <div class="card-header">🎟 Counter Visit Ticket</div>
        <div class="grid2"><div class="input-group"><label>Purpose</label><select id="v24TicketPurpose"><option>Damage Claim</option><option>Lost Baggage</option><option>Baggage Fee Question</option><option>Schedule/Fare Help</option><option>Other Help</option></select></div><div class="input-group"><label>Route</label><select id="v24TicketRoute">${ROUTES.map(r=>`<option value="${r[0]}">${r[1]}</option>`).join('')}</select></div></div>
        <div class="grid2"><div class="input-group"><label>Passenger Last Name (optional)</label><input id="v24TicketName" placeholder="For faster search only"></div><div class="input-group"><label>Contact (optional)</label><input id="v24TicketContact" placeholder="Phone or email"></div></div>
        <button class="primary block" onclick="v24CreateTicket()">Generate Visit Ticket</button>
        <div id="v24TicketOut" style="margin-top:10px"></div>
      </div><div class="v24-bottom-space"></div>`;
  }

  window.v24CreateTicket = function(){
    const item = {id:uid('OJ-VISIT'), purpose:$('v24TicketPurpose')?.value || 'Help', route:$('v24TicketRoute')?.value || '', name:$('v24TicketName')?.value.trim() || '', contact:$('v24TicketContact')?.value.trim() || '', status:'Waiting', createdAt:nowPHT()};
    const all = tickets(); all.unshift(item); save(TICKET_KEY, all.slice(0,300)); log('Visit ticket created: '+item.id);
    const out = $('v24TicketOut'); if(out){ out.innerHTML = ticketHtml(item); drawMiniQr('v24TicketQR-'+item.id.replace(/[^A-Z0-9]/gi,''), item.id); }
    toast('Visit ticket generated.');
  };

  function ticketHtml(t){ const id = 'v24TicketQR-' + String(t.id).replace(/[^A-Z0-9]/gi,''); return `<div class="v24-ticket"><canvas id="${id}" width="120" height="120"></canvas><div><span class="v24-chip green">${esc(t.status)}</span><h3 style="margin:8px 0;color:#fff">${esc(t.id)}</h3><p class="muted">${esc(t.purpose)} • ${esc(routeLabel(t.route))}<br>${esc(mask(t.name)) || 'Passenger'} • ${esc(t.createdAt)}</p><button class="sm" onclick="navigator.clipboard?.writeText('${esc(t.id)}'); toast('Ticket copied.')">Copy Ticket No.</button></div></div>`; }

  function drawMiniQr(canvasId,text){
    const c = $(canvasId); if(!c) return; const ctx = c.getContext('2d'); const n=21, cell=Math.floor(c.width/n); ctx.fillStyle='#fff'; ctx.fillRect(0,0,c.width,c.height); let seed=0; for(let i=0;i<String(text).length;i++) seed=(seed*31+String(text).charCodeAt(i))>>>0;
    function bit(x,y){ seed=(seed*1664525+1013904223)>>>0; return ((seed+x*17+y*29) % 5) < 2; }
    function finder(x,y){ ctx.fillStyle='#111827'; ctx.fillRect(x*cell,y*cell,7*cell,7*cell); ctx.fillStyle='#fff'; ctx.fillRect((x+1)*cell,(y+1)*cell,5*cell,5*cell); ctx.fillStyle='#111827'; ctx.fillRect((x+2)*cell,(y+2)*cell,3*cell,3*cell); }
    finder(1,1); finder(13,1); finder(1,13); ctx.fillStyle='#111827'; for(let y=0;y<n;y++){ for(let x=0;x<n;x++){ if((x<9&&y<9)||(x>11&&y<9)||(x<9&&y>11)) continue; if(bit(x,y)) ctx.fillRect(x*cell,y*cell,cell,cell); } }
  }

  function renderOpsFlow(){
    const h=health(); const shift=load(SHIFT_KEY, defaultShift()); const active=openClaims().slice().sort((a,b)=>riskScore(b)-riskScore(a)).slice(0,12);
    ensureView('opsflow').innerHTML = `
      <div class="card v24-shell"><div class="v24-title"><div><h2>🧩 Daily Ops Flow Board</h2><small>For baggage staff and counter leads. Shows what needs action now.</small></div><span class="v24-chip ${h.urgent?'red':'green'}">${h.urgent? h.urgent+' urgent':'Stable'}</span></div><div class="v24-grid" style="margin-top:12px"><div class="v24-kpi"><b>${h.open}</b><span>Open Claims</span></div><div class="v24-kpi"><b>${h.missing}</b><span>Missing Info</span></div><div class="v24-kpi"><b>${tickets().filter(t=>t.status!=='Done').length}</b><span>Waiting Tickets</span></div><div class="v24-kpi"><b>${h.score}%</b><span>Readiness</span></div></div><div class="v24-meter"><span style="width:${h.score}%"></span></div></div>
      <div class="card"><div class="card-header">✅ Shift Checklist</div>${shift.tasks.map((t,i)=>`<label class="v24-row" style="cursor:pointer"><div><strong>${esc(t.label)}</strong><small>${esc(t.help)}</small></div><input type="checkbox" ${t.done?'checked':''} onchange="v24ToggleShift(${i},this.checked)"></label>`).join('')}<div class="v24-actions"><button class="primary block" onclick="v24ExportDailyPack()">Export Daily Pack</button><button class="accent block" onclick="v24ResetShift()">Reset Checklist</button></div></div>
      <div class="card"><div class="card-header">🎯 Priority Work Queue</div><div class="v24-sticky-search"><input id="v24OpsSearch" placeholder="Search active claims or tickets" oninput="v24FilterOps()"></div><div id="v24OpsRows">${opsRows(active)}</div></div>
      <div class="card"><div class="card-header">🎟 Recent Visit Tickets</div><div class="v24-mini-log">${ticketRows(tickets().slice(0,12))}</div></div><div class="v24-bottom-space"></div>`;
  }
  function defaultShift(){ return {date:todayPHT(),tasks:[{label:'Open counter and verify device time',help:'PHT clock, browser storage, camera permission.',done:false},{label:'Check pending urgent claims',help:'Prioritize critical damage, missing contact, and old claims.',done:false},{label:'Confirm export backup location',help:'Use approved device or shared drive.',done:false},{label:'Review route/schedule notices',help:'Make sure public info is up to date.',done:false},{label:'End-of-shift backup export',help:'Export CSV/JSON before turnover.',done:false}]}; }
  window.v24ToggleShift = function(i,done){ const s=load(SHIFT_KEY, defaultShift()); if(s.tasks[i]) s.tasks[i].done=!!done; save(SHIFT_KEY,s); log('Shift checklist updated.'); };
  window.v24ResetShift = function(){ save(SHIFT_KEY, defaultShift()); renderOpsFlow(); toast('Shift checklist reset.'); };
  function opsRows(rows){ return rows.length ? rows.map(c=>{ const r=riskScore(c); const cls=r>=65?'red':r>=40?'amber':'green'; return `<div class="v24-row"><div><strong>${esc(c.id||'No Claim ID')}</strong><small>${esc(c.type||'Claim')} • ${esc(c.routeLabel||routeLabel(c.route))} • ${esc(mask(c.lastName))} • Tag ${esc(c.tag||'missing')}</small></div><div style="text-align:right"><span class="v24-chip ${cls}">${r}%</span><br><button class="sm" onclick="v24MarkReview('${esc(c.id)}')">Review</button></div></div>`; }).join('') : '<p class="muted">No active claims.</p>'; }
  function ticketRows(rows){ return rows.length ? rows.map(t=>`<div class="v24-row"><div><strong>${esc(t.id)}</strong><small>${esc(t.purpose)} • ${esc(routeLabel(t.route))} • ${esc(mask(t.name))}</small></div><span class="v24-chip ${t.status==='Done'?'green':'amber'}">${esc(t.status)}</span></div>`).join('') : '<p class="muted">No visit tickets.</p>'; }
  window.v24FilterOps = function(){ const q=String($('v24OpsSearch')?.value||'').toLowerCase(); const rows=openClaims().filter(c=>`${c.id} ${c.tag} ${c.lastName} ${c.routeLabel} ${c.status} ${c.type}`.toLowerCase().includes(q)).sort((a,b)=>riskScore(b)-riskScore(a)).slice(0,20); const out=$('v24OpsRows'); if(out) out.innerHTML=opsRows(rows); };
  window.v24MarkReview = function(id){ const all=claims(); const c=all.find(x=>String(x.id)===String(id)); if(!c) return; c.status='Under Review'; c.updatedAt=nowPHT(); save(CLAIM_KEY,all); log('Claim moved to Under Review: '+id); renderOpsFlow(); toast('Claim marked Under Review.'); };

  function renderSOPCenter(){ const prog=sopProgress(); ensureView('sopcenter').innerHTML = `<div class="card v24-shell"><div class="v24-title"><div><h2>📘 SOP Assistant Center</h2><small>Step-by-step operating guide for port staff. Works offline after page is loaded.</small></div><span class="v24-chip green">Guided</span></div></div><div class="v24-grid2" style="margin-top:12px">${Object.entries(SOP).map(([k,s])=>`<div class="v24-service-card" onclick="v24OpenSOP('${k}')"><div class="ico">${s.icon}</div><div><b>${esc(s.title)}</b><small>${prog[k]?'Completed before':'Tap to open workflow'}</small></div></div>`).join('')}</div><div id="v24SopDetail" class="card" style="margin-top:12px"><p class="muted">Choose an SOP card to begin.</p></div><div class="v24-bottom-space"></div>`; }
  window.v24OpenSOP = function(key){ const s=SOP[key]; if(!s) return; const out=$('v24SopDetail'); if(!out) return; out.innerHTML = `<div class="card-header">${s.icon} ${esc(s.title)}</div>${s.steps.map((step,i)=>`<div class="v24-sop-step"><div class="num">${i+1}</div><div><strong>Step ${i+1}</strong><small>${esc(step)}</small></div></div>`).join('')}<div class="v24-actions"><button class="primary block" onclick="v24CompleteSOP('${key}')">Mark SOP Complete</button><button class="block" onclick="showView('servicehub')">Back to Service Hub</button></div>`; };
  window.v24CompleteSOP = function(key){ const p=sopProgress(); p[key]=nowPHT(); save(SOP_KEY,p); log('SOP completed: '+key); toast('SOP marked complete.'); renderSOPCenter(); };

  function renderFeedback(){
    ensureView('feedback').innerHTML = `<div class="card v24-shell"><div class="v24-title"><div><h2>💬 Passenger Feedback + Service Quality</h2><small>Local feedback capture for service improvement. Export with daily pack.</small></div><span class="v24-chip pink">Local</span></div></div><div class="card"><div class="grid2"><div class="input-group"><label>Rating</label><select id="v24Rate"><option value="5">5 - Excellent</option><option value="4">4 - Good</option><option value="3">3 - Fair</option><option value="2">2 - Needs Improvement</option><option value="1">1 - Poor</option></select></div><div class="input-group"><label>Topic</label><select id="v24Topic"><option>Baggage</option><option>Schedule</option><option>Fare</option><option>Staff Assistance</option><option>Terminal Experience</option><option>Other</option></select></div></div><div class="input-group"><label>Comment</label><textarea id="v24Comment" rows="4" placeholder="Optional comment"></textarea></div><button class="primary block" onclick="v24SaveFeedback()">Save Feedback</button></div><div class="card"><div class="card-header">Recent Feedback</div><div id="v24FeedbackRows">${feedbackRows()}</div></div><div class="v24-bottom-space"></div>`;
  }
  window.v24SaveFeedback = function(){ const item={id:uid('FB'),rating:$('v24Rate')?.value||'5',topic:$('v24Topic')?.value||'Other',comment:$('v24Comment')?.value.trim()||'',createdAt:nowPHT()}; const rows=feedback(); rows.unshift(item); save(FEEDBACK_KEY, rows.slice(0,300)); log('Feedback saved: '+item.rating); renderFeedback(); toast('Feedback saved.'); };
  function feedbackRows(){ const rows=feedback().slice(0,12); return rows.length ? rows.map(f=>`<div class="v24-row"><div><strong>${'⭐'.repeat(Number(f.rating)||1)} ${esc(f.topic)}</strong><small>${esc(f.comment||'No comment')} • ${esc(f.createdAt)}</small></div><span class="v24-chip green">${esc(f.rating)}/5</span></div>`).join('') : '<p class="muted">No feedback recorded yet.</p>'; }

  window.v24ExportDailyPack = function(){
    const data = {version:VERSION, exportedAt:nowPHT(), claims:claims(), visitTickets:tickets(), feedback:feedback(), shift:load(SHIFT_KEY, defaultShift()), sopProgress:sopProgress(), opsLog:load(LOG_KEY, [])};
    const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='oceanjet_v24_daily_pack_'+todayPHT()+'.json'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),700); log('Daily pack exported.');
  };

  function decoratePortal(){
    const p=$('view-portal'); if(!p || $('v24PortalCard')) return; const h=health(); const card=document.createElement('div'); card.id='v24PortalCard'; card.className='card v24-shell'; card.innerHTML=`<div class="v24-title"><div><h2>✨ V24 Service Ops Layer</h2><small>Faster passenger service, staff workflow, SOP guidance, visit tickets, and feedback capture.</small></div><span class="v24-chip green">${h.score}% ready</span></div><div class="v24-actions"><button class="primary block" onclick="showView('servicehub')">Service Hub</button><button class="accent block" onclick="showView('opsflow')">Ops Flow</button><button class="block" onclick="showView('sopcenter')">SOP Guide</button><button class="block" onclick="showView('feedback')">Feedback</button></div>`; p.insertBefore(card,p.firstChild);
  }

  function patchDrawer(){
    const menu=$('drawerMenu'); if(!menu) return; const items=[['servicehub','🧭','Service Hub'],['opsflow','🧩','Ops Flow'],['sopcenter','📘','SOP Center'],['feedback','💬','Feedback']];
    items.reverse().forEach(([view,icon,label])=>{ if(!qs(`.drawer-item[data-view="${view}"]`,menu)){ const d=document.createElement('div'); d.className='drawer-item'; d.dataset.view=view; d.setAttribute('onclick',`navigate('${view}')`); d.innerHTML=`<i>${icon}</i> ${label}`; menu.insertBefore(d, menu.firstChild); } });
  }
  function showV24(name){
    qsa('.view').forEach(v=>v.classList.remove('active')); const v=ensureView(name); v.classList.add('active');
    if(name==='servicehub') renderServiceHub(); if(name==='opsflow') renderOpsFlow(); if(name==='sopcenter') renderSOPCenter(); if(name==='feedback') renderFeedback();
    qsa('#drawerMenu .drawer-item').forEach(el=>el.classList.toggle('active', el.dataset.view===name)); window.scrollTo({top:0,behavior:'smooth'});
  }
  function patchNavigation(){
    const oldShow=window.showView; if(oldShow && !oldShow.__v24Wrapped){ window.showView=showView=function(name){ if(['servicehub','opsflow','sopcenter','feedback'].includes(name)){ showV24(name); return; } const r=oldShow.apply(this, arguments); setTimeout(()=>{patchDrawer(); if(name==='portal') decoratePortal();},80); return r; }; window.showView.__v24Wrapped=true; }
    const oldBuild=window.buildDrawerMenu; if(oldBuild && !oldBuild.__v24Wrapped){ window.buildDrawerMenu=buildDrawerMenu=function(){ const r=oldBuild.apply(this, arguments); patchDrawer(); return r; }; window.buildDrawerMenu.__v24Wrapped=true; }
  }
  function boot(){
    try{
      document.body.classList.add('v24-mobile-polish'); ensureView('servicehub'); ensureView('opsflow'); ensureView('sopcenter'); ensureView('feedback'); patchNavigation(); if(typeof window.buildDrawerMenu==='function') window.buildDrawerMenu(); patchDrawer(); setTimeout(decoratePortal,700); log('V24 Service Ops booted.'); console.log(VERSION+' loaded');
    }catch(e){ console.error('V24 boot error', e); }
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot, {once:true}); else boot();
})();
</script>
