<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="description" content="Ocean Fast Ferries Baggage Pro - Professional baggage fee calculator and operations tool">
<meta name="theme-color" content="#f43f5e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛴️</text></svg>">
<title>Ocean Fast Ferries · Baggage Pro V300</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>

<body>
<div class="app">
    <!-- Login Overlay -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2 style="text-align:center">⛴️ Ocean Fast Ferries</h2>
            <p style="text-align:center;font-size:.7rem;color:var(--text3);margin-bottom:16px">Baggage Pro V300</p>
            <div class="input-group"><label>Username</label><input id="loginUser" placeholder="Enter username" autofocus></div>
            <div class="input-group"><label>Password</label><input type="password" id="loginPass" placeholder="Enter password"></div>
            <button class="primary block" onclick="attemptLogin()">Login</button>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="hamburger" id="hamburger" onclick="toggleDrawer()"><div></div><div></div><div></div></div>
        <div class="brand">Ocean Fast Ferries</div>
        <div class="header-right">
            <div class="toggle-dark" id="darkLightToggle" onclick="toggleTheme()">💡</div>
            <div class="header-clock" id="headerClock" onclick="showShiftTimer()" title="Tap for Shift Timer"></div>
            <span class="role-badge" id="roleBadge"></span>
            <div class="logout-btn" id="headerLogoutBtn" onclick="logout()" title="Logout">⏻</div>
        </div>
    </header>

    <!-- Overlay & Drawer -->
    <div class="overlay" id="overlay" onclick="closeDrawer()"></div>
    <nav class="side-drawer" id="sideDrawer">
        <div class="drawer-close" onclick="closeDrawer()">✕</div>
        <div class="drawer-menu" id="drawerMenu"></div>
        <button class="drawer-logout" onclick="logout()">🚪 Logout</button>
    </nav>

    <!-- Views -->
    <div id="view-dashboard" class="view active"></div>
    <div id="view-calculator" class="view"></div>
    <div id="view-analytics" class="view"></div>
    <div id="view-fares" class="view"></div>
    <div id="view-schedules" class="view"></div>
    <div id="view-history" class="view"></div>
    <div id="view-admin" class="view"></div>
    <div id="view-map" class="view"></div>
</div>

<!-- V300: Unified Action Menu (replaces all FABs) -->
<button class="action-menu-fab" id="actionMenuFab" onclick="toggleActionMenu()">✚</button>
<div class="action-menu-items" id="actionMenuItems">
    <div class="action-item" onclick="showTally();toggleActionMenu()">
        <span class="action-item-label">Tally</span>
        <button class="action-item-btn tally">👤</button>
    </div>
    <div class="action-item" onclick="openFarePanel();toggleActionMenu()">
        <span class="action-item-label">Fares</span>
        <button class="action-item-btn fare">₱</button>
    </div>
    <div class="action-item" onclick="undoLastTransaction();toggleActionMenu()">
        <span class="action-item-label">Undo</span>
        <button class="action-item-btn undo">↶</button>
    </div>
    <div class="action-item" onclick="toggleChat();toggleActionMenu()">
        <span class="action-item-label">AI Chat</span>
        <button class="action-item-btn ai">🤖</button>
    </div>
    <div class="action-item" onclick="exportHistoryCSV();toggleActionMenu()">
        <span class="action-item-label">Export</span>
        <button class="action-item-btn export">📥</button>
    </div>
</div>

<!-- Chat Panel -->
<div class="chat-panel" id="chatPanel">
    <div class="chat-header"><span>🤖 Genius Assistant · Gemini</span><span style="cursor:pointer" onclick="toggleChat()">✕</span></div>
    <div class="chat-body" id="chatBody">
        <div class="chat-bubble bot">Hello! I'm the Ocean Fast Ferries genius AI. Ask me anything about baggage, fares, schedules, connections, or tourist tips.</div>
    </div>
    <div class="chat-input-wrapper">
        <button class="voice-btn" id="voiceBtn" onclick="startVoice()">🎤</button>
        <input id="chatInput" placeholder="Type here..." onkeypress="if(event.key==='Enter')sendAIChat()">
        <button class="primary sm" onclick="sendAIChat()" id="sendBtn">Send</button>
    </div>
</div>

<!-- Status Badges (minimal, no clutter) -->
<div class="offline-badge" id="offlineBadge">📡 Offline</div>
<div class="alert-badge" id="alertBadge"><span class="alert-dot"></span><span class="alert-text"></span></div>

<!-- External Libraries -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<!-- App Modules -->
<script src="data.js"></script>
<script src="utils.js"></script>
<script src="app.js"></script>
<script src="map.js"></script>

<!-- Register Real Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(() => console.log('SW registered from file')).catch(e => console.log('SW registration failed:', e));
}
</script>
</body>
</html>
