  function renderLogin(which){ const isAdmin = which === 'admin'; const v=ensureView(isAdmin?'v35-admin-login':'v35-cashier-login'); v.innerHTML = `<div class="card oj35-shell oj35-login"><div class="oj35-head"><div><h2>${isAdmin?'🔐 Admin Login':'💼 Cashier Login'}</h2><div class="oj35-sub">${isAdmin?'Unlock full access to all passenger, cashier, reporting, backup, and admin tools.':'Unlock counter-only tools for baggage fee processing, claim intake, receipts, and PDF transaction reports.'}</div></div>${chip(isAdmin?'FULL ACCESS':'COUNTER ACCESS',isAdmin?'hot':'warn')}</div><div class="input-group"><label>Username</label><input id="oj35_${which}_user" autocomplete="username" placeholder="Enter ${isAdmin?'admin':'cashier'} username"></div><div class="input-group"><label>Password</label><input id="oj35_${which}_pass" type="password" autocomplete="current-password" placeholder="Enter password" onkeypress="if(event.key==='Enter')oj35DoLogin('${which}')"></div><button class="primary block" onclick="oj35DoLogin('${which}')">Login as ${isAdmin?'Admin':'Cashier'}</button><button class="accent block" style="margin-top:8px" onclick="oj35Logout()">Continue as Passenger</button><div class="oj35-callout" style="margin-top:12px">${isAdmin?'Admin can see and manage everything.':'Cashier cannot see admin settings, full backups, system configuration, or admin-only dashboards.'}</div></div>`; setTimeout(()=>{ const u=$id(`oj35_${which}_user`); if(u) u.focus(); },60); }

  function makePDF(title, lines, filename){ title=cleanText(title||'OceanJet Report'); const all=wrapLines([title,'Ocean Fast Ferries / OceanJet','Generated: '+now(),'Role: '+getRole().toUpperCase(),''].concat(lines||[]),86); const pages=[]; for(let i=0;i<all.length;i+=42) pages.push(all.slice(i,i+42)); const objs=[null]; objs[1]='<< /Type /Catalog /Pages 2 0 R >>'; objs[2]=''; objs[3]='<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>'; const kids=[]; pages.forEach((page,idx)=>{ let y=760, stream='BT\n'; page.forEach((line,i)=>{ const size=(idx===0&&i===0)?17:(i<4?10:9); stream += `/F1 ${size} Tf 48 ${y} Td (${pdfEscape(line)}) Tj\n`; y -= (idx===0&&i===0)?22:15; }); stream += 'ET\n'; const len=new TextEncoder().encode(stream).length; const contentId=objs.length; objs.push(`<< /Length ${len} >>\nstream\n${stream}endstream`); const pageId=objs.length; kids.push(pageId+' 0 R'); objs.push(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] /Resources << /Font << /F1 3 0 R >> >> /Contents ${contentId} 0 R >>`); }); objs[2]=`<< /Type /Pages /Kids [${kids.join(' ')}] /Count ${kids.length} >>`; let pdf='%PDF-1.4\n'; const offsets=[0]; for(let i=1;i<objs.length;i++){ offsets[i]=new TextEncoder().encode(pdf).length; pdf += `${i} 0 obj\n${objs[i]}\nendobj\n`; } const xrefPos=new TextEncoder().encode(pdf).length; pdf += `xref\n0 ${objs.length}\n0000000000 65535 f \n`; for(let i=1;i<objs.length;i++) pdf += String(offsets[i]).padStart(10,'0')+' 00000 n \n'; pdf += `trailer\n<< /Size ${objs.length} /Root 1 0 R >>\nstartxref\n${xrefPos}\n%%EOF`; const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([pdf],{type:'application/pdf'})); a.download=filename||('oceanjet_report_'+Date.now()+'.pdf'); document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1000); toast35('PDF exported.'); }
  function txLines(){ const h=(getDB()&&Array.isArray(getDB().history))?getDB().history:[]; const rows=['TRANSACTION SUMMARY','Total records: '+h.length,'']; if(!h.length) rows.push('No local transactions recorded yet.'); h.slice(-80).reverse().forEach((x,i)=>rows.push(`${i+1}. ${x.time||''} | ${x.route||''} | ${x.mode||''} | ${x.cls||''} | Pax ${x.pax||''} | ${x.weight||''}kg | PHP ${Number(x.total||0).toFixed(2)}`)); return rows; }

<script id="oj41StableRoleScript">
(function(){

  const MENU={

    cashier:[['home','🏠','Counter Home'],['calculator','🧮','Baggage Calc'],['damage','📷','Damage Evidence'],['ar','📹','AR Camera'],['lostbaggage','🧳','Claim Form'],['claimstatus','🔎','Claim Status'],['staffcounter','👥','Staff Counter'],['history','📋','Transactions'],['reports','📄','PDF Center'],['login-admin','🔐','Admin Login'],['logout','🚪','Passenger Mode']],

      tools=iconAction('🧮','Baggage calculator','Official fee computation and receipt generation.','calculator','good')+iconAction('📷','Damage evidence','Capture and record baggage damage claims.','damage','hot')+iconAction('📹','AR camera','Open preserved AR baggage scanner.','ar')+iconAction('🧳','Claim form','Passenger lost/damaged baggage intake.','lostbaggage','warn')+iconAction('🔎','Claim status','Lookup claim progress.','claimstatus')+iconAction('📄','PDF center','Receipt, transaction, and damage reports.','reports','good');
      extra=`<div class="card"><div class="card-header">Counter workflow</div>${['Compute baggage fee','Print/download PDF receipt','Capture damage evidence','Create/track claim','Export cashier PDF report'].map((x,i)=>`<div class="oj41-row"><div><strong>${i+1}. ${x}</strong><small>Only counter-related tools are visible.</small></div><span class="oj41-chip">OK</span></div>`).join('')}</div>`;

  function makePDF(title, lines, filename){title=String(title||'OceanJet Report'); let body=wrap(lines||[],88); if(!body.length) body=['No local data available yet.']; const header=['Ocean Fast Ferries / OceanJet','Generated: '+now(),'Role: '+role().toUpperCase(),'']; const all=wrap([title].concat(header,body),88); const pages=[]; for(let i=0;i<all.length;i+=45) pages.push(all.slice(i,i+45)); const enc=new TextEncoder(); const objs=[null]; const kids=[]; objs[1]='<< /Type /Catalog /Pages 2 0 R >>'; objs[2]=''; objs[3]='<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>'; pages.forEach((page,pi)=>{let stream='BT\n'; page.forEach((line,li)=>{const y=748-(li*15); const size=(pi===0&&li===0)?16:(li<4?10:9); stream+='/F1 '+size+' Tf 48 '+y+' Tm ('+pdfSafe(line)+') Tj\n'}); stream+='ET\n'; const contentId=objs.length; objs.push('<< /Length '+enc.encode(stream).length+' >>\nstream\n'+stream+'endstream'); const pageId=objs.length; objs.push('<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] /Resources << /Font << /F1 3 0 R >> >> /Contents '+contentId+' 0 R >>'); kids.push(pageId+' 0 R')}); objs[2]='<< /Type /Pages /Kids ['+kids.join(' ')+'] /Count '+kids.length+' >>'; let pdf='%PDF-1.4\n'; const offsets=[0]; for(let i=1;i<objs.length;i++){offsets[i]=enc.encode(pdf).length; pdf+=i+' 0 obj\n'+objs[i]+'\nendobj\n'} const xref=enc.encode(pdf).length; pdf+='xref\n0 '+objs.length+'\n0000000000 65535 f \n'; for(let i=1;i<objs.length;i++) pdf+=String(offsets[i]).padStart(10,'0')+' 00000 n \n'; pdf+='trailer\n<< /Size '+objs.length+' /Root 1 0 R >>\nstartxref\n'+xref+'\n%%EOF'; const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([pdf],{type:'application/pdf'})); a.download=filename||('oceanjet_report_'+Date.now()+'.pdf'); document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},1200); toast('PDF exported with content')}
  function renderAR(){const v=activate('oj44-ar'); v.innerHTML='<div class="oj44-page"><div class="oj44-hero"><div class="oj44-title"><div><h2>AR Baggage Camera</h2><div class="oj44-sub">Stable camera-first scanner with upload/manual fallback. AI boxes are optional only.</div></div>'+chip('STABLE','green')+'</div></div><div class="oj44-card"><div class="card-header">Camera scanner</div><div class="oj44-ar-wrap"><video id="oj44Video" class="oj44-ar-video" autoplay playsinline muted></video><div id="oj44Overlay" class="oj44-ar-overlay"><div class="oj44-ar-box"><div class="oj44-ar-label">Manual bag frame</div></div></div><canvas id="oj44Canvas" style="display:none"></canvas></div><div class="oj44-tools"><button class="primary" onclick="oj44StartCamera()">Start Camera</button><button class="accent" onclick="oj44CaptureFrame()">Capture</button><button onclick="oj44StopCamera()">Stop</button></div><div class="oj44-grid2" style="margin-top:10px"><div class="input-group"><label>Damage Type</label><select id="oj44ArDamage"><option>Inspection</option><option>Crack/Split</option><option>Broken Handle</option><option>Wheel Damage</option><option>Wet Damage</option><option>Other</option></select></div><div class="input-group"><label>Severity</label><select id="oj44ArSeverity"><option>Minor</option><option>Moderate</option><option>Severe</option></select></div></div><div class="oj44-file"><label>Upload image fallback</label><input type="file" accept="image/*" onchange="oj44UploadEvidence(this)"></div><div id="oj44ArStatus" class="oj44-note" style="margin-top:10px">Use Start Camera on HTTPS and allow permission. Upload fallback works if camera is blocked.</div><div id="oj44PhotoStrip" class="oj44-photoStrip"></div></div></div>'}

  function makePDF(title,lines,file){let body=wrap(lines||[],88); if(!body.length)body=['No local data available yet.']; const head=['Ocean Fast Ferries / OceanJet','Baggage Management System','Generated: '+now(),'Role: '+role().toUpperCase(),'']; const all=wrap([title].concat(head,body,['','Generated by OceanJet Baggage System']),88); const pages=[]; for(let i=0;i<all.length;i+=45)pages.push(all.slice(i,i+45)); const enc=new TextEncoder(); const objs=[null]; const kids=[]; objs[1]='<< /Type /Catalog /Pages 2 0 R >>'; objs[2]=''; objs[3]='<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>'; pages.forEach((page,pi)=>{let stream='BT\n'; page.forEach((line,li)=>{const y=748-li*15; const size=(pi===0&&li===0)?16:(li<5?10:9); stream+='/F1 '+size+' Tf 48 '+y+' Tm ('+pdfSafe(line)+') Tj\n'}); stream+='ET\n'; const contentId=objs.length; objs.push('<< /Length '+enc.encode(stream).length+' >>\nstream\n'+stream+'endstream'); const pageId=objs.length; objs.push('<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] /Resources << /Font << /F1 3 0 R >> >> /Contents '+contentId+' 0 R >>'); kids.push(pageId+' 0 R')}); objs[2]='<< /Type /Pages /Kids ['+kids.join(' ')+'] /Count '+kids.length+' >>'; let pdf='%PDF-1.4\n'; const off=[0]; for(let i=1;i<objs.length;i++){off[i]=enc.encode(pdf).length; pdf+=i+' 0 obj\n'+objs[i]+'\nendobj\n'} const xref=enc.encode(pdf).length; pdf+='xref\n0 '+objs.length+'\n0000000000 65535 f \n'; for(let i=1;i<objs.length;i++)pdf+=String(off[i]).padStart(10,'0')+' 00000 n \n'; pdf+='trailer\n<< /Size '+objs.length+' /Root 1 0 R >>\nstartxref\n'+xref+'\n%%EOF'; const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([pdf],{type:'application/pdf'})); a.download=file||('oceanjet_'+Date.now()+'.pdf'); document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},1200); toast('PDF exported with content')}
  function healthRows(){let storage='OK', camera='Check on HTTPS', sw='Not registered'; try{localStorage.setItem('__oj45_test','1');localStorage.removeItem('__oj45_test')}catch(e){storage='Storage issue'} if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)camera=location.protocol==='https:'||location.hostname==='localhost'?'Ready':'Needs HTTPS'; if(navigator.serviceWorker)sw='Available'; return [{name:'Boot render',status:'OK',note:'V45 safe renderer active.'},{name:'Local storage',status:storage,note:'Drafts, claims, receipts, and evidence save locally.'},{name:'Camera',status:camera,note:'Upload fallback remains available if permission is blocked.'},{name:'Service worker',status:sw,note:'Offline cache uses latest build version.'}]}

receipt','green')+action('📄','PDF Reports','Master exports and audit reports.','reports','green')+action('🛡️','Backup','Technical JSON backup for backup.','backup','')+action('🧬','Advanced Modules','Older modules grouped away safely.','advanced','')} const flow=r==='pax'?'<div class="oj45-step done"><b>1. Open app</b><br><small>Passenger mode by default.</small></div><div class="oj45-step current"><b>2. Calculate or claim</b><br><small>Use guided claim or baggage calculator.</small></div><div class="oj45-step"><b>3. Counter processing</b><br><small>Staff verifies and closes.</small></div>':'<div class="oj45-step done"><b>1. Intake</b><br><small>Create or find claim.</small></div><div class="oj45-step current"><b>2. Verify</b><br><small>Update queue and evidence.</small></div><div class="oj45-step"><b>3. Export</b><br><small>Download professional PDFs.</small></div>'; v.innerHTML='<div class="oj45-page"><div class="oj45-hero"><div class="oj45-head"><div><h1>'+esc(title)+'</h1><div class="oj45-sub">'+esc(sub)+'</div></div>'+tag+'</div>'+kpis()+'<div class="oj45-search"><input id="oj45Quick" placeholder="Quick open: baggage, claim, scanner, receipt, staff, admin" onkeydown="if(event.key===\'Enter\')oj45QuickOpen()"><button class="primary" onclick="oj45QuickOpen()">Open</button></div></div><div class="oj45-card"><div class="card-header">Neat workflow home</div><div class="oj45-grid">'+cards+'</div></div><div class="oj45-card"><div class="card-header">Operations flow</div><div class="oj45-wizard">'+flow+'</div></div><div class="oj45-card"><div class="card-header">Today snapshot</div><div class="oj45-grid2"><div class="oj45-note"><b>Open queue:</b> '+s.open+' claim(s)<br><b>Resolved:</b> '+s.resolved+' claim(s)<br><b>Severe flags:</b> '+s.severe+'</div><div class="oj45-note warn"><b>Rule:</b> every visible tab must show working content. Empty experimental tabs stay hidden under Admin Advanced.</div></div></div></div>'}

  function resizeFile(file,maxW,q){return new Promise((resolve,reject)=>{const r=new FileReader(); r.onerror=reject; r.onload=e=>{const img=new Image(); img.onerror=reject; img.onload=()=>{const scale=Math.min(1,maxW/img.width); const c=document.createElement('canvas'); c.width=Math.max(1,Math.round(img.width*scale)); c.height=Math.max(1,Math.round(img.height*scale)); c.getContext('2d').drawImage(img,0,0,c.width,c.height); resolve(c.toDataURL('image/jpeg',q||.75))}; img.src=e.target.result}; r.readAsDataURL(file)})}

  window.oj45SubmitClaim=function(){const psn=clean($('oj45Psn')?.value), last=clean($('oj45Last')?.value); if(!psn||!last){toast('PSN and Last Name are required'); return} const id='OJ-CLM-'+Date.now().toString(36).toUpperCase(); const c={id,claimId:id,createdAt:now(),date:today(),psn,lastName:last,contact:clean($('oj45Phone')?.value),route:clean($('oj45Route')?.value),tag:clean($('oj45Tag')?.value),damageType:clean($('oj45Damage')?.value)||'Damage',severity:clean($('oj45Severity')?.value)||'Minor',notes:clean($('oj45Notes')?.value),status:'Submitted',photo:claimPhoto,source:'V45 Guided Claim'}; const arr=read(CLAIM_KEY,[]); arr.unshift(c); write(CLAIM_KEY,arr); localStorage.removeItem(DRAFT_KEY); const res=$('oj45ClaimResult'); if(res)res.innerHTML='<div class="oj45-note"><b>'+esc(id)+'</b><br>Claim saved. PDF receipt is ready.<div class="oj45-tools" style="margin-top:8px"><button class="primary" onclick="oj45PDFClaim(\''+id+'\')">Download PDF</button><button class="accent" onclick="oj45Open(\'track\')">Track Claim</button></div></div>'; makePDF('OceanJet Damage Claim Receipt',claimLines(c),'oceanjet_claim_'+id+'.pdf')}

  function renderStaff(){if(role()==='pax'){renderLogin('cashier');return} const list=allClaims(); const v=activate('staffcounter'); const statuses=['Submitted','Verified','Processing','Resolved']; function ticket(x,i){const id=idOf(x,i); return '<div class="oj45-ticket" data-search="'+esc(JSON.stringify(x).toLowerCase())+'"><b>'+esc(id)+'</b><small>'+esc(paxOf(x))+' • '+esc(x.psn||'No PSN')+'<br>'+esc(x.route||'Route pending')+' • '+esc(x.damageType||x.issue||'Claim')+'</small><div class="oj45-tools" style="margin-top:7px"><button class="sm" onclick="oj45SetStatus(\''+esc(id)+'\',\'Verified\')">Verify</button><button class="sm" onclick="oj45SetStatus(\''+esc(id)+'\',\'Processing\')">Process</button><button class="sm primary" onclick="oj45SetStatus(\''+esc(id)+'\',\'Resolved\')">Resolve</button><button class="sm accent" onclick="oj45PDFClaim(\''+esc(id)+'\')">PDF</button></div></div>'} const lanes=statuses.map(st=>{const rows=list.filter(x=>statusOf(x).toLowerCase().includes(st.toLowerCase())||(st==='Submitted'&&!/verified|processing|resolved|closed|rejected/i.test(statusOf(x)))); return '<div class="oj45-lane"><h4>'+st+' <span class="oj45-pill">'+rows.length+'</span></h4>'+(rows.length?rows.slice(0,20).map(ticket).join(''):'<div class="oj45-note">No '+st.toLowerCase()+' claims.</div>')+'</div>'}).join(''); v.innerHTML='<div class="oj45-page"><div class="oj45-hero"><div class="oj45-head"><div><h2>Staff Counter</h2><div class="oj45-sub">Functional queue board with quick intake, verification, receipts, status updates, and PDF output.</div></div>'+pill('Counter live','gold')+'</div>'+kpis()+'</div><div class="oj45-card"><div class="card-header">Counter actions</div><div class="oj45-grid">'+action('➕','Quick Intake','Create a claim directly at the counter.','quick-intake','gold')+action('🧾','Receipt Desk','Issue counter receipt PDF.','receipt','green')+action('🧮','Baggage Calculator','Preserved official calculator.','calculator','green')+action('📹','AR Evidence','Captur ed',e)}} const v=activate('missing'); v.innerHTML='<div class="oj45-card"><h2>Module unavailable</h2><div class="oj45-note">'+esc(target)+' is hidden or unavailable in this clean build. Admin advanced modules contain preserved legacy tools.</div></div>'}

<script id="oj46EvidenceStudioScript">
(function(){
  if(window.__OJ46_EVIDENCE_STUDIO__) return; window.__OJ46_EVIDENCE_STUDIO__='V46_EVIDENCE_STUDIO';
  const VERSION='OceanJet V46 Evidence Studio';
  const DAMAGE_KEY='oj45_damage_evidence';
  const V11_KEY='oj_damage_master_v11_backup';
  const DESTS=['PALOMPON','GETAFE','SURIGAO','MAASIN','TAGBILARAN','SIQUIJOR','ORMOC','DUMAGUETE'];
  const DAMAGE_TYPES=['Inspection','Crack/Split','Broken Handle','Wheel Damage','Scratch/Scuff','Dent/Deformation','Torn Fabric','Zipper Damage','Wet Damage','Missing Part','Lost Baggage','Other'];
  const SEVS=['Minor','Moderate','Severe','Critical'];
  let stream=null, raf=null, pending={stub:null,damage:null}, batchPairs=[];
  let prevOpen=null;
  const $=id=>document.getElementById(id);
  const qsa=(s,r=document)=>Array.from(r.querySelectorAll(s));
  const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const clean=s=>String(s??'').trim();
  const now=()=>new Date().toLocaleString('en-PH',{hour12:true});
  const iso=()=>new Date().toISOString();
  const today=()=>new Date().toISOString().slice(0,10);
  const uid=p=>p+'-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).slice(2,6).toUpperCase();
  function toast(msg){try{if(typeof window.toast==='function')return window.toast(msg)}catch(e){} let el=document.createElement('div'); el.className='toast'; el.textContent=msg; document.body.appendChild(el); setTimeout(()=>el.remove(),2600)}
  function read(k,d){try{const raw=localStorage.getItem(k); return raw?JSON.parse(raw):d}catch(e){return d}}
  function write(k,v){try{localStorage.setItem(k,JSON.stringify(v)); return true}catch(e){console.warn('V46 storage failed',e); toast('Storage is full. Export backup or reduce photo count.'); return false}}
  function closeDrawer(){try{document.getElementById('sideDrawer')?.classList.remove('open');document.getElementById('overlay')?.classList.remove('show');document.getElementById('hamburger')?.classList.remove('open')}catch(e){}}
  function ensureView(name){let v=$('view-'+name); if(!v){v=document.createElement('div'); v.id='view-'+name; v.className='view'; (document.querySelector('.app')||document.body).appendChild(v)} return v}

  function resizeFile(file,max=1150,q=.72){return new Promise((resolve,reject)=>{const fr=new FileReader(); fr.onerror=reject; fr.onload=()=>{const img=new Image(); img.onerror=reject; img.onload=()=>{const r=Math.min(1,max/Math.max(img.width,img.height||1)); const c=document.createElement('canvas'); c.width=Math.max(1,Math.round(img.width*r)); c.height=Math.max(1,Math.round(img.height*r)); const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,c.width,c.height); resolve(c.toDataURL('image/jpeg',q));}; img.src=fr.result;}; fr.readAsDataURL(file);});}

  function pairQuality(stub,damage){let q=0;if(stub)q+=45;if(damage)q+=45;if(stub&&damage)q+=6;return Math.min(96,q)}

  window.oj46StartCamera=async function(){try{window.oj46StopCamera(); if(!navigator.mediaDevices?.getUserMedia)throw new Error('Camera API unavailable'); stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false}); const v=$('oj46Video'); v.srcObject=stream; await v.play(); status('Camera is active. Use controlled manual capture: first Claim Stub, then Damage Image.','good'); loop(); toast('Camera active')}catch(e){console.warn(e); status('Camera blocked or unavailable. Use HTTPS, allow camera permission, or use the paired batch upload below.','warn'); toast('Upload fallback ready')}};

<script id="oj47StabilityEfficiencyScript">
(function(){
  'use strict';
  if(window.__OJ47_STABILITY_EFFICIENCY__) return;
  window.__OJ47_STABILITY_EFFICIENCY__='V47_STABILITY_EFFICIENCY';
  const VERSION='OceanJet V47 Stability + Efficiency';
  const DAMAGE_KEY='oj45_damage_evidence';
  const V11_KEY='oj_damage_master_v11_backup';
  const CLAIM_KEY='oj44_claims';
  const ERROR_KEY='oj47_error_log';
  const DRAFT_KEY='oj47_evidence_draft';
  const DESTS=['PALOMPON','GETAFE','SURIGAO','MAASIN','TAGBILARAN','SIQUIJOR','ORMOC','DUMAGUETE'];
  const DAMAGE_TYPES=['Inspection','Crack/Split','Broken Handle','Wheel Damage','Scratch/Scuff','Dent/Deformation','Torn Fabric','Zipper Damage','Wet Damage','Missing Part','Lost Baggage','Other'];
  const SEVS=['Minor','Moderate','Severe','Critical'];
  const state={stream:null,raf:null,stub:null,damage:null,pairs:[],busy:false,lastRender:0};
  let prevOpen=null;
  const $=id=>document.getElementById(id);
  const qsa=(sel,root=document)=>Array.from(root.querySelectorAll(sel));
  const app=()=>document.querySelector('.app')||document.body;
  const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const clean=s=>String(s??'').trim();
  const now=()=>new Date().toLocaleString('en-PH',{hour12:true});
  const iso=()=>new Date().toISOString();
  const today=()=>new Date().toISOString().slice(0,10);
  const uid=p=>p+'-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).slice(2,7).toUpperCase();
  const idle=fn=>('requestIdleCallback' in window?requestIdleCallback(fn,{timeout:1300}):setTimeout(fn,60));
  function toast(msg){try{if(typeof window.toast==='function')return window.toast(msg)}catch(e){} try{let t=document.createElement('div');t.className='toast';t.textContent=String(msg);document.body.appendChild(t);setTimeout(()=>t.remove(),2600)}catch(e){}}
  function logError(type,err){try{const arr=read(ERROR_KEY,[]);arr.unshift({at:iso(),type:String(type),message:String(err&&err.message||err).slice(0,240)});write(ERROR_KEY,arr.slice(0,30),true)}catch(e){}}
  function safeJson(raw,fallback){try{return raw?JSON.parse(raw):fallback}catch(e){return fallback}}
  function read(key,fallback){try{const raw=localStorage.getItem(key);const v=safeJson(raw,fallback);return v==null?fallback:v}catch(e){logError('storage-read',e);return fallback}}
  function write(key,value,quiet){try{localStorage.setItem(key,JSON.stringify(value));return true}catch(e){logError('storage-write',e);if(!quiet)toast('Storage full. Run Optimizer or export backup.');return false}}
  function bytesOf(s){return new Blob([String(s||'')]).size}
  function storageReport(){let used=0,keys=0;try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);keys++;used+=bytesOf(k)+bytesOf(localStorage.getItem(k))}}catch(e){}return {keys,used,mb:used/1024/1024,pct:Math.min(100,Math.round((used/(4.7*1024*1024))*100))}}
  function closeDrawer(){try{$('sideDrawer')?.classList.remove('open');$('overlay')?.classList.remove('show');$('hamburger')?.classList.remove('open')}catch(e){}}
  function ensureView(name){let v=$('view-'+name);if(!v){v=document.createElement('div');v.id='view-'+name;v.className='view';app().appendChild(v)}return v}
  function activate(name){qsa('.view').forEach(v=>v.classList.remove('active'));const v=ensureView(name);v.classList.add('active');closeDrawer();return v}
  function opts(arr,val){return arr.map(x=>'<option '+(x===val?'selected':'')+'>'+esc(x)+'</option>').join('')}
  function status(msg,type=''){const el=$('oj47Status');if(el){el.className='oj47-note '+type;el.innerHTML=msg}}
  function dataQuality(data){if(!data)return 0;const kb=Math.round(data.length/1024);return Math.max(35,Math.min(98,Math.round(55+Math.min(34,kb/10))))}
  function pairQuality(stub,damage){let q=0;if(stub)q+=45;if(damage)q+=45;if(stub&&damage)q+=10;return q}
  function resizeFile(file,max=1050,q=.70){return new Promise((resolve,reject)=>{try{const fr=new FileReader();fr.onerror=()=>reject(new Error('File read failed'));fr.onload=()=>{const img=new Image();img.onerror=()=>reject(new Error('Image decode failed'));img.onload=()=>{try{const scale=Math.min(1,max/Math.max(img.width||1,img.height||1));const c=document.createElement('canvas');c.width=Math.max(1,Math.round((img.width||1)*scale));c.height=Math.max(1,Math.round((img.height||1)*scale));const ctx=c.getContext('2d',{alpha:false});ctx.drawImage(img,0,0,c.width,c.height);resolve(c.toDataURL('image/jpeg',q))}catch(e){reject(e)}};img.src=fr.result};fr.readAsDataURL(file)}catch(e){reject(e)}})}
  async function processFilesSequential(files,onStep){const out=[];for(let i=0;i<files.length;i++){onStep&&onStep(i+1,files.length,files[i]);try{out.push(await resizeFile(files[i],files.length>8?900:1100,files.length>8?.64:.70))}catch(e){logError('image-compress',e);out.push('')}}return out}
  function buildCase({stub,damage,batchId,pairNo,source}){const dest=clean($('oj47Dest')?.value)||'PALOMPON';const tag=clean($('oj47Tag')?.value);const claimId=clean($('oj47ClaimId')?.value);const staff=clean($('oj47Staff')?.value)||'Dock Staff';const type=clean($('oj47DamageType')?.value)||'Inspection';const sev=clean($('oj47Severity')?.value)||'Minor';const notes=clean($('oj47Notes')?.value)||'';const caseId='OJ-DMG-'+Date.now().toString().slice(-6)+'-'+String(pairNo||1).padStart(2,'0');const photos=[];if(stub)photos.push({photoId:uid('P'),role:'Claim Stub',dataUrl:stub,createdAt:iso(),quality:dataQuality(stub),autoCaptured:false});if(damage)photos.push({photoId:uid('P'),role:'Damage Image',dataUrl:damage,createdAt:iso(),quality:dataQuality(damage),autoCaptured:false});const quality=pairQuality(stub,damage);return {id:caseId,caseId,claimId,batchId:batchId||'',pairNo:pairNo||1,createdAt:iso(),date:today(),time:now(),destination:dest,tagNo:tag,staff,source:source||'V47 Evidence Studio',damageType:type,severity:sev,status:'New',quality,notes,photo:damage||stub||'',photos,summary:caseId+' • '+dest+' • '+type+' • '+sev,workflow:'Claim Stub + Damage Image pair'}}
  function saveToStores(cases,batchId,source){cases=(cases||[]).filter(Boolean);if(!cases.length)return false;let ev=read(DAMAGE_KEY,[]);if(!Array.isArray(ev))ev=[];const seen=new Set();ev=[...cases,...ev].filter(x=>{const id=String(x.caseId||x.id||'');if(!id)return true;if(seen.has(id))return false;seen.add(id);return true}).slice(0,220);write(DAMAGE_KEY,ev);
    let claims=read(CLAIM_KEY,[]);if(!Array.isArray(claims))claims=[];const claimRows=cases.map(c=>({id:c.caseId,claimId:c.caseId,psn:c.claimId||c.tagNo||'',lastName:'Damage Claim',route:c.destination,status:'New',damage:c.damageType,severity:c.severity,createdAt:c.createdAt,updatedAt:c.createdAt,source:'Evidence Studio',notes:c.notes||'',photos:c.photos||[]}));claims=[...claimRows,...claims].slice(0,240);write(CLAIM_KEY,claims,true);
    let v11=read(V11_KEY,{cases:[],batches:[],nextCaseSeq:1,nextBatchSeq:1,settings:{}});if(!v11||typeof v11!=='object'||Array.isArray(v11))v11={cases:[],batches:[],nextCaseSeq:1,nextBatchSeq:1,settings:{}};if(!Array.isArray(v11.cases))v11.cases=[];if(!Array.isArray(v11.batches))v11.batches=[];const v11Cases=cases.map(c=>({caseId:c.caseId,batchId:batchId||c.batchId,destination:c.destination,tagNo:c.tagNo,color:'Unknown',size:'Unknown',baggageType:'Unknown baggage',damageType:c.damageType,aiSuggestion:c.damageType,aiConfidence:'V47 stable manual/batch evidence',severity:c.severity,status:'New',dateTaken:today(),timeTaken:new Date().toLocaleTimeString('en-PH',{hour12:true}),phtTimestamp:now(),notes:c.notes||'V47 optimized paired evidence: claim stub + damage image.',photos:(c.photos||[]).map(p=>({photoId:p.photoId||uid('P'),role:p.role==='Damage Image'?'Damage Close-up':p.role,dataUrl:p.dataUrl,autoCaptured:false,hash:String((p.dataUrl||'').length)+'-'+c.caseId,quality:p.quality||80,createdAt:p.createdAt||iso()})),locked:false,chainOfCustody:[{at:now(),event:'Created by V47 Stability + Efficiency Studio',by:c.staff||'Dock Staff'}],evidenceScore:c.quality,summary:c.summary}));v11.cases=[...v11Cases,...v11.cases].slice(0,220);v11.batches.unshift({batchId:batchId||('BATCH-'+Date.now()),createdAt:now(),caseIds:cases.map(c=>c.caseId),source:source||'V47 Evidence Studio'});v11.batches=v11.batches.slice(0,90);write(V11_KEY,v11,true);return true}
  function renderPreviews(){const s=$('oj47StubPreview'),d=$('oj47DamagePreview');if(s)s.innerHTML='<b>Claim Stub / Tag</b>'+(state.stub?'<img src="'+state.stub+'" alt="Claim stub">':'No claim stub captured/uploaded');if(d)d.innerHTML='<b>Damage Image</b>'+(state.damage?'<img src="'+state.damage+'" alt="Damage evidence">':'No damage image captured/uploaded');const q=pairQuality(state.stub,state.damage);const m=$('oj47PairMeter');if(m)m.style.width=q+'%';const qt=$('oj47PairText');if(qt)qt.textContent='Pair completeness: '+q+'%'}
  function renderRecent(){const box=$('oj47Recent');if(!box)return;let arr=read(DAMAGE_KEY,[]);if(!Array.isArray(arr)||!arr.length){box.innerHTML='<div class="oj47-note">No evidence saved yet.</div>';return}box.innerHTML=arr.slice(0,10).map(x=>'<div class="oj47-row"><div><b>'+esc(x.caseId||x.id)+'</b><small>'+esc(x.destination||'Destination')+' • '+esc(x.damageType||'Inspection')+' • '+esc(x.severity||'Minor')+'<br>'+(x.photos?.length||0)+' photo(s) • '+esc(x.source||'Evidence')+'</small></div><span class="oj47-pill '+((x.quality||0)>=90?'green':(x.quality||0)>=45?'gold':'red')+'">'+(x.quality||0)+'%</span></div>').join('')}
  function saveDraft(){write(DRAFT_KEY,{stub:state.stub,damage:state.damage,at:iso()},true)}
  function restoreDraft(){const d=read(DRAFT_KEY,null);if(d&&Date.now()-Date.parse(d.at||0)<86400000){state.stub=d.stub||null;state.damage=d.damage||null}}
  function v47Capture(kind){const v=$('oj47Video'),c=$('oj47Canvas');if(!v||!c||v.readyState<2){status('Start camera first or use the upload buttons/batch upload.','warn');return}try{c.width=v.videoWidth||960;c.height=v.videoHeight||720;c.getContext('2d',{alpha:false}).drawImage(v,0,0,c.width,c.height);const data=c.toDataURL('image/jpeg',.70);if(kind==='stub')state.stub=data;else state.damage=data;saveDraft();renderPreviews();status((kind==='stub'?'Claim stub':'Damage image')+' captured. Save pair when both images are ready.','good')}catch(e){logError('camera-capture',e);status('Capture failed. Use upload fallback.','bad')}}
  window.oj47StartCamera=async function(){try{window.oj47StopCamera();if(!navigator.mediaDevices?.getUserMedia)throw new Error('Camera API unavailable');state.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});const v=$('oj47Video');if(!v)throw new Error('Video element missing');v.srcObject=state.stream;await v.play();status('Camera active. Manual capture only: take Claim Stub first, then Damage Image.','good');state.raf=requestAnimationFrame(function loop(){const label=document.querySelector('.oj47-frame');if(label)label.style.borderColor=(clean($('oj47Severity')?.value)==='Severe'||clean($('oj47Severity')?.value)==='Critical')?'rgba(255,95,126,.88)':'rgba(91,241,255,.76)';state.raf=requestAnimationFrame(loop)})}catch(e){logError('camera-start',e);status('Camera blocked/unavailable. Use HTTPS, allow permission, or use upload/batch fallback.','warn');toast('Upload fallback ready')}};
  window.oj47StopCamera=function(){try{if(state.raf)cancelAnimationFrame(state.raf);state.raf=null;if(state.stream)state.stream.getTracks().forEach(t=>t.stop());state.stream=null;const v=$('oj47Video');if(v)v.srcObject=null;status('Camera stopped. Upload and batch tools remain available.','warn')}catch(e){}};
  window.oj47CaptureStub=function(){v47Capture('stub')};
  window.oj47CaptureDamage=function(){v47Capture('damage')};
  window.oj47ClearPair=function(){state.stub=null;state.damage=null;write(DRAFT_KEY,{},true);renderPreviews();status('Pair cleared.','warn')};
  window.oj47SavePair=function(){if(!state.stub&&!state.damage){status('Capture/upload at least one image first. Best practice: claim stub + damage image.','warn');return}const batchId='PAIR-'+today().replaceAll('-','')+'-'+Date.now().toString(36).slice(-4).toUpperCase();const c=buildCase({stub:state.stub,damage:state.damage,batchId,pairNo:1,source:'V47 Manual Pair'});saveToStores([c],batchId,'V47 manual pair');state.stub=null;state.damage=null;write(DRAFT_KEY,{},true);renderPreviews();renderRecent();status('<b>'+esc(c.caseId)+'</b> saved to evidence log, claim queue, and master log.','good');toast('Evidence pair saved')};
  async function uploadOne(input,kind){const f=input.files&&input.files[0];if(!f)return;try{status('Compressing '+(kind==='stub'?'claim stub':'damage image')+'...');const data=await resizeFile(f,1100,.70);if(kind==='stub')state.stub=data;else state.damage=data;saveDraft();renderPreviews();status('Uploaded '+esc(f.name)+' as '+(kind==='stub'?'Claim Stub':'Damage Image')+'.','good')}catch(e){logError('single-upload',e);status('Upload failed. Try a smaller photo.','bad')}}
  window.oj47UploadStub=function(input){uploadOne(input,'stub')};
  window.oj47UploadDamage=function(input){uploadOne(input,'damage')};
  window.oj47BatchSelect=async function(input){if(state.busy){toast('Batch is still processing.');return}const files=[...(input.files||[])].filter(f=>f.type&&f.type.startsWith('image/'));if(!files.length){status('No image files selected.','warn');return}state.busy=true;state.pairs=[];const out=$('oj47BatchReview');const meter=$('oj47BatchMeter');if(out)out.innerHTML='<div class="oj47-note">Preparing '+files.length+' image(s)...</div>';if(meter)meter.style.width='2%';try{const urls=await processFilesSequential(files,(i,total,file)=>{const pct=Math.round((i-1)/total*88)+6;if(meter)meter.style.width=pct+'%';const txt=$('oj47BatchProgress');if(txt)txt.textContent='Compressing '+i+' of '+total+': '+file.name});for(let i=0;i<urls.length;i+=2){state.pairs.push({pairNo:(i/2)+1,stub:urls[i]||'',damage:urls[i+1]||'',stubName:files[i]?.name||'',damageName:files[i+1]?.name||''})}if(meter)meter.style.width='100%';renderBatchReview();status('Batch ready: '+state.pairs.length+' pair(s). Order is 1-2, 3-4, 5-6: Claim Stub + Damage Image.','good')}catch(e){logError('batch-select',e);status('Batch processing failed. Try fewer or smaller images.','bad')}finally{state.busy=false}};
  function renderBatchReview(){const box=$('oj47BatchReview');if(!box)return;if(!state.pairs.length){box.innerHTML='<div class="oj47-note">No batch selected yet.</div>';return}box.innerHTML='<div class="oj47-pairList">'+state.pairs.map(p=>'<div class="oj47-pair"><div class="oj47-pairHead"><b>Pair '+p.pairNo+' • Images '+((p.pairNo*2)-1)+'-'+(p.pairNo*2)+'</b><span class="oj47-pill '+(p.stub&&p.damage?'green':'gold')+'">'+(p.stub&&p.damage?'Complete':'Needs review')+'</span></div><div class="oj47-pairMedia"><div class="oj47-pairImg">'+(p.stub?'<img src="'+p.stub+'" alt="Claim stub">':'Missing claim stub')+'<span>Claim Stub</span></div><div class="oj47-pairImg">'+(p.damage?'<img src="'+p.damage+'" alt="Damage image">':'Missing damage image')+'<span>Damage Image</span></div></div><div class="oj47-form"><div class="input-group"><label>Tag / Stub No.</label><input id="oj47BTag'+p.pairNo+'" placeholder="Optional"></div><div class="input-group"><label>Destination</label><select id="oj47BDest'+p.pairNo+'">'+opts(DESTS,clean($('oj47Dest')?.value)||'PALOMPON')+'</select></div><div class="input-group"><label>Damage Type</label><select id="oj47BDamage'+p.pairNo+'">'+opts(DAMAGE_TYPES,clean($('oj47DamageType')?.value)||'Inspection')+'</select></div><div class="input-group"><label>Severity</label><select id="oj47BSev'+p.pairNo+'">'+opts(SEVS,clean($('oj47Severity')?.value)||'Minor')+'</select></div><div class="input-group oj47-wide"><label>Notes</label><input id="oj47BNotes'+p.pairNo+'" placeholder="Pair '+p.pairNo+': claim stub + damage evidence"></div></div></div>').join('')+'</div><button class="oj47-btn primary" style="width:100%;margin-top:12px" onclick="oj47SaveBatch()">Save All Organized Pairs</button>'}

  function readJson(key, fallback){try{const v=JSON.parse(localStorage.getItem(key)||'');return v??fallback}catch(e){return fallback}}

  function getHistory(){try{if(typeof DB!=='undefined'&&Array.isArray(DB.history))return DB.history;}catch(e){} const db=readJson('off_baggage_v14',{}); return Array.isArray(db.history)?db.history:[];}
  function getClaims(){
    let out=readJson(CLAIM_KEY,[]); if(!Array.isArray(out)) out=[];
    ['oj_v22_claims','oj_v23_claims','oj_v24_tickets','oj_v25_queue','oj_v27_claims','oj_v29_claims','oj_v30_service_tickets','oj45_damage_evidence','oj_damage_master_v11_backup'].forEach(k=>{
      try{
        const v=readJson(k, k==='oj_damage_master_v11_backup'?{}:[]);
        const arr=Array.isArray(v)?v:(Array.isArray(v.cases)?v.cases:[]);
        arr.forEach(x=>out.push(Object.assign({source:k},x)));
      }catch(e){}
    });
    const seen=new Set();
    return out.filter((x,i)=>{const id=String(x.id||x.claimId||x.caseId||x.ticketId||x.ref||'AUTO'+i); if(seen.has(id))return false; seen.add(id); return true;});
  }
  function metrics(){
    const h=getHistory(), c=getClaims(), r=readJson(RECEIPT_KEY,[]);
    const rev=h.reduce((s,x)=>s+(Number(x.total)||0),0)+r.reduce((s,x)=>s+(Number(x.amount)||0),0);
    return {tx:h.length, claims:c.length, receipts:r.length, rev};
  }

  function open(target){
    disableRecoveryRuntime();
    target=normTarget(target);
    if(target==='print'){window.print();return;}
    if(target==='download-json'){downloadJson();return;}
    if(target==='logout'){window.oj51Logout();return;}
    if(!allowed(target)){ return renderLogin(target.includes('admin')?'admin':'cashier'); }
    try{
      if(target==='home') return renderHome();
      if(target==='login-cashier') return renderLogin('cashier');
      if(target==='login-admin') return renderLogin('admin');
      if(target==='claim') return renderClaim();
      if(target==='track') return renderTrack();
      if(target==='staffcounter') return renderStaffCounter();
      if(target==='quick-intake') return renderQuickIntake();
      if(target==='receipt') return renderReceipt();
      if(target==='reports') return renderReports();
      if(target==='backup') return renderBackup();
      if(target==='advanced') return renderAdvanced();
      if(target==='ar'){
        if(typeof legacy.ar==='function'){ try{ legacy.ar('ar'); buildDrawer(); return; }catch(e){} }
        return openLegacyView('ar');
      }
      return openLegacyView(target);
    }catch(e){
      const v=activate(target); v.innerHTML='<div class="oj51-page"><div class="oj51-panel"><h2>Screen error fixed safely</h2><div class="oj51-note danger">'+escapeHtml(e.message||e)+'</div><button class="primary block" onclick="oj51Open(\'home\')">Back Home</button></div></div>';
    }finally{ setTimeout(buildDrawer,50); }
  }

  function menuItem(target,icon,label,sub){return '<div class="drawer-item oj51-menu" data-view="'+escapeHtml(target)+'" onclick="oj51Open(\''+escapeHtml(target)+'\')"><i>'+icon+'</i><span><b>'+escapeHtml(label)+'</b><small>'+escapeHtml(sub||'')+'</small></span></div>';}
  function section(label){return '<div class="oj51-drawer-section">'+escapeHtml(label)+'</div>';}
  function buildDrawer(){
    const box=$('drawerMenu'); if(!box) return;
    const r=getRole();
    let html=section('Passenger')+menuItem('home','🏠','Home','Role dashboard')+menuItem('calculator','🧮','Baggage Calculator','Official fee logic')+menuItem('claim','🧳','Start Claim','Damage/lost baggage')+menuItem('track','🔎','Track Claim','Search local record')+menuItem('ar','📹','Damage Scanner','Camera/upload evidence')+menuItem('fares','💵','Fare Guide','Passenger prices')+menuItem('schedules','🕐','Schedules','Routes');
    if(r==='pax') html+=section('Login')+menuItem('login-cashier','💼','Cashier Login','Counter tools')+menuItem('login-admin','🔐','Admin Login','Full access');
    if(r==='cashier'||r==='admin') html+=section('Cashier')+menuItem('staffcounter','👥','Staff Counter','Queue board')+menuItem('quick-intake','➕','Quick Intake','Create counter claim')+menuItem('receipt','🧾','Receipt Desk','Counter receipts')+menuItem('reports','📄','PDF Center','Reports')+menuItem('history','📋','Transactions','Saved calculator logs');
    if(r==='admin') html+=section('Admin')+menuItem('admin','⚙️','Admin Panel','Original controls')+menuItem('backup','🛡️','Backup','Manual JSON export')+menuItem('advanced','🧬','Advanced Modules','Grouped legacy tools');
    if(r!=='pax') html+=section('Session')+menuItem('logout','🚪','Logout','Return Passenger');
    box.innerHTML=html; box.dataset.oj51='1';
    const dl=document.querySelector('.drawer-logout'); if(dl){dl.textContent=r==='pax'?'Passenger Mode':'🚪 Logout'; dl.onclick=window.oj51Logout;}
  }

  function hideOldFloating(){
    ['oj33Fab','oj35Fab','oj30Fab','oj29Fab','v11Dock','v10Dock','v9CleanDock','v8Dock','v7Dock','aiFloatBtn'].forEach(id=>{const el=$(id); if(el){el.style.display='none'; el.style.pointerEvents='none';}});
    qsa('.bottom-nav,.quick-dock,.ai-float-btn').forEach(el=>{el.style.display='none';el.style.pointerEvents='none';});
  }
  function toast(msg){
    let t=$('oj51Toast'); if(!t){t=document.createElement('div');t.id='oj51Toast';t.className='oj51-toast';document.body.appendChild(t);}
    t.textContent=msg; t.classList.add('show'); clearTimeout(t._timer); t._timer=setTimeout(()=>t.classList.remove('show'),2200);
  }
  window.oj51Open=open;
  window.showView=open;
  window.navigate=function(v){closeDrawer();open(v);};
  window.buildDrawerMenu=buildDrawer;
  window.logout=window.oj51Logout;
  window.oj51DownloadJson=downloadJson;
  try{ showView=open; navigate=window.navigate; buildDrawerMenu=buildDrawer; logout=window.oj51Logout; }catch(e){}
  window.oj51QuickOpen=function(){const q=($('oj51Quick')?.value||'').toLowerCase(); const map=[['bag','calculator'],['calc','calculator'],['claim','claim'],['damage','ar'],['scan','ar'],['fare','fares'],['sched','schedules'],['staff','staffcounter'],['counter','staffcounter'],['receipt','receipt'],['report','reports'],['admin','login-admin'],['cashier','login-cashier']]; const hit=map.find(x=>q.includes(x[0])); open(hit?hit[1]:'home');};

  function boot(){
    disableRecoveryRuntime(); setRole(getRole()); buildDrawer(); hideOldFloating(); renderHome();
    [250,800,1500,3000,6000,10000,13000].forEach(ms=>setTimeout(()=>{disableRecoveryRuntime();buildDrawer();hideOldFloating();},ms));
    if(!window.__OJ51_DRAWER_GUARD__) window.__OJ51_DRAWER_GUARD__=setInterval(()=>{disableRecoveryRuntime(); if(!$('drawerMenu')?.dataset.oj51) buildDrawer(); hideOldFloating();},6000);
    console.log(VERSION+' loaded');
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot,{once:true}); else boot();
})();
</script>
