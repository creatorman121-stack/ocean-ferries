<script id="oj-v28-service-intelligence-os">
(function(){
  'use strict';
  if(window.__OJ_V28_SERVICE_INTELLIGENCE_OS__) return;
  window.__OJ_V28_SERVICE_INTELLIGENCE_OS__ = true;
  const VERSION='V28 Service Intelligence OS';
  const CLAIM_KEY='oj_v22_claims';
  const DAMAGE_KEY='oj_damage_master_log_v11';
  const HEALTH_KEY='oj_v22_health';
  const NOTICE_KEY='oj_v28_public_notices';
  const OUTBOX_KEY='oj_v28_outbox';
  const SETTINGS_KEY='oj_v28_settings';
  const LOG_KEY='oj_v28_audit';
  const VIEWS=['v28-os'];
  const DESTS=['TAGBILARAN','ORMOC','DUMAGUETE','SIQUIJOR','SURIGAO','MAASIN','PALOMPON','GETAFE'];
  const $=id=>document.getElementById(id);
  const qsa=s=>Array.from(document.querySelectorAll(s));
  const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
  const now=()=>new Date().toLocaleString('en-PH',{timeZone:'Asia/Manila',hour12:true});
  const load=(k,f)=>{try{return JSON.parse(localStorage.getItem(k)||'null')??f}catch(e){return f}};
  const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));return true}catch(e){audit('save_error',k+': '+e.message);return false}};
  const claims=()=>load(CLAIM_KEY,[]);
  const damage=()=>{const v=load(DAMAGE_KEY,[]); return Array.isArray(v)?v:(Array.isArray(v.cases)?v.cases:[])};
  const notices=()=>load(NOTICE_KEY,[]);
  const outbox=()=>load(OUTBOX_KEY,[]);
  const settings=()=>Object.assign({fast:true,bigButtons:false,lastAudit:'Never'},load(SETTINGS_KEY,{}));
  function toast(msg){if(typeof window.toast==='function') return window.toast(msg); if(typeof window.fallbackToast==='function') return window.fallbackToast(msg); const d=document.createElement('div');d.textContent=msg;d.style.cssText='position:fixed;left:50%;top:16px;transform:translateX(-50%);z-index:99999;background:#0b1028;color:#49f7ff;border:1px solid rgba(73,247,255,.45);padding:10px 14px;border-radius:999px;font-weight:800;box-shadow:0 10px 30px rgba(0,0,0,.35)';document.body.appendChild(d);setTimeout(()=>d.remove(),2400)}
  function audit(type,msg){const a=load(LOG_KEY,[]);a.unshift({time:now(),type,msg:String(msg||'')});save(LOG_KEY,a.slice(0,120));}
  function ensureView(name){let v=$('view-'+name); if(!v){v=document.createElement('div');v.id='view-'+name;v.className='view';(document.querySelector('.app')||document.body).appendChild(v);} return v;}
  function showLocal(name){VIEWS.forEach(ensureView);qsa('.view').forEach(v=>v.classList.remove('active'));const v=ensureView(name);v.classList.add('active');qsa('.drawer-item').forEach(i=>i.classList.toggle('active',i.dataset.view===name)); if(name==='v28-os') renderOS();}
  function addDrawer(){const m=$('drawerMenu'); if(!m||m.querySelector('[data-view="v28-os"]')) return; const html=`<div class="drawer-item" data-view="v28-os" onclick="showView('v28-os')"><i>🧠</i> V28 Ops OS</div>`; const anchor=m.querySelector('[data-view="v27-nexus"]')||m.querySelector('[data-view="portal"]'); if(anchor) anchor.insertAdjacentHTML('beforebegin',html); else m.insertAdjacentHTML('beforeend',html);}
  function patchNav(){if(window.__v28NavPatched) return; window.__v28NavPatched=true; const oldShow=window.showView; window.showView=function(name){if(name==='v28-os'){showLocal(name);return;} return oldShow?oldShow.apply(this,arguments):showLocal(name)}; const oldBuild=window.buildDrawerMenu; window.buildDrawerMenu=function(){const r=oldBuild?oldBuild.apply(this,arguments):undefined; addDrawer(); return r}; addDrawer();}
  function metrics(){
    const c=claims(), d=damage(), tx=(window.DB&&Array.isArray(window.DB.history)?window.DB.history:load('ojDB',{}).history)||[];
    const active=c.filter(x=>!['Closed','Resolved','Rejected'].includes(x.status||''));
    const high=c.filter(x=>(x.priority||'').toLowerCase()==='high'||riskClaim(x)>=70);
    const critical=d.filter(x=>(x.severity||'').toLowerCase()==='critical');
    const pending=outbox().filter(x=>x.status!=='done');
    const storage=storageStats();
    const ready=Math.max(8,Math.min(100,Math.round(100 - active.length*2.4 - critical.length*1.7 - pending.length*4 - Math.max(0,storage.mb-3)*4)));
    return {claims:c,damage:d,tx,active,high,critical,pending,storage,ready,notices:notices()};
  }
  function storageStats(){let bytes=0,items=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i),v=localStorage.getItem(k)||'';const b=(k.length+v.length)*2;bytes+=b;items.push({k,b});}}catch(e){}items.sort((a,b)=>b.b-a.b);return{bytes,mb:bytes/1024/1024,pct:Math.min(100,Math.round(bytes/(5*1024*1024)*100)),items:items.slice(0,8)}}
  function riskClaim(c){let s=0; const t=(c.type||c.category||c.description||'').toLowerCase(); if(t.includes('damage')||t.includes('broken')||t.includes('lost'))s+=30; if((c.priority||'').toLowerCase()==='high')s+=30; if(['Submitted','Under Review','Processing'].includes(c.status||''))s+=20; if(!(c.lastName||c.psn||c.tag))s+=15; const age=Math.max(0,Date.now()-new Date(c.createdAt||c.created||Date.now()).getTime())/36e5; if(age>12)s+=15; return Math.min(100,Math.round(s));}
  function routePressure(dest){const m=metrics(); const key=String(dest||'').toUpperCase(); const c=m.claims.filter(x=>String(x.destination||x.route||'').toUpperCase().includes(key)).length; const d=m.damage.filter(x=>String(x.destination||'').toUpperCase().includes(key)).length; return Math.min(100,20+c*8+d*9+Math.round(Math.random()*8));}
  function renderOS(tab='overview'){const v=ensureView('v28-os'); const active=t=>tab===t?'active':''; v.innerHTML=`
    <div class="v28-shell card">
      <div class="v28-hero">
        <div class="v28-title"><div><h2>🧠 V28 Service Intelligence OS</h2><div class="v28-sub">Major upgrade focused on site-wide efficiency: passenger self-service, staff triage, data quality, notice control, offline outbox, and mobile readiness.</div></div><span class="v28-chip lime">REAL BUILD</span></div>
        <div class="v28-tabs"><button class="${active('overview')}" onclick="v28Tab('overview')">Overview</button><button class="${active('workflow')}" onclick="v28Tab('workflow')">Workflows</button><button class="${active('data')}" onclick="v28Tab('data')">Data Quality</button><button class="${active('notices')}" onclick="v28Tab('notices')">Notices</button></div>
        <div id="v28Body"></div>
      </div>
    </div>`; renderTab(tab);}
  window.v28Tab=function(tab){renderTab(tab);qsa('#view-v28-os .v28-tabs button').forEach(b=>b.classList.remove('active')); const labels={overview:0,workflow:1,data:2,notices:3}; const btn=qsa('#view-v28-os .v28-tabs button')[labels[tab]||0]; if(btn)btn.classList.add('active');};
  function renderTab(tab){const f={overview:overviewHTML,workflow:workflowHTML,data:dataHTML,notices:noticesHTML}[tab]||overviewHTML; const b=$('v28Body'); if(b)b.innerHTML=f();}
  function overviewHTML(){const m=metrics(); const readinessColor=m.ready>82?'lime':m.ready>62?'amber':'red';return `
    <div class="v28-grid"><div class="v28-kpi"><b>${m.ready}%</b><span>Site Readiness</span><div class="v28-meter" style="margin-top:10px"><span style="width:${m.ready}%"></span></div></div><div class="v28-kpi"><b>${m.active.length}</b><span>Active Claims</span><small>${m.high.length} high priority</small></div><div class="v28-kpi"><b>${m.critical.length}</b><span>Critical Damage</span><small>${m.damage.length} evidence cases</small></div><div class="v28-kpi"><b>${m.storage.mb.toFixed(2)}MB</b><span>Local Storage</span><small>${m.pending.length} pending outbox</small></div></div>
    <div class="v28-card"><div class="v28-title"><div><h2>Command Recommendation</h2><div class="v28-sub">Automated recommendation based on local claims, damage records, outbox, and storage pressure.</div></div><span class="v28-chip ${readinessColor}">${m.ready>82?'STABLE':m.ready>62?'WATCH':'ACTION'}</span></div>${recommendations(m).map((x,i)=>`<div class="v28-step" data-n="${i+1}"><b>${esc(x.title)}</b><br><small>${esc(x.text)}</small></div>`).join('')}</div>
    <div class="v28-grid2"><div class="v28-card"><div class="v28-title"><h2>Route Pressure Radar</h2><span class="v28-chip pink">Simulated</span></div>${DESTS.map(d=>{const p=routePressure(d);return`<div style="margin:9px 0"><div style="display:flex;justify-content:space-between;font-size:.78rem"><b>${d}</b><span>${p}%</span></div><div class="v28-meter"><span style="width:${p}%"></span></div></div>`}).join('')}</div><div class="v28-card"><div class="v28-title"><h2>Mini Live Map</h2><button class="sm primary" onclick="showView('map')">Open Map</button></div><div class="v28-mapline"><span class="v28-port" style="left:14%;top:70%">CEBU</span><span class="v28-port" style="left:82%;top:26%">BOHOL</span><span class="v28-port" style="left:70%;top:78%">ORMOC</span><span class="v28-vessel"></span></div><div class="v28-actions"><button class="accent block" onclick="v28ExportDayPack()">Export Day Pack</button><button class="block" onclick="v28RunAudit()">Run Audit</button></div></div></div>`}
  function recommendations(m){const r=[]; if(m.storage.mb>4)r.push({title:'Export backup now',text:'Local browser storage is high. Download a Day Pack before adding more photos.'}); if(m.pending.length)r.push({title:'Review offline outbox',text:m.pending.length+' local action(s) are waiting. Export or mark as completed before shift end.'}); if(m.critical.length)r.push({title:'Supervisor review required',text:m.critical.length+' critical damage evidence case(s) need review.'}); if(m.active.length>8)r.push({title:'Open staff triage',text:'Active claims are building up. Sort by risk and update the oldest cases.'}); if(!r.length)r.push({title:'System is ready',text:'No urgent site, storage, or service risks detected from local records.'}); r.push({title:'Use passenger self-service first',text:'Guide passengers to Claim Status, Report Baggage, and Smart Portal before staff escalation.'}); return r.slice(0,5)}
  function workflowHTML(){return `<div class="v28-grid2"><div class="v28-card"><div class="v28-title"><h2>Passenger Flow Builder</h2><span class="v28-chip">Self-service</span></div><div class="input-group"><label>Passenger need</label><select id="v28Need" onchange="v28BuildFlow()"><option value="damage">Damaged baggage</option><option value="lost">Lost baggage</option><option value="fare">Check fare</option><option value="schedule">Check schedule</option><option value="status">Track claim</option></select></div><div id="v28FlowOut"></div></div><div class="v28-card"><div class="v28-title"><h2>Staff Action Launcher</h2><span class="v28-chip pink">Fast ops</span></div><input id="v28Search" placeholder="Search action: damage, backup, fare, claim, map..." oninput="v28SearchActions()"><div id="v28SearchOut" style="margin-top:8px"></div></div></div><div class="v28-card"><div class="v28-title"><h2>One-Minute Shift Setup</h2><span class="v28-chip lime">Checklist</span></div><div class="v28-flow">${['Open Site Health Center and confirm storage is below warning level.','Export yesterday or previous-shift Day Pack if not yet saved.','Open Staff Counter and review high-priority active claims.','Check Public Notices for route advisories.','Keep Damage Detector ready for claim-stub, full baggage, and close-up photos.'].map((x,i)=>`<div class="v28-step" data-n="${i+1}">${esc(x)}</div>`).join('')}</div><div class="v28-actions"><button class="primary block" onclick="showView('sitehealth')">Site Health</button><button class="accent block" onclick="showView('staffcounter')">Staff Counter</button><button class="block" onclick="showView('damage')">Damage Detector</button></div></div>`}
  function dataHTML(){const m=metrics(); const risky=m.claims.map(c=>Object.assign({},c,{risk:riskClaim(c)})).sort((a,b)=>b.risk-a.risk).slice(0,12); const dup=duplicates(m.claims); const storage=m.storage.items.map(i=>`<div class="v28-row"><div><b>${esc(i.k)}</b><small>${(i.b/1024).toFixed(1)} KB</small></div></div>`).join('')||'<p class="muted">No local storage items found.</p>';return `<div class="v28-grid"><div class="v28-kpi"><b>${risky.filter(x=>x.risk>=70).length}</b><span>Risk Claims</span><small>Score ≥70</small></div><div class="v28-kpi"><b>${dup.length}</b><span>Duplicate Signals</span><small>Same tag / last name</small></div><div class="v28-kpi"><b>${m.storage.pct}%</b><span>Storage Load</span><small>${m.storage.mb.toFixed(2)}MB</small></div></div><div class="v28-card"><div class="v28-title"><h2>Claim Risk Queue</h2><button class="sm accent" onclick="v28ExportRiskCSV()">Export CSV</button></div><div class="v28-table"><table><thead><tr><th>Risk</th><th>Claim</th><th>Status</th><th>Issue</th><th>Action</th></tr></thead><tbody>${risky.map(c=>`<tr><td><span class="v28-chip ${c.risk>=70?'red':c.risk>=45?'amber':'lime'}">${c.risk}</span></td><td>${esc(c.id||c.caseId||'No ID')}<br><small>${esc(c.lastName||c.tag||'')}</small></td><td>${esc(c.status||'Submitted')}</td><td>${esc((c.description||c.type||'').slice(0,70))}</td><td><button class="sm" onclick="v28MarkReview('${esc(c.id||'')}')">Review</button></td></tr>`).join('')||'<tr><td colspan="5">No claims found.</td></tr>'}</tbody></table></div></div><div class="v28-grid2"><div class="v28-card"><div class="v28-title"><h2>Duplicate Signals</h2><button class="sm" onclick="v28FlagDuplicates()">Flag duplicates</button></div>${dup.map(x=>`<div class="v28-row"><div><b>${esc(x.key)}</b><small>${x.count} possible records</small></div></div>`).join('')||'<p class="muted">No duplicate signals detected.</p>'}</div><div class="v28-card"><div class="v28-title"><h2>Storage Audit</h2><button class="sm danger" onclick="v28CompactLogs()">Compact logs</button></div>${storage}</div></div>`}
  function noticesHTML(){const ns=notices();return `<div class="v28-grid2"><div class="v28-card"><div class="v28-title"><h2>Notice Composer</h2><span class="v28-chip amber">Local</span></div><div class="input-group"><label>Audience</label><select id="v28NoticeAudience"><option>Passengers</option><option>Baggage Staff</option><option>Cashiers</option><option>All Ports</option></select></div><div class="input-group"><label>Title</label><input id="v28NoticeTitle" placeholder="Example: Cebu-Tagbilaran boarding reminder"></div><div class="input-group"><label>Message</label><textarea id="v28NoticeMsg" rows="4" placeholder="Write route advisory, claim instruction, or port reminder..."></textarea></div><div class="v28-actions"><button class="primary block" onclick="v28SaveNotice()">Save Notice</button><button class="accent block" onclick="v28ExportNotices()">Export Notices</button></div></div><div class="v28-card"><div class="v28-title"><h2>Public Notice Board</h2><span class="v28-chip pink">${ns.length} active</span></div>${ns.map(n=>`<div class="v28-notice"><span class="v28-chip">${esc(n.audience)}</span><h3 style="margin:8px 0;color:#fff">${esc(n.title)}</h3><small>${esc(n.time)}</small><p>${esc(n.msg)}</p><button class="sm danger" onclick="v28DeleteNotice('${esc(n.id)}')">Delete</button></div>`).join('')||'<p class="muted">No V28 notices saved yet.</p>'}</div></div><div class="v28-card"><div class="v28-title"><h2>Offline Outbox</h2><button class="sm" onclick="v28ClearOutboxDone()">Clear done</button></div>${outbox().map(x=>`<div class="v28-row"><div><b>${esc(x.type)}</b><small>${esc(x.time)} • ${esc(x.status||'pending')}</small></div><button class="sm" onclick="v28OutboxDone('${esc(x.id)}')">Done</button></div>`).join('')||'<p class="muted">Outbox empty.</p>'}</div>`}
  window.v28BuildFlow=function(){const need=$('v28Need')?.value||'damage'; const map={damage:[['Open Damage Detector','Capture claim stub, full baggage, and damage close-up.'],['Confirm passenger details','Check PSN, last name, route, and tag number.'],['Save evidence','Review evidence score and lock if ready.'],['Give claim reference','Passenger tracks status in Claim Status.']],lost:[['Open Report Baggage','Create lost baggage record with tag, route, last seen port.'],['Assign priority','Mark high if medicine, ID, or fragile item is involved.'],['Staff counter review','Update status every handling step.']],fare:[['Open Fares','Select route and passenger class.'],['Use official baggage calculator separately','Chat assistant must not compute official baggage fees.']],schedule:[['Open Schedules','Check route and next departure.'],['Create notice if needed','Publish advisory for late trip or port changes.']],status:[['Open Claim Status','Search claim number or passenger last name.'],['Show timeline','Explain Submitted → Under Review → Processing → Closed.']]}; const out=$('v28FlowOut'); if(out) out.innerHTML='<div class="v28-flow">'+map[need].map((x,i)=>`<div class="v28-step" data-n="${i+1}"><b>${esc(x[0])}</b><br><small>${esc(x[1])}</small></div>`).join('')+'</div>';};
  window.v28SearchActions=function(){const q=($('v28Search')?.value||'').toLowerCase(); const acts=[['damage','Damage Detector','damage'],['claim','Claim Status','claimstatus'],['report','Report Baggage','lostbaggage'],['staff','Staff Counter','staffcounter'],['fare','Fares','fares'],['schedule','Schedules','schedules'],['backup','Site Health','sitehealth'],['map','Live Map','map'],['admin','Admin Panel','admin'],['safe','Safe Mode','safemode'],['export','Export Center','exportcenter']]; const list=acts.filter(a=>!q||a.join(' ').toLowerCase().includes(q)).slice(0,8); const out=$('v28SearchOut'); if(out) out.innerHTML=list.map(a=>`<div class="v28-row"><div><b>${a[1]}</b><small>Open ${a[2]}</small></div><button class="sm primary" onclick="showView('${a[2]}')">Open</button></div>`).join('')||'<p class="muted">No action found.</p>';};
  window.v28RunAudit=function(){const s=settings();s.lastAudit=now();save(SETTINGS_KEY,s); audit('audit','Manual data quality audit executed'); toast('V28 audit complete.'); renderOS('data')};
  window.v28MarkReview=function(id){const arr=claims(); const c=arr.find(x=>x.id===id); if(c){c.status='Under Review';c.updatedAt=now();save(CLAIM_KEY,arr); enqueue('claim_review','Marked '+id+' Under Review');toast('Claim marked Under Review.');renderTab('data')}};
  function duplicates(arr){const map={}; arr.forEach(c=>{['tag','tagNo','lastName','psn'].forEach(k=>{const v=String(c[k]||'').trim().toLowerCase(); if(v) (map[k+': '+v]||(map[k+': '+v]=[])).push(c)})}); return Object.entries(map).filter(([k,v])=>v.length>1).map(([k,v])=>({key:k,count:v.length,items:v}))}
  window.v28FlagDuplicates=function(){const arr=claims(); const d=duplicates(arr); d.forEach(x=>x.items.forEach(c=>{c.duplicateSignal=true;c.updatedAt=now()})); save(CLAIM_KEY,arr); enqueue('data_quality','Flagged '+d.length+' duplicate signal groups'); toast('Duplicate signals flagged.'); renderTab('data')};
  window.v28CompactLogs=function(){const h=load(HEALTH_KEY,[]).slice(0,40); const a=load(LOG_KEY,[]).slice(0,40); save(HEALTH_KEY,h); save(LOG_KEY,a); toast('Logs compacted.'); renderTab('data')};
  function enqueue(type,msg){const o=outbox();o.unshift({id:'V28-'+Date.now().toString(36),type,msg,time:now(),status:'pending'});save(OUTBOX_KEY,o.slice(0,80));}
  window.v28OutboxDone=function(id){const o=outbox();const x=o.find(i=>i.id===id);if(x)x.status='done';save(OUTBOX_KEY,o);renderTab('notices')};
  window.v28ClearOutboxDone=function(){save(OUTBOX_KEY,outbox().filter(x=>x.status!=='done'));renderTab('notices')};
  window.v28SaveNotice=function(){const title=($('v28NoticeTitle')?.value||'').trim(), msg=($('v28NoticeMsg')?.value||'').trim(), audience=$('v28NoticeAudience')?.value||'Passengers'; if(!title||!msg){toast('Add title and message.');return;} const ns=notices();ns.unshift({id:'N'+Date.now().toString(36),title,msg,audience,time:now()});save(NOTICE_KEY,ns.slice(0,30));enqueue('notice','Saved notice: '+title);toast('Notice saved.');renderTab('notices')};
  window.v28DeleteNotice=function(id){save(NOTICE_KEY,notices().filter(n=>n.id!==id));toast('Notice deleted.');renderTab('notices')};
  window.v28ExportNotices=function(){download(JSON.stringify({version:VERSION,exportedAt:now(),notices:notices()},null,2),'application/json','oceanjet_v28_notices.json')};
  window.v28ExportRiskCSV=function(){const rows=[['risk','id','status','priority','lastName','tag','description'].join(',')].concat(claims().map(c=>[riskClaim(c),c.id,c.status,c.priority,c.lastName,c.tag,String(c.description||'').replace(/[\r\n,]+/g,' ')].map(csv).join(',')));download(rows.join('\n'),'text/csv','oceanjet_v28_claim_risk_queue.csv')};
  window.v28ExportDayPack=function(){const m=metrics(); const data={version:VERSION,exportedAt:now(),readiness:m.ready,claims:m.claims,damage:m.damage,transactions:m.tx,notices:m.notices,outbox:outbox(),storage:m.storage,logs:load(LOG_KEY,[])};download(JSON.stringify(data,null,2),'application/json','oceanjet_v28_day_pack.json');enqueue('backup','Day Pack exported');toast('V28 Day Pack exported.')};
  function csv(v){return '"'+String(v??'').replace(/"/g,'""')+'"'}
  function download(data,type,name){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),800)}
  function patchDashboard(){try{const v=$('view-dashboard'); if(!v||$('v28Dash')) return; const m=metrics(); v.insertAdjacentHTML('afterbegin',`<div id="v28Dash" class="card v28-shell"><div class="v28-title"><div><h2>🧠 V28 Service Intelligence</h2><div class="v28-sub">Readiness ${m.ready}% • ${m.active.length} active claims • ${m.pending.length} outbox items</div></div><button class="sm primary" onclick="showView('v28-os')">Open</button></div></div>`)}catch(e){}}
  function patchMap(){try{const v=$('view-map'); if(!v||$('v28Map')) return; v.insertAdjacentHTML('afterbegin',`<div id="v28Map" class="card v28-shell"><div class="v28-title"><div><h2>🗺️ V28 Route Pressure Layer</h2><div class="v28-sub">Adds service pressure and passenger disruption context to the existing map tab.</div></div><button class="sm accent" onclick="showView('v28-os')">Analyze</button></div></div>`)}catch(e){}}
  function boot(){try{document.body.classList.add('v28-mobile-polish'); VIEWS.forEach(ensureView); patchNav(); if(typeof window.buildDrawerMenu==='function') window.buildDrawerMenu(); setTimeout(()=>{patchDashboard();patchMap();},700); audit('boot',VERSION+' loaded'); console.log(VERSION+' loaded');}catch(e){console.error('V28 boot error',e);audit('boot_error',e.message);toast('V28 recovery: '+e.message)}}
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot,{once:true}); else boot();
})();
</script>

0}.v29-card{border:1px solid rgba(97,247,255,.22);background:rgba(255,255,255,.055);border-radius:19px;padding:12px;margin-bottom:10px}.v29-flow{display:grid;gap:9px}.v29-step{position:relative;border-left:4px solid var(--v29-cyan);padding:10px 10px 10px 14px;border-radius:12px;background:rgba(255,255,255,.05)}.v29-step:before{content:attr(data-n);position:absolute;left:-13px;top:10px;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;background:var(--v29-cyan);color:#061126;font-size:.68rem;font-weight:900}.v29-table{overflow:auto;border-radius:14px;border:1px solid rgba(255,255,255,.08)}.v29-table table{width:100%;border-collapse:collapse;min-width:560px}.v29-table th,.v29-table td{padding:10px;border-bottom:1px solid rgba(255,255,255,.08);font-size:.78rem;text-align:left}.v29-table th{color:var(--v29-cyan);background:rgba(97,247,255,.08);position:sticky;top:0}.v29-radar{height:230px;border-radius:20px;border:1px solid rgba(97,247,255,.25);background:radial-gradient(circle at center,rgba(97,247,255,.16),transparent 18%),linear-gradient(90deg,rgba(97,247,255,.05) 1px,transparent 1px),linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),#041022;background-size:auto,28px 28px,28px 28px,auto;position:relative;overflow:hidden}.v29-radar:after{content:"";position:absolute;left:50%;top:50%;width:130%;height:130%;background:conic-gradient(from 0deg,rgba(97,247,255,.42),transparent 28%,transparent);transform-origin:0 0;animation:v29Scan 4.5s linear infinite}@keyframes v29Scan{to{transform:rotate(360deg)}}.v29-port{position:absolute;z-index:2;border:1px solid rgba(255,255,255,.25);background:rgba(4,16,34,.82);border-radius:999px;padding:5px 8px;font-size:.65rem;font-weight:900;color:#fff}.v29-port.hot{border-color:rgba(255,93,122,.75);color:#ff9bad;box-shadow:0 0 15px rgba(255,93,122,.35)}.v29-port.ok{border-color:rgba(118,255,156,.65);color:#aaffbf}.v29-spacer{height:22px}@media(max-width:720px){.v29-grid3{grid-template-columns:1fr 1fr}.v29-title{flex-direction:column}.v29-action{min-height:96px;padding:13px}.v29-row{align-items:flex-start}.v29-row button{align-self:center}.v29-kpi b{font-size:1.12rem}body.v29-polish input,body.v29-polish select,body.v29-polish textarea,body.v29-polish button{font-size:16px!important}}@media(max-width:390px){.v29-grid3{grid-template-columns:1fr}.v29-grid{grid-template-columns:1fr}.v29-table th,.v29-table td{padding:8px}}

<script id="v29PredictiveServiceOS">
(function(){
  'use strict';
  if(window.__OJ_V29_PREDICTIVE_SERVICE_OS__) return;
  window.__OJ_V29_PREDICTIVE_SERVICE_OS__ = true;
  const VERSION='V29 Predictive Service OS';
  const KEYS={claims:'oj_passenger_claims_v22',damage:'oj_damage_master_log_v11',sync:'oj_offline_sync_queue_v26',audit:'oj_v29_audit',prefs:'oj_v29_prefs',notices:'oj_public_notices_v25',forecast:'oj_v29_forecasts',journey:'oj_v29_journeys',shift:'oj_v29_shift_plan'};
  const VIEWS=['v29-os','v29-journey','v29-claims','v29-ops','v29-map','v29-admin'];
  const ROUTES=['cebu_tagbilaran','cebu_maasin','cebu_surigao','cebu_siquijor','cebu_dumaguete','cebu_ormoc','cebu_palompon','cebu_getafe'];
  const PORTS=['CEBU','TAGBILARAN','MAASIN','SURIGAO','SIQUIJOR','DUMAGUETE','ORMOC','PALOMPON','GETAFE'];
  const $=id=>document.getElementById(id), qs=(s,r=document)=>r.querySelector(s), qsa=(s,r=document)=>Array.from(r.querySelectorAll(s));
  const now=()=>new Date().toLocaleString('en-PH',{timeZone:'Asia/Manila',hour12:true});
  const uid=p=>p+'-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).slice(2,6).toUpperCase();
  function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
  function load(k,f){try{const v=localStorage.getItem(k);return v?JSON.parse(v):f}catch(e){return f}}
  function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch(e){audit('storage_error',e.message);return false}}
  function audit(type,msg){const a=load(KEYS.audit,[]);a.unshift({id:uid('V29AUD'),type,msg:String(msg||''),at:now(),online:navigator.onLine});save(KEYS.audit,a.slice(0,220));}
  function toast(msg){try{if(typeof window.toast==='function')return window.toast(msg)}catch(e){} const t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#061126;color:white;border:1px solid #61f7ff;border-radius:999px;padding:10px 15px;font:900 12px system-ui;z-index:999999;box-shadow:0 8px 30px #000a';document.body.appendChild(t);setTimeout(()=>t.remove(),2600)}
  function ensureView(name){let v=$('view-'+name);if(!v){v=document.createElement('div');v.id='view-'+name;v.className='view';(qs('.app')||document.body).appendChild(v)}return v}
  function isAdmin(){try{return sessionStorage.getItem('oj_v22_admin_unlocked')==='1'||localStorage.getItem('oj_v22_admin_unlocked')==='1'}catch(e){return false}}
  function oldClaims(){return load(KEYS.claims,[])}
  function damages(){return load(KEYS.damage,[])}
  function allClaims(){return [...oldClaims(),...damages()].map(normalizeClaim)}
  function openClaims(){return allClaims().filter(c=>!['closed','resolved','rejected','done'].includes(String(c.status||'new').toLowerCase()))}
  function normalizeClaim(c){return Object.assign({},c,{id:c.claimId||c.caseId||c.id||c.ticketId||'NO-ID',tag:c.tagNo||c.tag||c.baggageTag||'',route:c.route||c.destination||c.dest||'Unknown',status:c.status||c.claimStatus||'New',name:c.passengerName||c.name||c.lastName||'',issue:c.damageType||c.type||c.description||c.notes||'Claim',created:c.createdAt||c.phtTimestamp||c.dateTaken||''})}
  function claimRisk(c){const text=JSON.stringify(c).toLowerCase();let n=16;if(/critical|urgent|wet|missing|crack|broken|wheel|handle|priority|medicine|id|passport/.test(text))n+=34;if(!c.tag)n+=12;if(!c.name)n+=8;if(!c.contact&&!c.phone&&!c.email)n+=8;if(String(c.status).toLowerCase()==='new')n+=10;if(/surigao|dumaguete|siquijor/.test(String(c.route).toLowerCase()))n+=6;return Math.min(100,n)}
  function routeLabel(r){try{if(typeof window.label==='function')return window.label(r)}catch(e){} const map={cebu_tagbilaran:'Cebu → Tagbilaran',cebu_maasin:'Cebu → Maasin',cebu_surigao:'Cebu → Surigao',cebu_siquijor:'Cebu → Siquijor',cebu_dumaguete:'Cebu → Dumaguete',cebu_ormoc:'Cebu → Ormoc',cebu_palompon:'Cebu → Palompon',cebu_getafe:'Cebu → Getafe'};return map[r]||String(r||'Unknown').replace(/_/g,' → ').replace(/\b\w/g,c=>c.toUpperCase())}
  function storage(){let bytes=0;try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i)||'';bytes+=(k.length+(localStorage.getItem(k)||'').length)*2}}catch(e){}return{bytes,mb:bytes/1048576,pct:Math.min(100,Math.round(bytes/(4.8*1048576)*100))}}
  function routePressure(route){const c=allClaims().filter(x=>String(x.route).toLowerCase().includes(String(route).split('_').pop())||String(x.route).toLowerCase()===String(route).toLowerCase()).length; const nowHr=new Date().getHours(); const peak=(nowHr>=6&&nowHr<=9)||(nowHr>=15&&nowHr<=19)?18:4; const base=18+peak+(ROUTES.indexOf(route)%4)*7; return Math.min(98,base+c*5+Math.floor(Math.random()*7));}
  function delayRisk(route){const p=routePressure(route); const long=/surigao|dumaguete|siquijor/.test(route)?10:0; return Math.min(96,Math.round(p*.58+long+Math.random()*8));}
  function healthScore(){const st=storage(), oc=openClaims(), urgent=oc.filter(c=>claimRisk(c)>=68), sync=load(KEYS.sync,[]);return Math.max(0,Math.min(100,100-urgent.length*7-sync.length*2-Math.max(0,st.pct-72))) }
  function metrics(){const oc=openClaims(), urgent=oc.filter(c=>claimRisk(c)>=68), sync=load(KEYS.sync,[]), st=storage();return{oc,urgent,sync,st,ready:healthScore(),claims:allClaims(),audit:load(KEYS.audit,[]),notices:load(KEYS.notices,[])}}
  function color(v){return v>=78?'green':v>=55?'amber':'red'}
  function action(ico,title,sub,view){return `<button class="v29-action" onclick="showView('${view}')"><span class="ico">${ico}</span><b>${esc(title)}</b><small>${esc(sub)}</small></button>`}
  function kpis(m){return `<div class="v29-grid3"><div class="v29-kpi"><b>${m.ready}%</b><span>Experience Score</span></div><div class="v29-kpi"><b>${m.oc.length}</b><span>Open Cases</span></div><div class="v29-kpi"><b>${m.urgent.length}</b><span>Priority Risks</span></div></div>`}
  function renderOS(){const m=metrics(); ensureView('v29-os').innerHTML=`
    <div class="card v29-shell"><div class="v29-title"><div><h1>🧠 V29 Predictive Service OS</h1><div class="v29-sub">A major upgrade focused on passenger guidance, staff decision speed, predictive route/claim risk, and mobile reliability.</div></div><span class="v29-chip ${color(m.ready)}">${m.ready}% HEALTH</span></div>${kpis(m)}<div class="v29-meter" style="margin-top:12px"><span style="width:${m.ready}%"></span></div></div>
    <div class="card"><div class="card-header">Predictive action hub</div><div class="v29-grid">${action('🧭','Journey Advisor','Passenger next-steps and route prediction','v29-journey')}${action('🧳','Claims Intelligence','Prioritize and resolve baggage cases faster','v29-claims')}${action('🧑‍💼','Staff Ops Cockpit','Shift load, queue pressure, and staff tasks','v29-ops')}${action('🗺️','Predictive Map','Route pressure radar and port status','v29-map')}${action('🛠️','Admin Control','Locked tools, backup, diagnostics','v29-admin')}${action('🔎','Quick Search','Use existing command search','v27-search')}</div></div>
    <div class="card"><div class="card-header">What needs attention now</div>${recommendations(m)}</div><div class="v29-spacer"></div>`}
  function recommendations(m){const rows=[]; if(m.urgent.length) rows.push(['red','Prioritize baggage claim review',m.urgent.length+' open case(s) may breach service quality.','v29-claims']); if(m.sync.length) rows.push(['amber','Offline data pending',m.sync.length+' local item(s) should be exported/synced.','v29-admin']); if(m.st.pct>72) rows.push(['amber','Storage pressure rising','Export backup and compress local logs.','v29-admin']); const worst=ROUTES.map(r=>({r,p:routePressure(r),d:delayRisk(r)})).sort((a,b)=>b.p-a.p)[0]; if(worst) rows.push([worst.p>74?'red':'amber','Route pressure alert',routeLabel(worst.r)+' pressure '+worst.p+'%, delay risk '+worst.d+'%.','v29-map']); if(!rows.length) rows.push(['green','System looks ready','No critical local issue detected.','v29-journey']); return rows.map(r=>`<div class="v29-row"><div><strong><span class="v29-chip ${r[0]}">${r[0]}</span> ${esc(r[1])}</strong><small>${esc(r[2])}</small></div><button class="sm" onclick="showView('${r[3]}')">Open</button></div>`).join('')}
  function routeOptions(sel){return ROUTES.map(r=>`<option value="${r}" ${sel===r?'selected':''}>${esc(routeLabel(r))}</option>`).join('')}
  function renderJourney(){ensureView('v29-journey').innerHTML=`
    <div class="card v29-shell"><div class="v29-title"><div><h2>🧭 Passenger Journey Advisor</h2><div class="v29-sub">A guided public flow that tells passengers what to do next for fares, schedules, baggage, claims, or delays.</div></div><span class="v29-chip pink">PUBLIC</span></div></div>
    <div class="card"><div class="grid2"><div class="input-group"><label>Passenger Need</label><select id="v29Need" onchange="v29BuildJourney()"><option value="fare">Check fare / route</option><option value="schedule">Check trip schedule</option><option value="damage">Report damaged baggage</option><option value="lost">Report lost baggage</option><option value="status">Track claim status</option><option value="delay">Trip delay help</option></select></div><div class="input-group"><label>Route</label><select id="v29Route" onchange="v29BuildJourney()">${routeOptions('cebu_tagbilaran')}</select></div></div><button class="primary block" onclick="v29BuildJourney()">Build passenger steps</button></div>
    <div class="card"><div class="card-header">Recommended steps</div><div id="v29JourneyOut"></div></div>
    <div class="card"><div class="card-header">Passenger quick tools</div><div class="v29-grid">${action('💵','Fares','Open passenger fares','fares')}${action('🕐','Schedules','Open schedule board','schedules')}${action('🧳','Damage Report','Open damage detector','damage')}${action('🎒','Lost Baggage','Open lost baggage form','lostbaggage')}${action('🔎','Claim Status','Track claim number','claimstatus')}${action('📢','Notices','Read public advisories','noticeboard')}</div></div><div class="v29-spacer"></div>`; setTimeout(()=>window.v29BuildJourney&&window.v29BuildJourney(),40)}
  window.v29BuildJourney=function(){const need=$('v29Need')?.value||'fare', route=$('v29Route')?.value||ROUTES[0]; const p=routePressure(route), d=delayRisk(route); const map={fare:[['Open Fares','Check passenger fare for '+routeLabel(route)+'.'],['Use Baggage Calc only for baggage','Official baggage fee must be computed in the Baggage Calc tab, not the chatbot.'],['Save screenshot/receipt','Passenger can show the result at counter if needed.']],schedule:[['Open Schedules','Confirm latest posted departure for '+routeLabel(route)+'.'],['Check advisory board','Look for route notices and port reminders.'],['Ask staff if risk is high','Current predicted route pressure is '+p+'%.']],damage:[['Open Damage Detector','Capture claim stub, full baggage, and close-up damage photo.'],['Confirm passenger identity','Use PSN + Last Name before saving case.'],['Issue claim number','Passenger tracks status in Claim Status.'],['Escalate if severe','Current claim risk logic prioritizes crack, wet damage, missing parts, and broken handles.']],lost:[['Open Lost Baggage Form','Record tag, route, last seen port, and contact.'],['Mark priority if essential','Passport, medicine, ID, or wallet should be priority.'],['Give claim reference','Passenger tracks using claim number.']],status:[['Open Claim Status','Search claim number or last name.'],['Explain timeline','Submitted → Under Review → Processing → Resolved.'],['Escalate missing updates','If no update, staff should open Claims Intelligence.']],delay:[['Check route risk','Route pressure '+p+'%, predicted delay risk '+d+'%.'],['Open Live Map','See pressure layer and port board.'],['Read Notices','Check if staff posted advisory for '+routeLabel(route)+'.']]}; const out=$('v29JourneyOut'); if(out) out.innerHTML='<div class="v29-flow">'+map[need].map((s,i)=>`<div class="v29-step" data-n="${i+1}"><b>${esc(s[0])}</b><br><small>${esc(s[1])}</small></div>`).join('')+'</div>'; save(KEYS.journey,{need,route,pressure:p,delay:d,lastBuilt:now()});};
  function renderClaims(){const rows=openClaims().map(c=>Object.assign(c,{risk:claimRisk(c)})).sort((a,b)=>b.risk-a.risk); ensureView('v29-claims').innerHTML=`
    <div class="card v29-shell"><div class="v29-title"><div><h2>🧳 Claims Intelligence</h2><div class="v29-sub">Predictive triage for damage/lost baggage. Helps staff pick which claim to handle first.</div></div><span class="v29-chip ${rows.filter(r=>r.risk>=68).length?'red':'green'}">${rows.filter(r=>r.risk>=68).length} PRIORITY</span></div></div>
    <div class="card"><div class="card-header">Smart actions</div><div class="v29-grid">${action('📷','Capture Evidence','Open Damage Detector','damage')}${action('🔎','Track Status','Open Claim Status','claimstatus')}${action('📋','Staff Counter','Open Staff Counter','staffcounter')}${action('📤','Export Center','Open Exports','exportcenter')}</div></div>
    <div class="card"><div class="card-header">Priority Queue</div><div class="v29-table"><table><thead><tr><th>Risk</th><th>Claim</th><th>Route</th><th>Status</th><th>Next Action</th></tr></thead><tbody>${rows.slice(0,40).map(c=>`<tr><td><span class="v29-chip ${c.risk>=68?'red':c.risk>=45?'amber':'green'}">${c.risk}</span></td><td>${esc(c.id)}<br><small>${esc(c.tag||'No tag')}</small></td><td>${esc(routeLabel(c.route))}</td><td>${esc(c.status)}</td><td>${nextAction(c)}</td></tr>`).join('')||'<tr><td colspan="5">No open local claims found.</td></tr>'}</tbody></table></div></div>
    <div class="card"><div class="card-header">Generate Staff Claim Brief</div><button class="primary block" onclick="v29ExportClaimBrief()">Export priority brief JSON</button></div><div class="v29-spacer"></div>`}
  function nextAction(c){if(c.risk>=70)return 'Immediate supervisor review'; if(!c.tag)return 'Complete baggage tag'; if(!c.name)return 'Verify passenger identity'; if(/new/i.test(c.status))return 'Move to Under Review'; return 'Continue processing'}
  window.v29ExportClaimBrief=function(){const data={version:VERSION,exportedAt:now(),priority:openClaims().map(c=>Object.assign(normalizeClaim(c),{risk:claimRisk(normalizeClaim(c)),nextAction:nextAction(normalizeClaim(c))})).sort((a,b)=>b.risk-a.risk)}; download(JSON.stringify(data,null,2),'application/json','oceanjet_v29_claim_priority_brief.json'); audit('export','Claim priority brief exported'); toast('Claim brief exported.');};
  function renderOps(){const m=metrics(); const forecast=ROUTES.map(r=>({route:r,pressure:routePressure(r),delay:delayRisk(r),staff:Math.max(1,Math.round(routePressure(r)/35))})).sort((a,b)=>b.pressure-a.pressure); ensureView('v29-ops').innerHTML=`
    <div class="card v29-shell"><div class="v29-title"><div><h2>🧑‍💼 Staff Ops Cockpit</h2><div class="v29-sub">Forecasts service pressure and suggests shift workload for baggage counter, cashier, and passenger assistance.</div></div><span class="v29-chip blue">FORECAST</span></div>${kpis(m)}</div>
    <div class="card"><div class="card-header">One-minute shift plan</div><div id="v29ShiftPlan">${shiftPlanHTML(forecast,m)}</div><button class="primary block" onclick="v29SaveShiftPlan()">Save Shift Plan</button></div>
    <div class="card"><div class="card-header">Route workload forecast</div><div class="v29-table"><table><thead><tr><th>Route</th><th>Pressure</th><th>Delay Risk</th><th>Suggested Staff</th></tr></thead><tbody>${forecast.map(f=>`<tr><td>${esc(routeLabel(f.route))}</td><td><span class="v29-chip ${color(100-f.pressure)}">${f.pressure}%</span></td><td>${f.delay}%</td><td>${f.staff}</td></tr>`).join('')}</tbody></table></div></div><div class="v29-spacer"></div>`}
  function shiftPlanHTML(forecast,m){const top=forecast.slice(0,3); const tasks=[`Assign ${Math.max(1,m.urgent.length)} staff to priority baggage claims.`,`Post public notice for ${routeLabel(top[0].route)} if pressure remains above ${top[0].pressure}%.`,`Prepare backup export before shift handover.`,`Keep one counter focused on passenger claim status lookups.`]; return '<div class="v29-flow">'+tasks.map((t,i)=>`<div class="v29-step" data-n="${i+1}"><b>${esc(t)}</b></div>`).join('')+'</div>'}
  window.v29SaveShiftPlan=function(){const m=metrics();const forecast=ROUTES.map(r=>({route:r,pressure:routePressure(r),delay:delayRisk(r)}));save(KEYS.shift,{savedAt:now(),health:m.ready,openClaims:m.oc.length,priority:m.urgent.length,forecast});audit('shift','V29 shift plan saved');toast('Shift plan saved locally.');};
  function renderMap(){const items=ROUTES.map((r,i)=>({r,p:routePressure(r),d:delayRisk(r),x:[12,30,62,80,45,18,72,54][i],y:[40,72,46,66,30,18,23,82][i]})); ensureView('v29-map').innerHTML=`
    <div class="card v29-shell"><div class="v29-title"><div><h2>🗺️ Predictive Map + Route Radar</h2><div class="v29-sub">Offline-friendly simulation layer: route pressure, delay risk, and port readiness. Can later connect to real GPS/AIS/weather APIs.</div></div><span class="v29-chip amber">SIMULATED</span></div></div>
    <div class="card"><div class="v29-radar">${items.map((it,i)=>`<span class="v29-port ${it.p>72?'hot':'ok'}" style="left:${it.x}%;top:${it.y}%">${PORTS[i]||'PORT'} ${it.p}%</span>`).join('')}</div></div>
    <div class="card"><div class="card-header">Route pressure board</div><div class="v29-table"><table><thead><tr><th>Route</th><th>Pressure</th><th>Delay Risk</th><th>Suggestion</th></tr></thead><tbody>${items.sort((a,b)=>b.p-a.p).map(it=>`<tr><td>${esc(routeLabel(it.r))}</td><td><span class="v29-chip ${it.p>72?'red':it.p>50?'amber':'green'}">${it.p}%</span></td><td>${it.d}%</td><td>${it.p>72?'Prepare notice + staff':it.p>50?'Monitor queue':'Normal'}</td></tr>`).join('')}</tbody></table></div></div>
    <div class="card"><div class="card-header">Open existing Live Map</div><button class="accent block" onclick="showView('map')">Open original Live Map tab</button></div><div class="v29-spacer"></div>`}
  function renderAdmin(){const m=metrics(); const locked=!isAdmin(); ensureView('v29-admin').innerHTML=`
    <div class="card v29-shell"><div class="v29-title"><div><h2>🛠️ V29 Admin Control</h2><div class="v29-sub">Protected tools for diagnostics, backup, local integrity, and predictive data export.</div></div><span class="v29-chip ${locked?'red':'green'}">${locked?'LOCKED':'UNLOCKED'}</span></div></div>
    ${locked?adminLoginHTML():adminToolsHTML(m)}<div class="v29-spacer"></div>`}
  function adminLoginHTML(){return `<div class="card"><div class="card-header">Admin login required</div><div class="grid2"><div class="input-group"><label>Username</label><input id="v29AdminUser" placeholder="admin"></div><div class="input-group"><label>Password</label><input id="v29AdminPass" type="password" placeholder="admin"></div></div><button class="primary block" onclick="v29UnlockAdmin()">Unlock V29 Admin Tools</button><p class="muted">Demo credentials: admin/admin, demo/demo, supervisor/supervisor</p></div>`}
  function adminToolsHTML(m){return `<div class="card"><div class="card-header">System diagnostics</div>${kpis(m)}<div class="v29-row"><div><strong>Storage</strong><small>${m.st.mb.toFixed(2)} MB • ${m.st.pct}% estimated browser storage</small></div></div><div class="v29-row"><div><strong>Audit events</strong><small>${m.audit.length} local V29 events</small></div></div></div><div class="card"><div class="card-header">Admin exports and repair</div><div class="v29-grid">${buttonHTML('📦','Full V29 Snapshot','Export app snapshot','v29ExportSnapshot()')}${buttonHTML('🧹','Compact Audit','Keep latest logs only','v29CompactAudit()')}${buttonHTML('🧪','Run Health Test','Check core views and storage','v29HealthTest()')}${buttonHTML('🔒','Lock Admin','Return to protected mode','v29LockAdmin()')}</div></div>`}
  function buttonHTML(ico,title,sub,fn){return `<button class="v29-action" onclick="${fn}"><span class="ico">${ico}</span><b>${esc(title)}</b><small>${esc(sub)}</small></button>`}
  window.v29UnlockAdmin=function(){const u=$('v29AdminUser')?.value||'', p=$('v29AdminPass')?.value||''; const ok=(u==='admin'&&p==='admin')||(u==='demo'&&p==='demo')||(u==='supervisor'&&p==='supervisor'); if(ok){sessionStorage.setItem('oj_v22_admin_unlocked','1');audit('admin','V29 admin unlocked');toast('Admin unlocked.');renderAdmin()}else toast('Wrong admin login.');};
  window.v29LockAdmin=function(){sessionStorage.removeItem('oj_v22_admin_unlocked');localStorage.removeItem('oj_v22_admin_unlocked');audit('admin','V29 admin locked');toast('Admin locked.');renderAdmin();};
  window.v29CompactAudit=function(){save(KEYS.audit,load(KEYS.audit,[]).slice(0,50));toast('V29 audit compacted.');renderAdmin();};
  window.v29HealthTest=function(){const result={at:now(),views:VIEWS.map(v=>({view:v,exists:!!$('view-'+v)})),storage:storage(),claims:allClaims().length,online:navigator.onLine};audit('health_test',JSON.stringify(result));toast('Health test done.');download(JSON.stringify(result,null,2),'application/json','oceanjet_v29_health_test.json')};
  window.v29ExportSnapshot=function(){const data={version:VERSION,exportedAt:now(),metrics:metrics(),claims:oldClaims(),damage:damages(),sync:load(KEYS.sync,[]),notices:load(KEYS.notices,[]),audit:load(KEYS.audit,[]),journey:load(KEYS.journey,{}),shift:load(KEYS.shift,{})};download(JSON.stringify(data,null,2),'application/json','oceanjet_v29_full_snapshot.json');audit('export','Full snapshot exported');toast('Full snapshot exported.');};
  function download(data,type,name){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
  const renderers={'v29-os':renderOS,'v29-journey':renderJourney,'v29-claims':renderClaims,'v29-ops':renderOps,'v29-map':renderMap,'v29-admin':renderAdmin};
  function patchNav(){const old=window.buildDrawerMenu; window.buildDrawerMenu=function(){try{if(typeof old==='function') old(); const menu=$('drawerMenu'); if(!menu)return; const add=(view,label,ico)=>{if(!menu.querySelector(`[data-view="${view}"]`)) menu.insertAdjacentHTML('beforeend',`<div class="drawer-item" data-view="${view}" onclick="showView('${view}')"><i>${ico}</i> ${label}</div>`)}; add('v29-os','V29 Predictive OS','🧠'); add('v29-journey','Journey Advisor','🧭'); add('v29-claims','Claims Intel','🧳'); add('v29-ops','Staff Ops','🧑‍💼'); add('v29-map','Predictive Map','🗺️'); add('v29-admin','V29 Admin','🛠️');}catch(e){console.error(e)}};
    const oldShow=window.showView; window.showView=function(name){try{if(renderers[name]){qsa('.view').forEach(v=>v.classList.remove('active'));ensureView(name).classList.add('active');qsa('.drawer-item').forEach(x=>x.classList.toggle('active',x.dataset.view===name));renderers[name]();return;} }catch(e){console.error('V29 show error',e);audit('show_error',e.message)} if(typeof oldShow==='function')return oldShow(name);};
    const oldNav=window.navigate; window.navigate=function(name){if(renderers[name]) return window.showView(name); if(typeof oldNav==='function') return oldNav(name); if(typeof window.showView==='function') return window.showView(name);};
  }
  function patchDashboard(){try{const v=$('view-dashboard'); if(!v||$('v29Dash')) return; const m=metrics(); v.insertAdjacentHTML('afterbegin',`<div id="v29Dash" class="card v29-shell"><div class="v29-title"><div><h2>🧠 V29 Predictive Service Layer</h2><div class="v29-sub">Experience ${m.ready}% • ${m.oc.length} open claims • ${m.urgent.length} priority risks</div></div><button class="sm primary" onclick="showView('v29-os')">Open V29</button></div></div>`)}catch(e){}}
  function patchMap(){try{const v=$('view-map'); if(!v||$('v29MapPatch')) return; v.insertAdjacentHTML('afterbegin',`<div id="v29MapPatch" class="card v29-shell"><div class="v29-title"><div><h2>🗺️ V29 Predictive Route Radar</h2><div class="v29-sub">Open the predictive map for route pressure, delay risk, and port readiness.</div></div><button class="sm accent" onclick="showView('v29-map')">Predict</button></div></div>`)}catch(e){}}
  function boot(){try{document.body.classList.add('v29-polish'); VIEWS.forEach(ensureView); patchNav(); if(typeof window.buildDrawerMenu==='function') window.buildDrawerMenu(); setTimeout(()=>{patchDashboard();patchMap()},750); audit('boot',VERSION+' loaded'); console.log(VERSION+' loaded')}catch(e){console.error('V29 boot error',e);audit('boot_error',e.message);toast('V29 recovery: '+e.message)}}
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot,{once:true}); else boot();
})();
</script>

<script id="v30ServiceSuperAppScript">
(function(){
  if(window.__OCEANJET_V30_REAL__) return;
  window.__OCEANJET_V30_REAL__ = true;
  const VERSION='V30 Service SuperApp OS';
  const VIEWS=['v30-os','v30-care','v30-claim','v30-sync','v30-admin'];
  const KEYS={tickets:'oj_v30_service_tickets',audit:'oj_v30_audit',prefs:'oj_v30_prefs',outbox:'oj_v30_outbox',config:'oj_v30_cloud_config',kb:'oj_v30_kb',snap:'oj_v30_snapshots'};
  const ROUTES=['cebu_tagbilaran','cebu_maasin','cebu_surigao','cebu_siquijor','cebu_dumaguete','cebu_ormoc','cebu_palompon','cebu_getafe'];
  const ROLE_LANES=[
    ['Passenger','Check route, claim status, help guide','showView("v30-care")','👤'],
    ['Baggage Staff','Create claim packet, triage queue','showView("v30-claim")','🧳'],
    ['Cashier','Open original baggage calculator','showView("calc")','💳'],
    ['Supervisor','Open protected admin console','showView("v30-admin")','🛡️']
  ];
  const $=id=>document.getElementById(id);
  const qsa=(s,r=document)=>Array.from(r.querySelectorAll(s));
  const app=()=>document.querySelector('.app')||document.body;
  function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
  function load(k,f){try{return JSON.parse(localStorage.getItem(k)||'null')??f}catch(e){return f}}
  function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch(e){tip('Storage full. Export backup.');return false}}
  function now(){return new Date().toLocaleString('en-PH',{timeZone:'Asia/Manila',hour12:true})}
  function uid(p){return p+'-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).slice(2,6).toUpperCase()}
  function tip(msg){if(typeof window.toast==='function') try{return window.toast(msg)}catch(e){} const d=document.createElement('div');d.textContent=msg;d.style.cssText='position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:999999;background:#ff4fb8;color:white;padding:10px 14px;border-radius:999px;font-weight:900;box-shadow:0 8px 28px rgba(0,0,0,.35)';document.body.appendChild(d);setTimeout(()=>d.remove(),2400)}
  function audit(type,msg){const a=load(KEYS.audit,[]);a.unshift({at:now(),type,msg:String(msg||'')});save(KEYS.audit,a.slice(0,180))}
  function storage(){let size=0;try{for(let k in localStorage){if(Object.prototype.hasOwnProperty.call(localStorage,k)) size+=localStorage.getItem(k).length+k.length}}catch(e){} const mb=size*2/1024/1024;return {bytes:size*2,mb,pct:Math.min(99,Math.round(mb/5*100))}}
  function routeLabel(r){return String(r||'').replace('cebu_','Cebu → ').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}
  function adminOK(){return sessionStorage.getItem('oj_v22_admin_unlocked')==='1'||localStorage.getItem('oj_v22_admin_unlocked')==='1'}
  function prefs(){return load(KEYS.prefs,{large:false,fast:false,kiosk:'auto'})}
  function setPrefs(p){save(KEYS.prefs,p);document.body.classList.toggle('v30-large-touch',!!p.large);document.body.classList.toggle('v30-fast',!!p.fast)}
  function tickets(){return load(KEYS.tickets,[])}
  function oldClaims(){let out=[];['oj_v22_claims','oj_v23_claims','oj_v24_tickets','oj_v25_queue','oj_v26_interactions','oj_v27_claims','oj_v29_claims'].forEach(k=>{const v=load(k,[]);if(Array.isArray(v))out=out.concat(v)});return out}
  function damages(){return load('oj_damage_master_log_v11',[])}
  function outbox(){return load(KEYS.outbox,[])}
  function metrics(){const t=tickets(), oc=oldClaims(), dm=damages(), ob=outbox(), st=storage(), aud=load(KEYS.audit,[]); const open=t.filter(x=>!['Closed','Resolved','Rejected','Synced'].includes(x.status)); const urgent=t.filter(x=>x.priority>=75||String(x.issue).match(/lost|critical|wet|broken|crack/i)); const ready=Math.max(18,Math.min(99,100-Math.round(st.pct*.18)-Math.min(18,ob.length*2)+Math.min(10,aud.length?8:0))); return {t,oc,dm,ob,st,aud,open,urgent,ready,total:t.length+oc.length+dm.length}}
  function ensureView(name){let v=$('view-'+name);if(!v){v=document.createElement('div');v.id='view-'+name;v.className='view';app().appendChild(v)}return v}
  function activate(name){qsa('.view').forEach(v=>v.classList.remove('active'));ensureView(name).classList.add('active');qsa('#drawerMenu .drawer-item').forEach(el=>el.classList.toggle('active',el.dataset.view===name));try{window.scrollTo({top:0,behavior:prefs().fast?'auto':'smooth'})}catch(e){window.scrollTo(0,0)}}
  function kpis(m){return `<div class="v30-grid"><div class="v30-kpi"><div><b>${m.ready}%</b><span>Site Readiness</span></div></div><div class="v30-kpi"><div><b>${m.open.length}</b><span>Open Tickets</span></div></div><div class="v30-kpi"><div><b>${m.urgent.length}</b><span>Priority</span></div></div><div class="v30-kpi"><div><b>${m.st.mb.toFixed(2)}MB</b><span>Local Storage</span></div></div></div>`}
  function action(ico,title,sub,fn,cls=''){return `<button class="v30-action ${cls}" onclick="${fn}"><span class="ico">${ico}</span><b>${esc(title)}</b><small>${esc(sub)}</small></button>`}
  function statusChip(s){const x=String(s||'New');const cls=/closed|resolved|synced/i.test(x)?'green':/urgent|critical|pending|review/i.test(x)?'amber':/reject|fail/i.test(x)?'red':'blue';return `<span class="v30-chip ${cls}">${esc(x)}</span>`}
  function priority(n){return n>=80?'red':n>=60?'amber':'green'}
  function qr(text){let h=0;for(let i=0;i<String(text).length;i++){h=((h<<5)-h)+String(text).charCodeAt(i);h|=0}let cells='';for(let i=0;i<81;i++){const on=((Math.abs(h)+i*17+i*i)%7)<3||[0,1,2,9,18,10,11,19,20,60,61,62,69,70,71,78,79,80].includes(i);cells+=`<i class="${on?'':'off'}"></i>`}return `<div class="v30-qr" aria-label="QR style receipt">${cells}</div>`}

  function renderCare(){const m=metrics();ensureView('v30-care').innerHTML=`

  window.v30BuildGuide=function(){const need=$('v30Need').value,route=$('v30Route').value,lookup=$('v30Lookup').value.trim(),mobile=$('v30Mobile').value.trim();const steps=[];if(/damage/i.test(need)){steps.push('Take photo of claim stub or baggage tag.','Take full baggage photo and close-up damage photo.','Proceed to Baggage Damage Detector or staff counter.','Keep claim number for follow-up.')}else if(/lost/i.test(need)){steps.push('Record route, vessel, travel date, and baggage tag.','Submit lost baggage ticket.','Staff checks loading/unloading records.','Passenger receives claim number.')}else if(/fare|route/i.test(need)){steps.push('Open official route/fare tool.','Choose route and passenger type.','For baggage fee, use Baggage Calc tab only.')}else{steps.push('Go to nearest OceanJet counter.','Prepare PSN or ticket details.','Staff logs request and updates status.')}const id=lookup||uid('OJ-HELP');$('v30Guide').innerHTML=`<div class="v30-receipt"><b>Passenger Guide: ${esc(id)}</b><br>Need: ${esc(need)}<br>Route: ${routeLabel(route)}<br>Mobile: ${esc(mobile||'not provided')}${qr(id)}<div class="v30-flow">${steps.map((s,i)=>`<div class="v30-step" data-n="${i+1}"><b>${esc(s)}</b></div>`).join('')}</div></div>`;audit('guide',need+' '+id)};
  window.v30LookupClaim=function(){const q=($('v30ClaimLookup').value||'').toLowerCase().trim();if(!q){$('v30ClaimResult').textContent='Please enter a claim ID or tag.';return}const all=tickets().concat(oldClaims()).concat(damages());const hit=all.find(c=>String(c.claimId||c.caseId||c.ticketId||c.id||c.tagNo||c.tag||'').toLowerCase().includes(q)||JSON.stringify(c).toLowerCase().includes(q));$('v30ClaimResult').innerHTML=hit?`<b>Record found:</b><br>${esc(hit.claimId||hit.caseId||hit.ticketId||hit.id||'Local Record')}<br>Status: ${statusChip(hit.status||'Under Review')}<br><small>${esc(hit.destination||hit.route||hit.damageType||hit.issue||'Open local record')}</small>`:'No local record found on this device. Ask staff to check the master device/export.';audit('lookup',q)};
  function renderClaim(){const m=metrics();const t=tickets();ensureView('v30-claim').innerHTML=`

  window.v30CreateClaim=function(){const c={claimId:uid('OJ-V30'),createdAt:now(),issue:$('v30ClaimType').value,route:$('v30ClaimRoute').value,tag:$('v30ClaimTag').value.trim(),name:$('v30ClaimName').value.trim(),severity:$('v30ClaimSeverity').value,evidence:$('v30ClaimEvidence').value,notes:$('v30ClaimNotes').value.trim(),status:'Submitted',priority:0};c.priority=(/critical/i.test(c.severity)?88:/moderate/i.test(c.severity)?62:38)+(c.evidence.includes('No')?12:c.evidence.includes('Partial')?8:0)+(/lost|wet|broken/i.test(c.issue)?10:0);const list=tickets();list.unshift(c);save(KEYS.tickets,list);const ob=outbox();ob.unshift({id:uid('SYNC'),type:'claim',status:'pending',createdAt:now(),payload:c});save(KEYS.outbox,ob);$('v30NewClaim').innerHTML=`<div class="v30-receipt"><b>${c.claimId}</b><br>${esc(c.issue)} • ${routeLabel(c.route)}<br>Priority: ${c.priority}${qr(c.claimId)}<button class="accent block" onclick="v30PrintClaim('${c.claimId}')">Open receipt</button></div>`;audit('claim_create',c.claimId);tip('Claim packet created.');renderClaim()};

  window.v30NextStatus=function(id){const order=['Submitted','Under Review','Need Evidence','Approved','Processing','Closed'];const list=tickets();const c=list.find(x=>x.claimId===id);if(!c)return;let i=order.indexOf(c.status);c.status=order[(i+1)%order.length];c.updatedAt=now();save(KEYS.tickets,list);audit('claim_status',id+' -> '+c.status);renderClaim();tip('Status updated.');};

  function boot(){try{document.body.classList.add('v30-ready');setPrefs(prefs());VIEWS.forEach(ensureView);patchNav();if(typeof window.buildDrawerMenu==='function')window.buildDrawerMenu();patchDashboard();patchMap();installHealthPill();guardErrors();audit('boot',VERSION+' loaded');console.log(VERSION+' loaded')}catch(e){console.error('V30 boot error',e);audit('boot_error',e.message);tip('V30 boot recovery: '+e.message)}}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
})();

<script id="ojV33VerifiedScript">
(function(){
  if(window.__OJ_V33_VERIFIED_REPAIR__) return; window.__OJ_V33_VERIFIED_REPAIR__ = 'V33_VERIFIED_REPAIR';
  const VERSION = 'V33 Verified Repair Upgrade';
  const VIEWS = ['v31-ai','v32-field','v33-command','v33-passenger','v33-staff','v33-map','v33-data'];
  const ROUTES = ['Cebu → Tagbilaran','Cebu → Ormoc','Cebu → Getafe','Cebu → Surigao','Cebu → Dumaguete','Cebu → Siquijor','Cebu → Maasin','Cebu → Palompon'];
  const $ = id => document.getElementById(id);
  const qsa = s => Array.from(document.querySelectorAll(s));
  const now = () => new Date().toLocaleString('en-PH',{timeZone:'Asia/Manila',hour12:true});
  const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const load = (k,f) => { try { const v = JSON.parse(localStorage.getItem(k) || 'null'); return v ?? f; } catch { return f; } };
  const save = (k,v) => localStorage.setItem(k, JSON.stringify(v));
  function tip(msg){ if(typeof toast === 'function') toast(msg); else console.log(msg); }
  function ensureView(name){ let v = $('view-' + name); if(!v){ v = document.createElement('div'); v.id = 'view-' + name; v.className = 'view'; (document.querySelector('.app') || document.body).appendChild(v); } return v; }
  function activate(name){ qsa('.view').forEach(v => v.classList.remove('active')); ensureView(name).classList.add('active'); qsa('#drawerMenu .drawer-item').forEach(el => el.classList.toggle('active', el.dataset.view === name)); }
  function appKeys(){ return Object.keys(localStorage).filter(k => /^oj_|^off_|^ocean|^v\d|^damage/i.test(k)); }
  function damageCases(){ const keys = ['oj_damage_master_log_v11','off_damage_master_log_v11','oj_damage_cases','oj_v30_tickets']; for(const k of keys){ const v = load(k,null); if(Array.isArray(v) && v.length) return v; } return []; }
  function tickets(){ return load('oj_v30_tickets', load('oj_v33_field_records', [])) || []; }
  function records(){ return load('oj_v33_field_records', []); }
  function storage(){ let bytes = 0; appKeys().forEach(k => bytes += (localStorage.getItem(k) || '').length * 2); return { keys: appKeys().length, mb: +(bytes/1024/1024).toFixed(2), pct: Math.min(100, Math.round((bytes/(4.8*1024*1024))*100)) }; }
  function metrics(){ const d = damageCases(), t = tickets(), r = records(), st = storage(); const open = [...t,...r].filter(x => !/closed|resolved|done/i.test(x.status || '')); const risk = Math.min(99, Math.round(open.length*8 + d.length*2 + st.pct*.35)); return {d,t,r,open,st,risk,ready:Math.max(45,100-risk)}; }
  function chip(text, cls){ return '<span class="oj33-chip '+(cls||'')+'">'+esc(text)+'</span>'; }

  function kpis(){ const m=metrics(); return '<div class="oj33-grid"><div class="oj33-card"><b>'+m.ready+'%</b><small>Site readiness</small><div class="oj33-meter"><span style="width:'+m.ready+'%"></span></div></div><div class="oj33-card"><b>'+m.open.length+'</b><small>Open service records</small></div><div class="oj33-card"><b>'+m.d.length+'</b><small>Damage evidence cases</small></div><div class="oj33-card"><b>'+m.st.mb+'MB</b><small>Local storage • '+m.st.keys+' keys</small></div></div>'; }
  function routeLabel(route){ return route || 'Selected route'; }
  function download(txt,type,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([txt],{type:type})); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),500); }
  function offlineAnswer(q){
    const x = String(q || '').toLowerCase();
    const kb = load('oj_v33_ai_kb',{extra:''});
    if(/baggage fee|compute|calculate|kilo|kg|excess|bagahe|kargada/.test(x)) return 'For official baggage fee computation, please open the Baggage Calc tab. I can guide you, but I will not replace the official calculator.';
    if(/damage|damaged|crack|broken|handle|wheel|claim|stub|guba|nabali/.test(x)) return 'Damage report steps: take claim stub/tag photo, full baggage view, and close-up of damage. Then save the claim number and update status in Staff Workbench.';
    if(/lost|missing|nawala|wala/.test(x)) return 'Lost baggage steps: collect PSN or ticket, last name if available, route, baggage tag, item description, and last seen port. Create a field record and export the handover pack.';
    if(/route|schedule|trip|eta|oras|biyahe|asa|where/.test(x)) return 'Open the Live Map or Schedules tab for route guidance. Main Cebu routes include Tagbilaran, Ormoc, Getafe, Surigao, Dumaguete, Siquijor, Maasin, and Palompon.';
    if(/admin|login|supervisor|password/.test(x)) return 'Normal users do not need login. Admin tools remain protected. Demo admin credentials may be admin/admin, demo/demo, or supervisor/supervisor depending on your build.';
    if(/offline|github|page|upload|deploy|site/.test(x)) return 'For GitHub Pages, upload the files inside the ZIP, not the ZIP itself. The homepage must be named index.html, with manifest.webmanifest, sw.js, and icons folder beside it.';
    if(/hello|hi|help|unsa|ano|what/.test(x)) return 'I can help with routes, schedules, baggage guidance, damage claims, lost baggage, GitHub Pages setup, and staff SOP. Ask in English, Tagalog, or Bisaya keywords.';

  }
  function renderAI(){ ensureView('v31-ai').innerHTML = '<div class="card oj33-shell"><div class="oj33-head"><div><h2>🤖 Smart Offline AI Assistant</h2><div class="oj33-sub">Low-end Android friendly. No API key, no server, no model download. Works on GitHub Pages and offline.</div></div>'+chip('OFFLINE AI','good')+'</div></div><div class="card"><div class="card-header">Ask anything about the site or service</div><div id="oj33Chat" class="oj33-chat"></div><div class="grid2" style="margin-top:10px"><input id="oj33Ask" class="oj33-input" placeholder="Ask route, damage, claim, schedule, GitHub..." onkeydown="if(event.key===\'Enter\')oj33AskAI()"><button class="primary block" onclick="oj33AskAI()">Ask</button></div><div class="oj33-grid" style="margin-top:10px">'+action('🧳','Damage help','Ask damage claim steps','oj33QuickAI(\'How to report damaged baggage?\')')+action('🗺️','Route help','Ask route guidance','oj33QuickAI(\'What routes are available?\')')+action('📦','GitHub help','Ask upload steps','oj33QuickAI(\'How to upload to GitHub Pages?\')')+action('🧮','Baggage help','Official calculator reminder','oj33QuickAI(\'Can you compute baggage fee?\')')+'</div></div><div class="card"><div class="card-header">Local AI knowledge note</div><textarea id="oj33KbExtra" class="oj33-textarea" placeholder="Optional extra note for offline assistant">'+esc(load('oj_v33_ai_kb',{extra:''}).extra||'')+'</textarea><button class="accent block" onclick="oj33SaveAIKB()">Save AI Note</button></div>'; seedChat(); }
  function seedChat(){ const box=$('oj33Chat'); if(box && !box.dataset.seeded){ box.dataset.seeded='1'; box.innerHTML='<div class="oj33-msg oj33-bot">Hi. I am the offline assistant. Ask about routes, claims, damage reports, schedules, GitHub Pages, or app troubleshooting.</div>'; } }
  window.oj33AskAI = function(){ const input=$('oj33Ask'); if(!input || !input.value.trim()) return; addMsg(input.value,'user'); const ans=offlineAnswer(input.value); input.value=''; setTimeout(()=>addMsg(ans,'bot'),120); };
  window.oj33QuickAI = function(q){ const input=$('oj33Ask'); if(input) input.value=q; window.oj33AskAI(); };
  window.oj33SaveAIKB = function(){ save('oj_v33_ai_kb',{extra:$('oj33KbExtra').value.trim(),updatedAt:now()}); tip('AI note saved.'); };
  function addMsg(txt,who){ const box=$('oj33Chat'); if(!box) return; const d=document.createElement('div'); d.className='oj33-msg '+(who==='user'?'oj33-user':'oj33-bot'); d.textContent=txt; box.appendChild(d); box.scrollTop=box.scrollHeight; }
  function renderField(){ const list=records(); ensureView('v32-field').innerHTML='<div class="card oj33-shell"><div class="oj33-head"><div><h2>🧾 Field Intelligence Intake</h2><div class="oj33-sub">Fast staff/public intake for damaged baggage, lost baggage, passenger help, feedback, and counter incidents.</div></div>'+chip('FIELD','warn')+'</div>'+kpis()+'</div><div class="card"><div class="card-header">Create field record</div><div class="grid2"><select id="oj33RecType" class="oj33-select"><option>Damage Claim</option><option>Lost Baggage</option><option>Passenger Assistance</option><option>Feedback</option><option>Counter Incident</option></select><select id="oj33RecRoute" class="oj33-select">'+ROUTES.map(r=>'<option>'+r+'</option>').join('')+'</select></div><div class="grid2" style="margin-top:8px"><input id="oj33RecTag" class="oj33-input" placeholder="PSN / tag / ticket"><input id="oj33RecName" class="oj33-input" placeholder="Last name optional"></div><textarea id="oj33RecNotes" class="oj33-textarea" placeholder="Short notes" style="margin-top:8px"></textarea><button class="primary block" onclick="oj33CreateRecord()">Create Field Record</button></div><div class="card"><div class="card-header">Recent field records</div><div id="oj33Records">'+recordRows(list)+'</div><button class="accent block" onclick="oj33ExportRecords()">Export Field CSV</button></div>'; }
  function recordRows(list){ return list.length ? list.slice(0,12).map((r,i)=>'<div class="oj33-row"><div><strong>'+esc(r.id)+'</strong><small>'+esc(r.type)+' • '+esc(r.route)+' • '+esc(r.status)+'</small></div><button class="sm primary" onclick="oj33NextRecord('+i+')">Next</button></div>').join('') : '<p class="muted">No field records yet.</p>'; }
  window.oj33CreateRecord = function(){ const r={id:'OJ-FLD-'+Date.now().toString(36).toUpperCase(),createdAt:now(),type:$('oj33RecType').value,route:$('oj33RecRoute').value,tag:$('oj33RecTag').value.trim(),name:$('oj33RecName').value.trim(),notes:$('oj33RecNotes').value.trim(),status:'Submitted'}; const list=records(); list.unshift(r); save('oj_v33_field_records',list); tip('Field record created: '+r.id); renderField(); };
  window.oj33NextRecord = function(i){ const list=records(); const order=['Submitted','Under Review','Need Evidence','Processing','Closed']; if(!list[i])return; const p=order.indexOf(list[i].status); list[i].status=order[(p+1+order.length)%order.length]; save('oj_v33_field_records',list); renderField(); };
  window.oj33ExportRecords = function(){ const list=records(); const header=['id','createdAt','type','route','tag','name','status','notes']; const csv=[header.join(',')].concat(list.map(r=>header.map(h=>'"'+String(r[h]||'').replace(/"/g,'""')+'"').join(','))).join('\n'); download(csv,'text/csv','oceanjet_v33_field_records.csv'); };
  function renderCommand(){ const m=metrics(); ensureView('v33-command').innerHTML='<div class="card oj33-shell"><div class="oj33-head"><div><h2>🧭 V33 Unified Command Hub</h2><div class="oj33-sub">Verified repair build from the last syntax-clean base. Combines offline AI, field intake, passenger kiosk, staff workbench, live map, and data guardian.</div></div>'+chip('VERIFIED','good')+'</div>'+kpis()+'</div><div class="card"><div class="card-header">Smart action launcher</div><input class="oj33-input" id="oj33Search" placeholder="Search: fare, claim, damage, map, backup, AI..." oninput="oj33SearchActions()"><div id="oj33ActionResults" class="oj33-grid" style="margin-top:10px"></div></div><div class="card"><div class="card-header">Role shortcuts</div><div class="oj33-grid">'+action('👤','Passenger Kiosk','Public self-service tools','showView(\'v33-passenger\')','PUBLIC')+action('🎒','Staff Workbench','Queue and shift tools','showView(\'v33-staff\')','STAFF')+action('🤖','Offline AI','Low-end assistant','showView(\'v31-ai\')','AI')+action('🧾','Field Intake','Create local service records','showView(\'v32-field\')','FIELD')+action('🗺️','Live Map Lens','Route pressure preview','showView(\'v33-map\')','MAP')+action('🛡️','Data Guardian','Backup and health checks','showView(\'v33-data\')','SAFE')+'</div></div><div class="card"><div class="card-header">Command brief</div>'+briefRows(m)+'</div>'; window.oj33SearchActions(); }
  function briefRows(m){ const rows=[['Readiness',m.ready+'%',m.ready<70?'Review storage and queues':'Operational'],['Open records',m.open.length,m.open.length>5?'Assign triage staff':'Normal'],['Damage evidence',m.d.length,m.d.length?'Export damage backup at shift end':'No local evidence yet'],['Storage',m.st.mb+' MB',m.st.pct>70?'Backup and cleanup recommended':'Healthy']]; return rows.map(r=>'<div class="oj33-row"><div><strong>'+esc(r[0])+'</strong><small>'+esc(r[2])+'</small></div>'+chip(r[1],r[0]==='Storage'&&m.st.pct>70?'warn':'')+'</div>').join(''); }
  const searchActions=[['fare','Baggage Calculator','Open official calculator','showView(\'calc\')'],['damage','Damage Detector','Evidence capture and log','showView(\'damage\')'],['claim','Claim Automation','Open claim studio','showView(\'v30-claim\')'],['ai','Offline AI','Ask offline assistant','showView(\'v31-ai\')'],['field','Field Intake','Create service record','showView(\'v32-field\')'],['map','Live Map','Open route pressure view','showView(\'v33-map\')'],['backup','Data Guardian','Export backup','showView(\'v33-data\')'],['admin','Admin','Open protected admin','showView(\'admin\')']];
  window.oj33SearchActions = function(){ const q=($('oj33Search')&&$('oj33Search').value||'').toLowerCase(); const list=searchActions.filter(a=>!q||a.join(' ').toLowerCase().includes(q)).slice(0,8); const box=$('oj33ActionResults'); if(box) box.innerHTML = list.map(a=>action('⚡',a[1],a[2],a[3],a[0].toUpperCase())).join('') || '<p class="muted">No action found.</p>'; };
  function renderPassenger(){ ensureView('v33-passenger').innerHTML='<div class="card oj33-shell"><div class="oj33-head"><div><h2>👤 Passenger Kiosk</h2><div class="oj33-sub">No login. Simple choices for passengers at the port.</div></div>'+chip('PUBLIC','good')+'</div></div><div class="card"><div class="card-header">Choose service</div><div class="oj33-grid">'+action('🧮','Check baggage fee','Use official calculator','showView(\'calc\')')+action('🧳','Report damage','Open damage detector','showView(\'damage\')')+action('🔎','Track claim','Open claim automation','showView(\'v30-claim\')')+action('🤖','Ask AI','Open offline assistant','showView(\'v31-ai\')')+action('🗺️','View routes','Open live map lens','showView(\'v33-map\')')+action('🧾','Create record','Open field intake','showView(\'v32-field\')')+'</div></div><div class="card"><div class="card-header">Passenger guide</div><div class="oj33-row"><div><strong>Damaged baggage</strong><small>Ask staff to capture claim stub, full bag, and close-up damage photo. Keep the claim number.</small></div>'+chip('DAMAGE','hot')+'</div><div class="oj33-row"><div><strong>Lost baggage</strong><small>Prepare PSN/ticket, last name, tag number, route, and item description.</small></div>'+chip('LOST','warn')+'</div></div>'; }
  function renderStaff(){ const list=[...records(),...tickets()].slice(0,10); const rows=list.length?list.map((r,i)=>'<div class="oj33-row"><div><strong>'+esc(r.id||r.claimId||'REC-'+(i+1))+'</strong><small>'+esc(r.type||r.issue||'Service record')+' • '+esc(r.status||'Submitted')+'</small></div>'+chip(priorityText(r),priorityText(r)==='HIGH'?'hot':priorityText(r)==='WATCH'?'warn':'good')+'</div>').join(''):'<p class="muted">No local records yet.</p>'; ensureView('v33-staff').innerHTML='<div class="card oj33-shell"><div class="oj33-head"><div><h2>🎒 Staff Workbench</h2><div class="oj33-sub">Fast triage for baggage staff, cashier, and supervisor review.</div></div>'+chip(list.length+' RECORDS',list.length?'warn':'good')+'</div>'+kpis()+'</div><div class="card"><div class="card-header">Priority queue</div>'+rows+'</div><div class="card"><div class="card-header">Staff actions</div><div class="oj33-grid">'+action('🧳','Damage Capture','Open detector','showView(\'damage\')')+action('🧾','Field Intake','Create service record','showView(\'v32-field\')')+action('🤖','SOP AI Help','Open AI assistant','showView(\'v31-ai\')')+action('📦','Export Pack','Download handover pack','oj33ExportPack()','SAFE')+'</div></div>'; }

  function dupCount(){ const seen=new Set(); let d=0; [...records(),...tickets(),...damageCases()].forEach(x=>{ const id=x.id||x.claimId||x.tagNo||x.caseId; if(id){ if(seen.has(id))d++; seen.add(id); } }); return d; }

  function patchDrawer(){ const menu=$('drawerMenu'); if(!menu) return; const items=[['v33-command','🧭','V33 Command'],['v31-ai','🤖','Offline AI'],['v32-field','🧾','Field Intake'],['v33-passenger','👤','Passenger Kiosk'],['v33-staff','🎒','Staff Workbench'],['v33-map','🗺️','V33 Live Map'],['v33-data','🛡️','Data Guardian']]; items.forEach(item=>{ if(!menu.querySelector('[data-view="'+item[0]+'"]')) menu.insertAdjacentHTML('beforeend','<div class="drawer-item" data-view="'+item[0]+'" onclick="showView(\''+item[0]+'\')"><i>'+item[1]+'</i> '+item[2]+'</div>'); }); }
  function patchNav(){ if(window.__ojV33VerifiedNav) return; window.__ojV33VerifiedNav=true; const oldShow=window.showView; window.showView=function(name){ if(VIEWS.includes(name)){ renderLocal(name); return; } const r=oldShow?oldShow.apply(this,arguments):undefined; setTimeout(()=>{patchDrawer();patchDashboard();},120); return r; }; try{ showView=window.showView; }catch(e){} const oldBuild=window.buildDrawerMenu; window.buildDrawerMenu=function(){ const r=oldBuild?oldBuild.apply(this,arguments):undefined; patchDrawer(); return r; }; try{ buildDrawerMenu=window.buildDrawerMenu; }catch(e){} }

  function installFab(){ if($('oj33Fab')) return; const b=document.createElement('button'); b.id='oj33Fab'; b.className='oj33-fab'; b.textContent='🧭 V33'; b.onclick=()=>showView('v33-command'); document.body.appendChild(b); }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot); else boot();
})();

<script id="oj35RolePdfScript">
(function(){

  if(window.__ojV35RolePdfBuild) return;

  const now = () => new Date().toLocaleString('en-PH',{hour12:true});
  const toast35 = msg => { try{ if(typeof toast==='function') toast(msg); else console.log(msg); }catch(e){ console.log(msg); } };
  const readLS = (key, fallback) => { try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }catch(e){ return fallback; } };
  const getDB = () => { try{ return DB || null; }catch(e){ return null; } };
  function ensureView(name){ let v=$id('view-'+name); if(!v){ v=document.createElement('div'); v.id='view-'+name; v.className='view'; app().appendChild(v); } return v; }

    sessionStorage.setItem(ROLE_KEY, role); setLegacyRole(role);

  const ADMIN = [['v35-home','🏠','Admin Home'],['dashboard','📊','Dashboard'],['calculator','🧮','Baggage Calc'],['fares','💵','Fares'],['schedules','🕐','Schedules'],['damage','📷','Damage Detector'],['lostbaggage','🧳','Lost/Damaged Form'],['claimstatus','🔎','Claim Status'],['staffcounter','👥','Staff Counter'],['history','📋','History'],['v35-reports','📄','PDF Center'],['exportcenter','📤','Export Center'],['admin','⚙️','Admin Panel'],['sitehealth','🛟','Site Health'],['contentmanager','📝','Content Manager'],['v33-command','🧭','V33 Command'],['v33-staff','🎒','Staff Workbench'],['v33-data','🛡️','Data Guardian'],['v30-os','🚢','Service OS'],['v30-admin','🛠️','V30 Admin'],['v31-ai','🤖','Offline AI'],['v27-guardian','🛡️','Guardian'],['v29-admin','🛠️','V29 Admin']];

  const ALWAYS = new Set(['v35-home','v35-cashier-login','v35-admin-login']);
  const ALIAS = {calc:'calculator', quickdesk:'v35-home'};
  function canOpen(name){ const role=getRole(); name=ALIAS[name]||name; if(ALWAYS.has(name)) return true; if(role==='admin') return true; if(role==='cashier') return CASHIER_ALLOWED.has(name); return PAX_ALLOWED.has(name); }

    const role=getRole(), v=ensureView('v35-home');
